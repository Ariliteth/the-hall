<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Storeroom</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600&family=Special+Elite&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1710;
    --shelf: #2e2718;
    --shelf-edge: #3d3420;
    --card: #2a2416;
    --text: #c8b87a;
    --dim: #5a4e2a;
    --light-on: #fff8d6;
    --light-glow: rgba(255,240,160,0.18);
    --light-off: #2a2418;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Barlow Condensed', sans-serif;
    touch-action: none;
    user-select: none;
  }

  #room {
    width: 100%; height: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 0;
  }

  /* ── CEILING LIGHT ── */
  #light-zone {
    position: relative;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 10px;
    flex-shrink: 0;
  }

  #light-fixture {
    width: 3px;
    height: 28px;
    background: #3a3020;
    margin-bottom: 0;
  }

  #light-bulb {
    width: 180px;
    height: 22px;
    border-radius: 3px;
    background: var(--light-off);
    box-shadow: none;
    transition: background 0.05s, box-shadow 0.05s;
    cursor: pointer;
    position: relative;
  }

  #light-bulb.on {
    background: var(--light-on);
    box-shadow: 0 0 40px 18px rgba(255,240,160,0.22), 0 0 120px 40px rgba(255,240,160,0.07);
  }

  #light-cone {
    width: 0;
    height: 0;
    border-left: 90px solid transparent;
    border-right: 90px solid transparent;
    border-bottom: 0px solid transparent;
    transition: border-bottom-width 0.05s, border-bottom-color 0.05s;
  }

  #light-cone.on {
    border-bottom: 60px solid rgba(255,240,160,0.06);
  }

  #light-prompt {
    margin-top: 6px;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--dim);
    height: 16px;
    text-transform: uppercase;
    font-family: 'Barlow Condensed', sans-serif;
    transition: opacity 0.3s;
    position: relative;
  }

  #light-prompt.nudging::before,
  #light-prompt.nudging::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 10px;
    height: 1px;
    background: var(--dim);
    opacity: 0;
    animation: tap-squiggle 1.8s ease-in-out infinite;
  }
  #light-prompt.nudging::before {
    left: -14px;
    transform-origin: right center;
  }
  #light-prompt.nudging::after {
    right: -14px;
    transform-origin: left center;
    animation-delay: 0.3s;
  }

  @keyframes tap-squiggle {
    0%   { opacity: 0; transform: translateY(-50%) scaleX(0); }
    15%  { opacity: 0.4; transform: translateY(-50%) scaleX(0.7); }
    30%  { opacity: 0.35; transform: translateY(-55%) scaleX(1); }
    45%  { opacity: 0.3; transform: translateY(-45%) scaleX(0.8); }
    60%  { opacity: 0.2; transform: translateY(-52%) scaleX(0.5); }
    75%  { opacity: 0; transform: translateY(-50%) scaleX(0.2); }
    100% { opacity: 0; transform: translateY(-50%) scaleX(0); }
  }

  /* ── SHELF AREA ── */
  #shelves {
    flex: 1;
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    align-items: center;
    padding: 10px 16px 0;
    position: relative;
  }

  .shelf-unit {
    width: 100%;
    position: relative;
  }

  .shelf-surface {
    width: 100%;
    height: 8px;
    background: var(--shelf-edge);
    border-radius: 2px;
    margin-top: 4px;
    box-shadow: 0 3px 0 rgba(0,0,0,0.4);
  }

  .shelf-contents {
    width: 100%;
    height: 52px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    position: relative;
    overflow: visible;
  }

  /* ── SWIPE OBJECT ── */
  .swipe-zone {
    position: relative;
    width: 100%;
    height: 60px;
    overflow: visible;
    display: flex;
    align-items: center;
  }

  .sliding-box {
    position: absolute;
    width: 64px;
    height: 48px;
    background: #3a3020;
    border: 1.5px solid #4a4028;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #7a6a40;
    letter-spacing: 0.08em;
    font-family: 'Special Elite', monospace;
    text-transform: uppercase;
    cursor: pointer;
    top: 6px;
  }

  .sliding-box::after {
    content: '';
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    border: 1px solid rgba(122,106,64,0.3);
    border-radius: 1px;
    pointer-events: none;
  }

  .swipe-zone.waiting { cursor: grab; }
  .swipe-zone.dragging { cursor: grabbing; }

  .sliding-box.touched {
    border-color: #5a5038;
    transition: border-color 0.1s;
  }

  .sliding-box.settling {
    transition: left 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  .sliding-box.resisting {
    transition: left 0.18s cubic-bezier(0.7, 0, 0.84, 0);
  }

  .obj-prompt {
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--dim);
    white-space: nowrap;
    text-transform: uppercase;
    height: 14px;
  }

  /* ── CANISTER (HOLD/TILT) ── */
  #canister-zone {
    position: relative;
    width: 100%;
    height: 70px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: visible;
  }

  #canister {
    width: 32px;
    height: 54px;
    background: linear-gradient(160deg, #4a4030, #2e2618);
    border: 1.5px solid #5a5030;
    border-radius: 4px 4px 3px 3px;
    position: relative;
    transform-origin: bottom center;
    cursor: pointer;
    flex-shrink: 0;
  }

  #canister::before {
    content: '';
    position: absolute;
    top: 6px; left: 50%; transform: translateX(-50%);
    width: 20px; height: 3px;
    background: rgba(200,184,122,0.15);
    border-radius: 1px;
  }

  #canister-lid {
    position: absolute;
    top: -6px; left: -3px; right: -3px;
    height: 9px;
    background: #5a5030;
    border-radius: 3px 3px 0 0;
    border: 1px solid #6a6040;
  }

  #hold-prompt {
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--dim);
    white-space: nowrap;
    text-transform: uppercase;
    height: 14px;
  }

  /* ── SHELF DROOP (failure state) ── */
  .shelf-droop {
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  /* ── BALLOONS ── */
  .balloon {
    position: fixed;
    bottom: -60px;
    font-size: 26px;
    animation: balloon-rise 3.2s ease-out forwards;
    pointer-events: none;
    z-index: 100;
  }

  .balloon-text {
    position: fixed;
    bottom: 40px;
    font-family: 'Special Elite', monospace;
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--text);
    animation: balloon-rise 2.8s ease-out forwards;
    pointer-events: none;
    z-index: 100;
    text-transform: lowercase;
  }

  @keyframes balloon-rise {
    0%   { transform: translateX(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateX(var(--drift)) translateY(-110vh) rotate(var(--spin)); opacity: 0; }
  }

  /* ── CONFETTI ── */
  .confetto {
    position: fixed;
    bottom: 0;
    width: 6px;
    height: 10px;
    border-radius: 1px;
    animation: confetti-pop 2.4s ease-out forwards;
    pointer-events: none;
    z-index: 99;
    transform-origin: center;
  }

  @keyframes confetti-pop {
    0%   { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateX(var(--cx)) translateY(var(--cy)) rotate(var(--cr)); opacity: 0; }
  }

  /* ── PERFECT WHISPER ── */
  .perfect-whisper {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--dim);
    font-family: 'Special Elite', monospace;
    letter-spacing: 0.1em;
    white-space: nowrap;
    pointer-events: none;
    animation: perfect-fade 2.4s ease-out forwards;
  }

  @keyframes perfect-fade {
    0%   { opacity: 0; transform: translateX(-50%) translateY(0); }
    12%  { opacity: 0.6; }
    50%  { opacity: 0.6; }
    100% { opacity: 0; transform: translateX(-50%) translateY(-14px); }
  }

  /* ── OUTLINE (departed object) ── */
  .obj-outline {
    position: absolute;
    border: 1px dashed rgba(122,106,64,0.12);
    border-radius: 2px;
    pointer-events: none;
  }

  .outline-name {
    position: absolute;
    bottom: -13px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    font-family: 'Special Elite', monospace;
    color: var(--text);
    letter-spacing: 0.15em;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.8s ease-in;
  }

  /* ── GHOST ── */
  .ghost-object {
    font-size: 10px;
    color: var(--text);
    font-family: 'Special Elite', monospace;
    letter-spacing: 0.1em;
    text-align: center;
    pointer-events: none;
  }

  @keyframes ghost-visit {
    0%   { opacity: 0; }
    15%  { opacity: 0.18; }
    70%  { opacity: 0.18; }
    100% { opacity: 0; }
  }

  /* ── TROPHIES ── */
  .trophy-obj {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    cursor: pointer;
    transition: filter 0.3s, transform 0.15s;
    flex-shrink: 0;
  }

  .trophy-obj .trophy-icon {
    font-size: 1.4rem;
    transition: transform 0.2s;
  }

  .trophy-obj .trophy-label {
    font-size: 7px;
    font-family: 'Special Elite', monospace;
    letter-spacing: 0.12em;
    color: rgba(200,184,122,0.5);
    text-transform: uppercase;
    white-space: nowrap;
    background: rgba(60,50,30,0.4);
    padding: 1px 4px;
    border-radius: 1px;
  }

  .trophy-obj:hover { transform: scale(1.08); }
  .trophy-obj:active { transform: scale(0.95); }

  /* Dust dims the trophy */
  .trophy-obj.dusty-1 { filter: brightness(0.85) saturate(0.8); }
  .trophy-obj.dusty-2 { filter: brightness(0.7) saturate(0.6); }
  .trophy-obj.dusty-3 { filter: brightness(0.55) saturate(0.4); }

  /* Acknowledged flash */
  .trophy-obj.acknowledged {
    filter: brightness(1.3) !important;
    transition: filter 0.1s;
  }

  /* Inversion animations — trophy does the thing */
  .trophy-obj.inverting-slide .trophy-icon {
    animation: trophy-slide 2.5s ease-in-out infinite;
  }
  .trophy-obj.inverting-blink .trophy-icon {
    animation: trophy-blink 1.2s step-end infinite;
  }
  .trophy-obj.inverting-tilt .trophy-icon {
    animation: trophy-tilt 3s ease-in-out infinite;
  }

  @keyframes trophy-slide {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(6px); }
    75% { transform: translateX(-6px); }
  }

  @keyframes trophy-blink {
    0%, 49% { opacity: 1; }
    50%, 89% { opacity: 0.15; }
    90%, 100% { opacity: 1; }
  }

  @keyframes trophy-tilt {
    0%, 100% { transform: rotate(0deg); }
    30% { transform: rotate(12deg); }
    70% { transform: rotate(-8deg); }
  }

  /* ── FLOOR ── */
  #floor {
    width: 100%;
    height: 14px;
    background: linear-gradient(180deg, #1e1c10, #161510);
    border-top: 2px solid #2e2c18;
    flex-shrink: 0;
  }

  /* ── STATUS ── */
  #status-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: transparent;
    z-index: 50;
  }

  #accuracy-fill {
    height: 100%;
    background: linear-gradient(90deg, #c8b87a, #8a7840);
    transition: width 0.5s ease;
    width: 100%;
  }

  /* ── GIMME DOTS ── */
  #gimme-dots {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 101;
  }

  .gimme-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text);
    opacity: 0.5;
  }

  /* ── PATTERN DISPLAY for light ── */
  #pattern-display {
    display: flex;
    gap: 5px;
    margin-top: 4px;
    height: 10px;
    align-items: center;
  }

  .pat-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--dim);
  }

  .pat-dot.active {
    background: var(--text);
  }
</style>
</head>
<body>

<div id="status-bar"><div id="accuracy-fill"></div></div>

<div id="room">

  <!-- LIGHT -->
  <div id="light-zone">
    <div id="light-fixture"></div>
    <div id="light-bulb" class="on"></div>
    <div id="light-cone" class="on"></div>
    <div id="pattern-display"></div>
    <div id="light-prompt"></div>
  </div>

  <!-- SHELVES -->
  <div id="shelves">

    <!-- shelf 1: Brenda mounts here -->
    <div class="shelf-unit shelf-droop" id="shelf-1">
      <div class="shelf-contents"></div>
      <div class="shelf-surface"></div>
    </div>

    <!-- shelf 2: canister (prototype) -->
    <div class="shelf-unit shelf-droop" id="shelf-2">
      <div class="shelf-contents">
        <div id="canister-zone">
          <div id="canister">
            <div id="canister-lid"></div>
          </div>
          <div id="hold-prompt"></div>
        </div>
      </div>
      <div class="shelf-surface"></div>
    </div>

  </div>

  <div id="floor"></div>
</div>

<div id="gimme-dots"></div>

<script>
// ── Hub integration ──
if (window.parent !== window) {
  window.parent.postMessage({ type: 'hub:minimize' }, '*');
  window.parent.postMessage({ type: 'hub:color', r: 150, g: 110, b: 70 }, '*');
}

// ─────────────────────────────────────────────
//  SCRAGGLES
// ─────────────────────────────────────────────

function emitScraggle(emoji, color, weight, id) {
  try {
    const raw = localStorage.getItem('baseline-session/scraggles');
    const scraggles = raw ? JSON.parse(raw) : [];
    scraggles.push({
      emoji,
      color,
      weight: Math.min(1, Math.max(0, weight)),
      id:     id || ('sr-' + Date.now()),
      origin: 'storeroom',
      ts:     Date.now(),
    });
    // Keep last 40 (consistent with hub's pulse decay window)
    if (scraggles.length > 40) scraggles.splice(0, scraggles.length - 40);
    localStorage.setItem('baseline-session/scraggles', JSON.stringify(scraggles));
  } catch (e) {}
}

// ─────────────────────────────────────────────
//  STOREROOM
// ─────────────────────────────────────────────

const BALLOON_WORDS = ['okay.', 'nice.', 'oh well.', 'there it is.', 'sure.', 'mm.', 'yeah.', 'hey!'];
const BALLOON_EMOJIS = ['🎈','🎈','🎉','✨','🎈'];
const BOX_W = 64;

// ─────────────────────────────────────────────
//  R — Room state
// ─────────────────────────────────────────────

const R = {
  objects:        [],
  outlines:       [],
  trophies:       [],
  roomAccuracy:   [],
  gimmeCount:     0,
  strictMode:     false,
  interactionCount: 0,
  nextTrophyAt:   30 + Math.floor(Math.random() * 20), // first trophy at 30-50 interactions
  trophyCount:    0,
};

// ─────────────────────────────────────────────
//  OBJECT DEFINITIONS
// ─────────────────────────────────────────────

const OBJECT_DEFS = {
  brenda: {
    name:     'Brenda',
    type:     'swipe',
    shelf:    1,
    label:    'MISC',

    paramRange: {
      speed:    [0.25, 0.8],
      duration: [2500, 5500],
      changes:  [0, 2],
    },

    latent: {
      speed: 0.45,
      dir:   1,
    },

    tolerance: {
      initial: 1.0,
      floor:   0.12,
      rate:    0.015,
      accel:   1.6,
      resist:  0.7,
    },

    idle: {
      easeIn:  0.0,
      easeOut: 0.0,
      drift:   0.002,
      jitter:  0.0,
    },

    lifecycle: {
      developingAt:       8,
      particularAt:       24,
      departureThreshold: 5,
    },

    exitChance: 0.38,
  },

  flicker: {
    name:     'Flicker',
    type:     'tap',
    shelf:    0,       // 0 = ceiling (special mount)
    label:    '',
    paramRange: {
      pulseCount: [2, 5],
      gapMs:      [150, 450],
    },
    latent: {
      pulseCount: 3,
      gapMs:      280,
    },
    tolerance: { initial: 1.0, floor: 0.15, rate: 0.012, accel: 1.4, resist: 0.75 },
    idle:      { easeIn: 0.0, easeOut: 0.0, drift: 0.0015, jitter: 0.0 },
    lifecycle: { developingAt: 10, particularAt: 30, departureThreshold: 6 },
    exitChance: 0.38,
  },

  glen: {
    name:     'Glen',
    type:     'hold',
    shelf:    2,
    label:    '',
    paramRange: {
      straightMs: [900, 2700],
      tiltMs:     [600, 1400],
    },
    latent: {
      straightMs: 1600,
    },
    tolerance: { initial: 1.0, floor: 0.15, rate: 0.014, accel: 1.5, resist: 0.7 },
    idle:      { easeIn: 0.0, easeOut: 0.0, drift: 0.0018, jitter: 0.0 },
    lifecycle: { developingAt: 10, particularAt: 28, departureThreshold: 5 },
    exitChance: 0.38,
  },
};

// ─────────────────────────────────────────────
//  TROPHY DEFINITIONS
// ─────────────────────────────────────────────

const TROPHY_DEFS = [
  { emoji: '🏆', name: 'Cup',           inversionType: 'tilt'  },
  { emoji: '🍕', name: 'Lukewarm Pizza', inversionType: 'slide' },
  { emoji: '📋', name: 'Plaque',         inversionType: 'blink' },
  { emoji: '⭐', name: 'Gold Star',      inversionType: 'blink' },
  { emoji: '🧸', name: 'Small Bear',     inversionType: 'tilt'  },
  { emoji: '🎖️', name: 'Medal',          inversionType: 'slide' },
  { emoji: '🫖', name: 'Teapot',         inversionType: 'tilt'  },
  { emoji: '🧊', name: 'Paperweight',    inversionType: 'slide' },
];

function createTrophy(defIdx, shelf) {
  const def = TROPHY_DEFS[defIdx % TROPHY_DEFS.length];
  return {
    emoji:          def.emoji,
    name:           def.name,
    inversionType:  def.inversionType,
    shelf:          shelf,
    dustLevel:      0,        // 0-3, increments over time
    inverting:      false,    // true when doing the thing
    acknowledged:   false,    // brief flash state
    arrivedAt:      Date.now(),
    lastAckAt:      Date.now(),
    el:             null,
  };
}

// ─────────────────────────────────────────────
//  OBJECT FACTORY
// ─────────────────────────────────────────────

function createObject(defKey) {
  const def = OBJECT_DEFS[defKey];
  return {
    key:              defKey,
    name:             def.name,
    type:             def.type,
    shelf:            def.shelf,
    label:            def.label,

    paramRange:       JSON.parse(JSON.stringify(def.paramRange)),
    latent:           JSON.parse(JSON.stringify(def.latent)),
    toleranceCfg:     JSON.parse(JSON.stringify(def.tolerance)),
    idleCfg:          JSON.parse(JSON.stringify(def.idle)),
    lifecycleCfg:     JSON.parse(JSON.stringify(def.lifecycle)),
    exitChance:       def.exitChance,

    // Runtime state
    tolerance:        def.tolerance.initial,
    history:          [],
    interactionCount: 0,
    consecutiveFails: 0,
    lifecycleState:   'present',

    // Idle evolution
    easeIn:           def.idle.easeIn,
    easeOut:          def.idle.easeOut,
    jitter:           def.idle.jitter,

    // Interaction cycle (set by renderer)
    cycle:            null,

    // DOM refs (set during mount)
    el:               null,
    promptEl:         null,
    zoneEl:           null,

    // Perfect tracking
    perfectCooldown:  0,
    perfectCount:     0,
  };
}

// ─────────────────────────────────────────────
//  TOLERANCE & PREFERENCE
// ─────────────────────────────────────────────

function updateTolerance(obj, score) {
  const cfg = obj.toleranceCfg;
  let delta = cfg.rate;

  // Player matched well — object feels understood, narrows faster
  if (score > 0.8) {
    delta *= cfg.accel;
  }

  // Player missed consistently — still narrows, but slower
  const recent = obj.history.slice(-3);
  if (recent.length >= 3 && recent.every(s => s < 0.5)) {
    delta *= cfg.resist;
  }

  obj.tolerance = Math.max(cfg.floor, obj.tolerance - delta);
}

function preferenceProximity(obj, actualParams) {
  let totalErr = 0;
  let paramCount = 0;

  for (const key of Object.keys(obj.latent)) {
    if (actualParams[key] === undefined) continue;
    const range = obj.paramRange[key];
    if (!range) continue;
    const span = range[1] - range[0];
    if (span === 0) continue;

    const err = Math.abs(actualParams[key] - obj.latent[key]) / span;
    totalErr += err;
    paramCount++;
  }

  return paramCount > 0 ? Math.max(0, 1 - totalErr / paramCount) : 0;
}

function checkPerfect(obj, proximity) {
  if (obj.perfectCooldown > 0) return;
  if (proximity > 0.95) {
    showPerfect(obj);
    obj.perfectCooldown = 8;
    obj.perfectCount++;
    // First perfect — the Hall should know
    if (obj.perfectCount === 1) {
      emitScraggle('✨', [200, 184, 122], 0.3, 'sr-perfect-' + obj.key);
    }
  }
}

function showPerfect(obj) {
  const el = document.createElement('div');
  el.className = 'perfect-whisper';
  el.textContent = 'perfect..';
  // Anchor to the object's zone so it appears near it
  const parent = obj.zoneEl || obj.el.parentElement;
  parent.style.position = 'relative';
  parent.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

// ─────────────────────────────────────────────
//  PARAMETER WINDOW
// ─────────────────────────────────────────────

function paramInWindow(obj, paramName) {
  const range = obj.paramRange[paramName];
  const pref  = obj.latent[paramName];

  // If no latent preference for this param, use full range
  if (pref === undefined) {
    return range[0] + Math.random() * (range[1] - range[0]);
  }

  const lo = range[0], hi = range[1];
  const t  = obj.tolerance; // 1.0 = full range, 0.0 = exact preference

  // Interpolate between [pref,pref] and [lo,hi]
  const wLo = pref + (lo - pref) * t;
  const wHi = pref + (hi - pref) * t;

  return wLo + Math.random() * (wHi - wLo);
}

// ─────────────────────────────────────────────
//  ROOM-WIDE ACCURACY
// ─────────────────────────────────────────────

function recordRoomAccuracy(score) {
  R.roomAccuracy.push(score);
  if (R.roomAccuracy.length > 12) R.roomAccuracy.shift();
  R.interactionCount++;
  checkTrophyDelivery();

  const avg = R.roomAccuracy.reduce((a, b) => a + b, 0) / R.roomAccuracy.length;
  document.getElementById('accuracy-fill').style.width = (avg * 100) + '%';

  if (R.roomAccuracy.length >= 4) {
    const variance = R.roomAccuracy.reduce((s, v) => s + Math.pow(v - avg, 2), 0) / R.roomAccuracy.length;
    const stdDev = Math.sqrt(variance);
    const consistent = stdDev < 0.15;

    if (R.gimmeCount > 0) {
      R.gimmeCount--;
      updateGimmeDots();
      return;
    }

    if (score < 0.25 || (R.strictMode && score < 0.55)) {
      triggerFailure();
      R.gimmeCount = 2 + Math.floor(Math.random() * 4);
      updateGimmeDots();
      R.strictMode = false;
    } else if (avg > 0.82 && consistent && !R.strictMode) {
      R.strictMode = true;
    }
  }
}

function updateGimmeDots() {
  const d = document.getElementById('gimme-dots');
  d.innerHTML = '';
  for (let i = 0; i < R.gimmeCount; i++) {
    const dot = document.createElement('div');
    dot.className = 'gimme-dot';
    d.appendChild(dot);
  }
}

// ─────────────────────────────────────────────
//  OBJECT MOUNTING
// ─────────────────────────────────────────────

function mountObject(obj) {
  // Shelf 0 = ceiling (light zone), others = shelf-N
  let contents;
  if (obj.shelf === 0) {
    contents = document.getElementById('light-zone');
  } else {

function mountSwipeObject(obj, container) {

// ─────────────────────────────────────────────
//  IDLE BEHAVIOR
// ─────────────────────────────────────────────

// Parametric ease: blend between linear and power curves
// eIn=0,eOut=0 → linear (new object, robotic)
// eIn=0.8 → slow start, accelerates (mornings are hard)
function objectEase(t, eIn, eOut) {
  let r = t;
  if (eIn > 0)  r = Math.pow(r, 1 + eIn * 2);
  if (eOut > 0) r = 1 - Math.pow(1 - r, 1 + eOut * 2);
  return r;
}

function evolveIdle(obj, score) {
  const drift = obj.idleCfg.drift;

  // Easing develops gradually toward the object's personality
  obj.easeIn = Math.min(1, obj.easeIn + drift);

  // Jitter from inconsistent player responses (nervousness)
  if (obj.history.length >= 4) {
    const recent = obj.history.slice(-4);
    const avg = recent.reduce((a, b) => a + b, 0) / recent.length;
    const variance = recent.reduce((s, v) => s + (v - avg) ** 2, 0) / recent.length;
    obj.jitter = Math.min(0.04, obj.jitter + variance * 0.005);
  }

  // High accuracy calms the object
  if (score > 0.85) {
    obj.jitter = Math.max(0, obj.jitter - 0.003);
  }
}

function startIdleAnimation(obj) {
  if (obj._idleRaf) return; // already running
  const startT = performance.now();
  const period = 3000 + Math.random() * 2000;

  function idleFrame(t) {
    // Stop if a cycle has started
    if (obj.cycle) { obj._idleRaf = null; return; }

    const elapsed = t - startT;
    const phase = (elapsed % period) / period;
    const eased = objectEase(phase, obj.easeIn, obj.easeOut);

    if (obj.type === 'swipe') {
      const sway = Math.sin(eased * Math.PI * 2) * (3 + obj.jitter * 40);
      obj.el.style.transform = `translateX(${sway}px)`;
    } else if (obj.type === 'tap') {
      // Gentle glow pulsing — breathing. Jitter = flicker.
      const breath = 0.5 + 0.5 * Math.sin(eased * Math.PI * 2);
      const flicker = obj.jitter > 0.01 ? (Math.random() - 0.5) * obj.jitter * 20 : 0;
      const glow = 0.4 + breath * 0.3 + flicker;
      if (obj.el) obj.el.style.boxShadow = `0 0 ${20 + glow * 30}px ${8 + glow * 15}px rgba(255,240,160,${glow * 0.15})`;
    } else if (obj.type === 'hold') {
      // Tiny sway — alive pretending to be still
      const sway = Math.sin(eased * Math.PI * 2) * (0.8 + obj.easeIn * 2 + obj.jitter * 20);
      if (obj.el) obj.el.style.transform = `rotate(${sway}deg)`;
    }

    obj._idleRaf = requestAnimationFrame(idleFrame);
  }
  obj._idleRaf = requestAnimationFrame(idleFrame);
}

function stopIdleAnimation(obj) {
  if (obj._idleRaf) {
    cancelAnimationFrame(obj._idleRaf);
    obj._idleRaf = null;
  }
  if (obj.type === 'swipe') {
    obj.el.style.transform = '';
  } else if (obj.type === 'tap') {
    if (obj.el) obj.el.style.boxShadow = '';
  } else if (obj.type === 'hold') {
    if (obj.el) obj.el.style.transform = '';
  }
}

// ─────────────────────────────────────────────
//  LIFECYCLE
// ─────────────────────────────────────────────

function updateLifecycle(obj, score) {
  const cfg = obj.lifecycleCfg;
  const failThreshold = R.strictMode ? 0.7 : 0.4;

  if (score < failThreshold) {
    obj.consecutiveFails++;
  } else {
    obj.consecutiveFails = 0;
  }

  // State transitions (one-way, silent)
  if (obj.lifecycleState === 'present' && obj.interactionCount >= cfg.developingAt) {
    obj.lifecycleState = 'developing';
  }
  if (obj.lifecycleState === 'developing' && obj.interactionCount >= cfg.particularAt) {
    obj.lifecycleState = 'particular';
  }

  // Departure: only after developing, and enough consecutive failures
  if (obj.lifecycleState !== 'present' && obj.consecutiveFails >= cfg.departureThreshold) {
    triggerDeparture(obj);
  }
}

function triggerDeparture(obj) {
  obj.lifecycleState = 'departed';
  stopIdleAnimation(obj);

  // Going-away party — identical to failure celebration
  triggerFailure();

  // Tell the Hall — weight reflects how much time we had together
  const departureWeight = Math.min(1, obj.interactionCount / 40);
  emitScraggle('🪦', [150, 110, 70], departureWeight, 'sr-depart-' + obj.key);

  // Remove from active objects
  const idx = R.objects.indexOf(obj);
  if (idx !== -1) R.objects.splice(idx, 1);

  // Snapshot the object's life for the ghost to remember
  const hist = obj.history;
  const avgAcc = hist.length > 0 ? hist.reduce((a, b) => a + b, 0) / hist.length : 0;
  const recentAcc = hist.length >= 5
    ? hist.slice(-5).reduce((a, b) => a + b, 0) / 5
    : avgAcc;
  const earlyAcc = hist.length >= 5
    ? hist.slice(0, 5).reduce((a, b) => a + b, 0) / Math.min(5, hist.length)
    : avgAcc;

  // Record outline — carries the object's full memory
  R.outlines.push({
    shelfId:          obj.shelf,
    name:             obj.name,
    label:            obj.label,
    departedAt:       Date.now(),
    ghostDone:        false,
    width:            obj.el ? obj.el.offsetWidth : 64,
    height:           obj.el ? obj.el.offsetHeight : 48,
    // Life story
    interactionCount: obj.interactionCount,
    avgAccuracy:      avgAcc,
    recentAccuracy:   recentAcc,
    earlyAccuracy:    earlyAcc,
    tolerance:        obj.tolerance,
    lifecycleState:   obj.lifecycleState,
    perfectCount:     obj.perfectCount,
    easeIn:           obj.easeIn,
  });

  // Fade object out, then render outline
  if (obj.el) {
    obj.el.style.transition = 'opacity 2s ease-out';
    obj.el.style.opacity = '0';
  }
  if (obj.promptEl) obj.promptEl.textContent = '';

  setTimeout(() => {
    // Remove the object DOM
    if (obj.zoneEl && obj.zoneEl.parentElement) {
      obj.zoneEl.remove();
    }
    renderOutline(obj.shelf);

    // Schedule ghost visit
    const ghostDelay = 12000 + Math.random() * 18000;
    const outline = R.outlines.find(o => o.shelfId === obj.shelf && !o.ghostDone);
    if (outline) {
      setTimeout(() => triggerGhost(outline), ghostDelay);
    }
  }, 2400);
}

function renderOutline(shelfId) {
  const shelf = document.getElementById('shelf-' + shelfId);
  if (!shelf) return;
  const contents = shelf.querySelector('.shelf-contents');
  const outline = R.outlines.find(o => o.shelfId === shelfId && !o.ghostDone);
  if (!outline) return;

  const el = document.createElement('div');
  el.className = 'obj-outline';
  el.style.width = outline.width + 'px';
  el.style.height = outline.height + 'px';
  el.style.position = 'relative';
  el.dataset.outlineName = outline.name;
  contents.appendChild(el);
}

function composeGhostSpeech(outline) {
  const n   = outline.interactionCount || 0;
  const avg = outline.avgAccuracy || 0;
  const rec = outline.recentAccuracy || 0;
  const ear = outline.earlyAccuracy || 0;
  const tol = outline.tolerance || 1;
  const pf  = outline.perfectCount || 0;

  const candidates = [];

  // ── Was she understood? ──
  if (avg > 0.78 && n > 15) {
    candidates.push('you knew what i needed. most of the time.');
  }
  if (avg > 0.85) {
    candidates.push('you were good at this. i mean it.');
  }
  if (avg < 0.45 && n > 10) {
    candidates.push('i was trying to tell you.');
  }
  if (avg < 0.35) {
    candidates.push('it\'s okay. really.');
  }

  // ── Did she get perfects? ──
  if (pf >= 3) {
    candidates.push('you heard me. more than once.');
  } else if (pf === 1) {
    candidates.push('you heard me, that one time.');
  } else if (pf === 0 && n > 20) {
    candidates.push('i don\'t think you ever quite got it. but you tried.');
  }

  // ── How particular had she become? ──
  if (tol < 0.2) {
    candidates.push('i became very specific. that\'s not your fault.');
  }
  if (tol > 0.6 && n > 8) {
    candidates.push('i was still figuring out what i wanted.');
  }

  // ── How long was she here? ──
  if (n <= 10) {
    candidates.push('we didn\'t have enough time.');
  }
  if (n > 40) {
    candidates.push('i liked it here.');
  }

  // ── Was the player improving? ──
  if (rec > ear + 0.15 && n > 12) {
    candidates.push('you were getting closer.');
  }
  if (ear > rec + 0.15 && n > 12) {
    candidates.push('it was better at the start.');
  }

  // ── Idle development (she had a personality emerging) ──
  if ((outline.easeIn || 0) > 0.05) {
    candidates.push('i was starting to get comfortable.');
  }

  // Fallback — always have something
  if (candidates.length === 0) {
    candidates.push('thanks for noticing.');
  }

  // Pick one
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function triggerGhost(outline) {
  if (outline.ghostDone) return;
  outline.ghostDone = true;

  const shelf = document.getElementById('shelf-' + outline.shelfId);
  if (!shelf) return;
  const contents = shelf.querySelector('.shelf-contents');

  // Remove outline element
  const outlineEl = contents.querySelector('.obj-outline');

  // Ghost appears
  const ghost = document.createElement('div');
  ghost.className = 'ghost-object';
  ghost.style.animation = 'ghost-visit 6s ease-in-out forwards';

  // Ghost says something honest — from her actual life
  ghost.textContent = composeGhostSpeech(outline);
  contents.appendChild(ghost);

  setTimeout(() => {
    ghost.remove();
    if (outlineEl) {
      // The name appears — you learn it here, after she's gone
      const nameEl = document.createElement('div');
      nameEl.className = 'outline-name';
      nameEl.textContent = outline.name.toLowerCase();
      outlineEl.appendChild(nameEl);

      // Name fades in slowly
      requestAnimationFrame(() => {
        requestAnimationFrame(() => { nameEl.style.opacity = '0.32'; });
      });

      // Hold, then dissolve everything together
      setTimeout(() => {
        outlineEl.style.transition = 'opacity 3.5s ease-out';
        outlineEl.style.opacity = '0';
        setTimeout(() => {
          outlineEl.remove();
          const idx = R.outlines.indexOf(outline);
          if (idx !== -1) R.outlines.splice(idx, 1);
        }, 3800);
      }, 3200);
    } else {
      const idx = R.outlines.indexOf(outline);
      if (idx !== -1) R.outlines.splice(idx, 1);
    }
  }, 6200);
}

// ─────────────────────────────────────────────
//  TROPHIES — the inversion
// ─────────────────────────────────────────────

// Trophy colors — each one has its own temperature
const TROPHY_COLORS = {
  '🏆': [200, 160, 60],
  '🍕': [200, 100, 60],
  '📋': [140, 160, 180],
  '⭐': [220, 200, 80],
  '🧸': [180, 140, 100],
  '🎖️': [160, 140, 180],
  '🫖': [120, 160, 140],
  '🧊': [140, 180, 200],
};

function mountTrophy(trophy) {
  const shelf = document.getElementById('shelf-' + trophy.shelf);
  if (!shelf) return;
  const contents = shelf.querySelector('.shelf-contents');

  const el = document.createElement('div');
  el.className = 'trophy-obj';

  const icon = document.createElement('div');
  icon.className = 'trophy-icon';
  icon.textContent = trophy.emoji;

  const label = document.createElement('div');
  label.className = 'trophy-label';
  label.textContent = trophy.name;

  el.appendChild(icon);
  el.appendChild(label);
  contents.appendChild(el);

  trophy.el = el;

  // Arrival animation — fade in gently
  el.style.opacity = '0';
  el.style.transition = 'opacity 1.8s ease-in';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    el.style.opacity = '1';
  }));

  // Tell the Hall a trophy arrived
  const tcolor = TROPHY_COLORS[trophy.emoji] || [150, 110, 70];
  emitScraggle(trophy.emoji, tcolor, 0.4, 'sr-trophy-' + R.trophyCount);

  // Tap to acknowledge
  el.addEventListener('pointerdown', e => {
    e.preventDefault();
    e.stopPropagation();
    acknowledgeTrophy(trophy);
  });

  R.trophies.push(trophy);
}

function acknowledgeTrophy(trophy) {
  trophy.dustLevel = 0;
  trophy.lastAckAt = Date.now();
  trophy.inverting = false;

  // Clear dust and inversion classes
  trophy.el.classList.remove('dusty-1', 'dusty-2', 'dusty-3',
    'inverting-slide', 'inverting-blink', 'inverting-tilt');

  // Brief flash of warmth
  trophy.el.classList.add('acknowledged');
  setTimeout(() => trophy.el.classList.remove('acknowledged'), 400);
}

function deliverTrophy() {
  // Pick a shelf that has room (prefer shelves with fewer trophies)
  const shelfCounts = { 1: 0, 2: 0 };
  R.trophies.forEach(t => shelfCounts[t.shelf]++);
  const shelf = shelfCounts[1] <= shelfCounts[2] ? 1 : 2;

  const trophy = createTrophy(R.trophyCount, shelf);
  R.trophyCount++;

  // Schedule next delivery
  R.nextTrophyAt = R.interactionCount + 25 + Math.floor(Math.random() * 25);

  mountTrophy(trophy);
}

// Dust tick — runs every 8 seconds
function trophyDustTick() {
  const now = Date.now();
  for (const trophy of R.trophies) {
    const sinceLast = now - trophy.lastAckAt;

    // Dust levels at 15s, 30s, 45s unacknowledged
    const newDust = sinceLast > 45000 ? 3 : sinceLast > 30000 ? 2 : sinceLast > 15000 ? 1 : 0;

    if (newDust !== trophy.dustLevel) {
      trophy.dustLevel = newDust;
      trophy.el.classList.remove('dusty-1', 'dusty-2', 'dusty-3');
      if (newDust > 0) trophy.el.classList.add('dusty-' + newDust);
    }

    // Inversion: at dust level 3, start doing the thing
    if (newDust >= 3 && !trophy.inverting) {
      trophy.inverting = true;
      trophy.el.classList.add('inverting-' + trophy.inversionType);
    }
  }
}

setInterval(trophyDustTick, 8000);

// Check if a trophy should be delivered after each interaction
function checkTrophyDelivery() {
  if (R.interactionCount >= R.nextTrophyAt) {
    // Small delay so it doesn't feel mechanical
    setTimeout(deliverTrophy, 1200 + Math.random() * 2000);
  }
}

// ─────────────────────────────────────────────
//  TAP RENDERER (Flicker)
// ─────────────────────────────────────────────

function mountTapObject(obj, container) {
  // Wire to existing ceiling DOM elements
  obj.el       = document.getElementById('light-bulb');
  obj.coneEl   = document.getElementById('light-cone');
  obj.promptEl = document.getElementById('light-prompt');
  obj.patEl    = document.getElementById('pattern-display');
  obj.zoneEl   = container;
  obj._lightOn = true;
  obj._taps    = [];
  obj._tapTimeout = null;
  obj._nudgeTimer = null;

  // Tap input
  obj.el.addEventListener('pointerdown', e => {
    e.preventDefault();
    if (!obj.cycle || !obj.cycle.waiting) return;
    clearTimeout(obj._nudgeTimer);
    obj.promptEl.classList.remove('nudging');

    obj._taps.push(performance.now());
    const dots = obj.patEl.querySelectorAll('.pat-dot');
    const idx = obj._taps.length - 1;
    if (dots[idx]) dots[idx].classList.add('active');

    clearTimeout(obj._tapTimeout);
    obj._tapTimeout = setTimeout(() => evaluateTap(obj), 1200);
  });
}

function setTapLight(obj, on) {
  obj._lightOn = on;
  obj.el.classList.toggle('on', on);
  obj.coneEl.classList.toggle('on', on);
}

function startTapCycle(obj) {
  if (obj.lifecycleState === 'departed') return;
  stopIdleAnimation(obj);

  // Generate blink sequence from personality
  const pulseCount = Math.round(paramInWindow(obj, 'pulseCount'));
  const gapMs      = paramInWindow(obj, 'gapMs');

  // Build sequence: [onDur, offDur, onDur, offDur, ... , finalPause]
  const seq = [];
  for (let i = 0; i < pulseCount; i++) {
    seq.push(200 + Math.random() * 200); // on duration
    seq.push(gapMs * (0.8 + Math.random() * 0.4)); // gap (near latent)
  }
  seq.push(600 + Math.random() * 400); // trailing pause

  obj.cycle = { seq, pulseCount, gapMs, waiting: false, moving: true };
  obj._taps = [];

  // Run blink sequence
  let i = 0;
  function step() {
    if (obj.lifecycleState === 'departed') return;
    setTapLight(obj, i % 2 === 0);
    const dur = seq[i];
    i++;
    if (i >= seq.length) {
      // Cycle done — ask for taps or loop
      if (Math.random() < obj.exitChance) {
        setTapLight(obj, false);
        obj.cycle.waiting = true;
        obj.cycle.moving = false;
        obj.promptEl.textContent = '— tap —';
        obj.promptEl.classList.remove('nudging');
        // Nudge if ignored
        obj._nudgeTimer = setTimeout(() => {
          if (obj.cycle && obj.cycle.waiting) obj.promptEl.classList.add('nudging');
        }, 4000 + Math.random() * 3000);
        // Render pattern dots
        obj.patEl.innerHTML = '';
        for (let p = 0; p < pulseCount; p++) {
          const dot = document.createElement('div');
          dot.className = 'pat-dot';
          obj.patEl.appendChild(dot);
        }
        return;
      }
      // Loop with possible new sequence
      if (Math.random() < 0.25) {
        setTimeout(() => startTapCycle(obj), 200);
        return;
      }
      i = 0;
    }
    obj._blinkTimer = setTimeout(step, dur);
  }
  step();
}

function evaluateTap(obj) {
  if (!obj.cycle || !obj.cycle.waiting) return;
  const taps = obj._taps;
  const expectedPulses = obj.cycle.pulseCount;
  const expectedGap = obj.cycle.gapMs;

  // Count score — getting the count right matters most, but off-by-one is fine
  const countDiff = Math.abs(taps.length - expectedPulses);
  const countScore = Math.max(0, 1 - countDiff * 0.25);

  // Gap score — rhythm is felt, not measured
  const intervals = [];
  for (let i = 1; i < taps.length; i++) intervals.push(taps[i] - taps[i - 1]);
  let gapScore = 1;
  if (intervals.length > 0) {
    let gapErr = 0;
    for (const iv of intervals) {
      gapErr += Math.min(Math.abs(iv - expectedGap) / (expectedGap + 1), 1);
    }
    gapScore = Math.max(0, 1 - gapErr / intervals.length * 0.6);
  }

  const mechanicalScore = countScore * 0.6 + gapScore * 0.4;

  // Preference proximity
  const actualParams = { pulseCount: taps.length, gapMs: intervals.length > 0 ? intervals.reduce((a, b) => a + b, 0) / intervals.length : 0 };
  const proximity = preferenceProximity(obj, actualParams);

  // Per-object systems
  obj.history.push(mechanicalScore);
  if (obj.history.length > 20) obj.history.shift();
  obj.interactionCount++;
  if (obj.perfectCooldown > 0) obj.perfectCooldown--;
  updateTolerance(obj, mechanicalScore);
  checkPerfect(obj, proximity);
  recordRoomAccuracy(mechanicalScore);
  updateLifecycle(obj, mechanicalScore);
  if (obj.lifecycleState === 'departed') return;
  evolveIdle(obj, mechanicalScore);

  // Reset
  obj.cycle = null;
  obj._taps = [];
  obj.promptEl.textContent = '';
  obj.promptEl.classList.remove('nudging');
  clearTimeout(obj._nudgeTimer);
  obj.patEl.innerHTML = '';
  setTapLight(obj, true);
  startIdleAnimation(obj);

  const pause = 600 + Math.random() * 800;
  setTimeout(() => startTapCycle(obj), pause);
}

// ─────────────────────────────────────────────
//  HOLD RENDERER (Glen)
// ─────────────────────────────────────────────

function mountHoldObject(obj, container) {
  obj.el       = document.getElementById('canister');
  obj.promptEl = document.getElementById('hold-prompt');
  obj.zoneEl   = document.getElementById('canister-zone');
  obj._holdStart = null;
  obj._holdActive = false;

  obj.el.addEventListener('pointerdown', e => {
    if (!obj.cycle || !obj.cycle.waiting) return;
    e.preventDefault();
    obj._holdStart = performance.now();
    obj._holdActive = true;
    obj.promptEl.textContent = '·····';
  });

  obj.el.addEventListener('pointerup', e => {
    if (!obj._holdActive || !obj.cycle || !obj.cycle.waiting) { obj._holdActive = false; return; }
    e.preventDefault();
    const heldFor = performance.now() - obj._holdStart;
    obj._holdActive = false;
    obj.promptEl.textContent = '';
    evaluateHold(obj, heldFor);
  });

  obj.el.addEventListener('pointercancel', () => { obj._holdActive = false; });
}

function startHoldCycle(obj) {
  if (obj.lifecycleState === 'departed') return;
  stopIdleAnimation(obj);

  const straightMs = paramInWindow(obj, 'straightMs');
  const tiltMs     = paramInWindow(obj, 'tiltMs');
  const tiltDir    = Math.random() < 0.5 ? 1 : -1;

  obj.cycle = { straightMs, tiltMs, tiltDir, waiting: false, moving: true };
  obj.el.style.transform = '';

  const straightStart = performance.now();

  function frame(t) {
    if (!obj.cycle || obj.cycle.waiting) return;
    const elapsed = t - straightStart;

    if (elapsed < straightMs) {
      // Standing straight — nothing visible
    } else {
      // Tilting
      const tiltElapsed = elapsed - straightMs;
      const tiltAngle = Math.min(tiltElapsed / tiltMs, 1) * 28 * tiltDir;
      obj.el.style.transform = `rotate(${tiltAngle}deg)`;

      if (tiltElapsed >= tiltMs) {
        obj.cycle.waiting = true;
        obj.cycle.moving = false;
        obj.promptEl.textContent = 'hold';
        return;
      }
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function evaluateHold(obj, heldFor) {
  const straightMs = obj.cycle.straightMs;
  const ratio = Math.abs(heldFor - straightMs) / straightMs;
  const mechanicalScore = Math.max(0, 1 - ratio * 0.7);

  const actualParams = { straightMs: heldFor };
  const proximity = preferenceProximity(obj, actualParams);

  obj.history.push(mechanicalScore);
  if (obj.history.length > 20) obj.history.shift();
  obj.interactionCount++;
  if (obj.perfectCooldown > 0) obj.perfectCooldown--;
  updateTolerance(obj, mechanicalScore);
  checkPerfect(obj, proximity);
  recordRoomAccuracy(mechanicalScore);
  updateLifecycle(obj, mechanicalScore);
  if (obj.lifecycleState === 'departed') return;
  evolveIdle(obj, mechanicalScore);

  obj.cycle = null;
  obj.el.style.transform = '';
  obj.promptEl.textContent = '';
  startIdleAnimation(obj);

  const pause = 800 + Math.random() * 1000;
  setTimeout(() => startHoldCycle(obj), pause);
}

// ─────────────────────────────────────────────
//  SWIPE RENDERER
// ─────────────────────────────────────────────

function startSwipeCycle(obj) {
  if (obj.lifecycleState === 'departed') return;
  stopIdleAnimation(obj);

  const speed    = paramInWindow(obj, 'speed');
  const dir      = Math.random() < 0.5 ? 1 : -1;
  const duration = paramInWindow(obj, 'duration');
  const nChanges = Math.floor(Math.random() * (obj.paramRange.changes[1] + 1));

  const speedChangeAt = [];
  for (let i = 0; i < nChanges; i++) {
    speedChangeAt.push(duration * (0.2 + 0.6 * Math.random()));
  }

  const zw = obj.zoneEl.clientWidth - BOX_W;

  obj.cycle = {
    speed:     speed,
    dir:       dir,
    duration:  duration,
    x:         dir === 1 ? 0 : zw,
    elapsed:   0,
    lastSpeed: speed,
    lastDir:   dir,
    moving:    true,
    waiting:   false,
    speedChangeAt: speedChangeAt,
  };

  obj.el.style.left = obj.cycle.x + 'px';
  runSwipeAnimation(obj);
}

function runSwipeAnimation(obj) {
  const c = obj.cycle;
  if (!c) return;
  let lastT = null;

  function frame(t) {
    if (!c.moving) return;
    if (lastT) {
      const dt = t - lastT;
      c.elapsed += dt;

      // Easing modulates speed through the cycle
      // Derivative of t^p is p*t^(p-1) — preserves total distance
      const progress = Math.min(c.elapsed / c.duration, 1);
      const p = 1 + obj.easeIn * 2;
      const speedMult = p > 1 ? p * Math.pow(Math.max(progress, 0.01), p - 1) : 1;

      c.x += c.dir * c.speed * speedMult * dt;
      const zw = obj.zoneEl.clientWidth - BOX_W;
      if (c.x > zw) { c.x = zw; c.dir *= -1; }
      if (c.x < 0)  { c.x = 0;  c.dir *= -1; }
      obj.el.style.left = c.x + 'px';

      // Speed changes
      c.speedChangeAt.forEach((sc, i) => {
        if (c.elapsed >= sc) {
          c.speedChangeAt[i] = Infinity;
          c.speed = paramInWindow(obj, 'speed');
        }
      });

      c.lastSpeed = c.speed;
      c.lastDir = c.dir;
    }
    lastT = t;

    if (c.elapsed >= c.duration) {
      c.moving = false;
      c.waiting = true;
      obj.zoneEl.classList.add('waiting');
      obj.promptEl.textContent = c.lastDir > 0 ? '→ swipe →' : '← swipe ←';
      return;
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function wireSwipeInput(obj) {
  let startX = null, startT = null;
  let lastMoveX = null, lastMoveT = null;
  let anchorLeft = 0;     // box position when drag started

  // Responsiveness scales with relationship — stiff when new, willing when understood
  // tolerance 1.0 (stranger) → damp 0.12, nudge 6
  // tolerance 0.12 (particular) → damp 0.55, nudge 28
  function dragDamp() {
    const t = obj.tolerance;
    return 0.55 - (0.55 - 0.12) * ((t - 0.12) / 0.88);
  }
  function maxNudge() {
    const t = obj.tolerance;
    return 28 - (28 - 6) * ((t - 0.12) / 0.88);
  }

  obj.zoneEl.addEventListener('pointerdown', e => {
    if (!obj.cycle || !obj.cycle.waiting) return;
    e.preventDefault();
    obj.zoneEl.setPointerCapture(e.pointerId);
    startX = e.clientX;
    startT = performance.now();
    lastMoveX = startX;
    lastMoveT = startT;
    anchorLeft = parseFloat(obj.el.style.left) || 0;

    obj.el.classList.remove('settling', 'resisting');
    obj.el.classList.add('touched');
    obj.zoneEl.classList.add('dragging');
  });

  obj.zoneEl.addEventListener('pointermove', e => {
    if (startX === null || !obj.cycle || !obj.cycle.waiting) return;
    const dx = e.clientX - startX;
    // Box follows more willingly as relationship develops
    const nudge = Math.sign(dx) * Math.min(Math.abs(dx) * dragDamp(), maxNudge());
    const zw = obj.zoneEl.clientWidth - BOX_W;
    const newLeft = Math.max(0, Math.min(zw, anchorLeft + nudge));
    obj.el.style.left = newLeft + 'px';

    // Track recent movement for velocity (last segment is most intentional)
    lastMoveX = e.clientX;
    lastMoveT = performance.now();
  });

  obj.zoneEl.addEventListener('pointerup', e => {
    obj.el.classList.remove('touched');
    obj.zoneEl.classList.remove('dragging');

    if (!obj.cycle || !obj.cycle.waiting || startX === null) {
      startX = null;
      return;
    }

    const dx = e.clientX - startX;
    const dt = performance.now() - startT;

    // Use the full gesture for velocity (down→up)
    const velocity = dx / dt;

    // Evaluate — this will score, update systems, and start next cycle
    const score = evaluateSwipe(obj, velocity);

    // Post-swipe box feedback based on score
    const swipeDir = dx > 0 ? 1 : -1;
    const zw = obj.zoneEl.clientWidth - BOX_W;
    if (score > 0.7) {
      // Good: box drifts further when she knows you
      const willingness = dragDamp(); // higher = more responsive
      const drift = swipeDir * (4 + score * 8 + willingness * 12);
      const driftLeft = Math.max(0, Math.min(zw, anchorLeft + drift));
      obj.el.style.left = driftLeft + 'px';
      setTimeout(() => {
        obj.el.classList.add('settling');
        obj.el.style.left = anchorLeft + 'px';
        setTimeout(() => obj.el.classList.remove('settling'), 550);
      }, 80);
    } else {
      // Poor: box snaps back sharply
      obj.el.classList.add('resisting');
      obj.el.style.left = anchorLeft + 'px';
      setTimeout(() => obj.el.classList.remove('resisting'), 220);
    }

    startX = null;
    lastMoveX = null;
  });

  obj.zoneEl.addEventListener('pointercancel', e => {
    obj.el.classList.remove('touched');
    obj.zoneEl.classList.remove('dragging');
    if (startX !== null && anchorLeft !== undefined) {
      obj.el.style.left = anchorLeft + 'px';
    }
    startX = null;
  });
}

function evaluateSwipe(obj, velocity) {
  const c = obj.cycle;
  const expectedV = c.lastDir * c.lastSpeed;
  const vErr = Math.abs(velocity - expectedV) / (Math.abs(expectedV) + 0.01);
  const mechanicalScore = Math.max(0, 1 - vErr * 0.5);

  // Preference proximity — how close to what the object actually wants
  const actualParams = {
    speed: Math.abs(velocity),
    dir:   velocity > 0 ? 1 : -1,
  };
  const proximity = preferenceProximity(obj, actualParams);

  // Per-object history
  obj.history.push(mechanicalScore);
  if (obj.history.length > 20) obj.history.shift();
  obj.interactionCount++;
  if (obj.perfectCooldown > 0) obj.perfectCooldown--;

  // Tolerance narrows toward latent preference
  updateTolerance(obj, mechanicalScore);

  // The quiet acknowledgment
  checkPerfect(obj, proximity);

  // Feed room-wide system
  recordRoomAccuracy(mechanicalScore);

  // Lifecycle transitions and departure check
  updateLifecycle(obj, mechanicalScore);
  if (obj.lifecycleState === 'departed') return mechanicalScore; // she's gone

  // Idle evolves
  evolveIdle(obj, mechanicalScore);

  // Clear cycle, start idle sway in the gap
  obj.cycle = null;
  obj.promptEl.textContent = '';
  obj.zoneEl.classList.remove('waiting', 'dragging');
  startIdleAnimation(obj);

  // Schedule next
  const pause = 700 + Math.random() * 1200;
  setTimeout(() => startSwipeCycle(obj), pause);

  return mechanicalScore;
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────

// Create and mount all objects
const flicker = createObject('flicker');
mountObject(flicker);

const brenda = createObject('brenda');
mountObject(brenda);

const glen = createObject('glen');
mountObject(glen);

// Start all systems
setTimeout(() => startTapCycle(flicker), 800);
setTimeout(() => startSwipeCycle(brenda), 400);
setTimeout(() => startHoldCycle(glen), 1200);

</script>
