<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chunxly's Canvas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');
:root{
  --bg:#13110e;--surface:#1c1914;--surface2:#221f1a;
  --border:rgba(255,230,180,0.08);--border2:rgba(255,230,180,0.14);
  --amber:#d4a84b;--teal:#5ec4a8;--cold:#8ab4c4;
  --muted:rgba(255,230,180,0.28);--text:rgba(255,230,180,0.82);
  --mono:'IBM Plex Mono',monospace;--serif:'Lora',serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);min-height:100dvh;font-family:var(--serif);color:var(--text);
  display:flex;flex-direction:column;align-items:center;overflow-x:hidden;
  touch-action:none;user-select:none;}
body::after{content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:999;opacity:.5;}

/* ── header ── */
.hdr{width:100%;max-width:540px;display:flex;align-items:baseline;justify-content:space-between;padding:11px 16px 5px;flex-shrink:0;}
.logo{font-family:var(--mono);font-size:.6rem;color:rgba(255,230,180,.22);letter-spacing:.18em;text-transform:uppercase;}
.phase-tag{font-family:var(--mono);font-size:.55rem;color:rgba(255,230,180,.16);letter-spacing:.1em;}

/* ── voices ── */
.voices{width:calc(100% - 28px);max-width:512px;border:1px solid var(--border2);border-radius:8px;overflow:hidden;background:var(--surface);flex-shrink:0;margin-bottom:6px;}
.vrow{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;min-height:34px;}
.vrow.int-row{border-bottom:1px solid var(--border);}
.vtag{font-family:var(--mono);font-size:.48rem;letter-spacing:.1em;padding:2px 4px;border-radius:2px;flex-shrink:0;margin-top:2px;text-transform:uppercase;}
.vtag-i{background:rgba(138,180,196,.1);color:var(--cold);}
.vtag-o{background:rgba(94,196,168,.1);color:var(--teal);}
.vtext{font-size:.7rem;line-height:1.55;flex:1;}
.vtext-i{color:rgba(138,180,196,.72);font-family:var(--mono);font-size:.6rem;font-style:italic;}
.vtext-o{color:rgba(94,196,168,.88);font-family:var(--serif);}
@keyframes intFlash{0%{background:rgba(212,168,75,.1);}100%{background:transparent;}}
.vrow.int-row.flash{animation:intFlash .7s ease-out;}

/* ── workspace ── */
.workspace{position:relative;width:calc(100% - 28px);max-width:512px;aspect-ratio:1;
  border:1px solid var(--border2);border-radius:8px;overflow:hidden;background:var(--surface);flex-shrink:0;}
#mainCanvas{display:block;width:100%;height:100%;cursor:crosshair;}

/* ── drop zone overlay ── */
.drop-zone{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:var(--surface);z-index:10;transition:opacity .4s;}
.drop-zone.hidden{opacity:0;pointer-events:none;}
.drop-border{width:calc(100% - 40px);height:calc(100% - 40px);border:2px dashed rgba(255,230,180,.12);border-radius:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:border-color .3s;}
.drop-zone.drag-over .drop-border{border-color:var(--amber);}
.drop-label{font-family:var(--mono);font-size:.6rem;color:rgba(255,230,180,.25);letter-spacing:.12em;text-transform:uppercase;}
.drop-or{font-family:var(--mono);font-size:.5rem;color:rgba(255,230,180,.14);letter-spacing:.1em;}
.btn{padding:8px 18px;border:1px solid rgba(255,230,180,.12);border-radius:6px;background:rgba(255,230,180,.04);
  color:rgba(255,230,180,.5);font-family:var(--mono);font-size:.58rem;cursor:pointer;letter-spacing:.1em;
  text-transform:uppercase;transition:all .2s;}
.btn:hover{background:rgba(255,230,180,.08);color:rgba(255,230,180,.7);border-color:rgba(255,230,180,.2);}

/* ── drawing toolbar (blank canvas mode) ── */
.draw-bar{position:absolute;top:8px;left:8px;display:flex;gap:5px;z-index:5;opacity:0;pointer-events:none;transition:opacity .3s;}
.draw-bar.show{opacity:1;pointer-events:all;}
.draw-swatch{width:22px;height:22px;border-radius:4px;border:2px solid transparent;cursor:pointer;transition:border-color .2s;}
.draw-swatch.active{border-color:var(--amber);}
.draw-size{width:22px;height:22px;border-radius:4px;border:1px solid rgba(255,230,180,.12);background:rgba(255,230,180,.04);
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;}
.draw-size.active{border-color:var(--amber);background:rgba(212,168,75,.12);}
.draw-size-dot{border-radius:50%;background:rgba(255,230,180,.5);}

/* ── bottom bar ── */
.bar{width:calc(100% - 28px);max-width:512px;display:flex;align-items:center;justify-content:space-between;
  padding:6px 0;flex-shrink:0;gap:8px;margin-top:4px;}
.bar-left{display:flex;gap:6px;align-items:center;}
.node-count{font-family:var(--mono);font-size:.52rem;color:rgba(255,230,180,.22);letter-spacing:.08em;}
.bar-right{display:flex;gap:6px;}

/* ── Chunxly sprite ── */
.sprite-wrap{position:absolute;z-index:6;pointer-events:none;transition:left .6s cubic-bezier(.4,0,.2,1),top .6s cubic-bezier(.4,0,.2,1);}
#spriteCanvas{display:block;}

/* ── CrankSeed reveal panel ── */
.seed-panel{width:calc(100% - 28px);max-width:512px;border:1px solid var(--border2);border-radius:8px;
  background:var(--surface);margin-top:6px;overflow:hidden;flex-shrink:0;
  display:none;animation:seedReveal .5s cubic-bezier(.4,0,.2,1);}
.seed-panel.show{display:block;}
@keyframes seedReveal{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.seed-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:7px 11px;border-bottom:1px solid var(--border);}
.seed-hdr-label{font-family:var(--mono);font-size:.52rem;letter-spacing:.14em;
  text-transform:uppercase;color:var(--amber);}
.seed-copy{font-family:var(--mono);font-size:.5rem;letter-spacing:.08em;
  text-transform:uppercase;color:rgba(255,230,180,.3);cursor:pointer;
  padding:2px 6px;border:1px solid rgba(255,230,180,.1);border-radius:3px;
  transition:all .2s;background:none;}
.seed-copy:hover{color:var(--amber);border-color:var(--amber);}
.seed-body{padding:10px 11px;display:flex;flex-direction:column;gap:6px;}
.seed-row{display:flex;align-items:baseline;gap:8px;}
.seed-key{font-family:var(--mono);font-size:.5rem;color:rgba(255,230,180,.3);
  letter-spacing:.08em;text-transform:uppercase;min-width:90px;flex-shrink:0;}
.seed-val{font-family:var(--mono);font-size:.6rem;color:rgba(255,230,180,.85);word-break:break-all;}
.seed-swatch{display:inline-block;width:10px;height:10px;border-radius:2px;
  margin-right:5px;vertical-align:middle;border:1px solid rgba(255,255,255,.1);}
.seed-divider{height:1px;background:var(--border);margin:2px 0;}
.seed-aspect{background:rgba(255,230,180,.03);border:1px solid var(--border);
  border-radius:4px;padding:6px 8px;display:flex;flex-direction:column;gap:3px;}
.seed-aspect-role{font-family:var(--mono);font-size:.48rem;letter-spacing:.1em;
  text-transform:uppercase;color:var(--teal);margin-bottom:1px;}

/* ── notification ── */
.notif{position:fixed;top:0;left:50%;transform:translateX(-50%) translateY(-110%);background:var(--surface2);
  border:1px solid var(--border2);border-top:none;border-bottom-left-radius:7px;border-bottom-right-radius:7px;
  padding:6px 14px;font-family:var(--mono);font-size:.58rem;color:var(--cold);letter-spacing:.05em;
  z-index:500;opacity:0;transition:transform .38s cubic-bezier(.34,1.56,.64,1),opacity .38s;white-space:nowrap;}
.notif.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── Chunxme's Stall ── */
.stall-name-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;}
.stall-name-label{font-family:var(--mono);font-size:.55rem;color:rgba(255,230,180,.3);letter-spacing:.12em;text-transform:uppercase;}
.stall-name-input{background:rgba(255,230,180,.04);border:1px solid rgba(255,230,180,.12);border-radius:6px;
  padding:10px 16px;font-family:var(--serif);font-size:.85rem;color:var(--text);text-align:center;
  width:220px;outline:none;transition:border-color .2s;}
.stall-name-input:focus{border-color:var(--amber);}
.stall-name-input::placeholder{color:rgba(255,230,180,.18);font-style:italic;}
.stall-item-panel{width:calc(100% - 28px);max-width:512px;border:1px solid var(--border2);border-radius:8px;
  background:var(--surface);margin-top:6px;overflow:hidden;flex-shrink:0;
  display:none;animation:seedReveal .5s cubic-bezier(.4,0,.2,1);}
.stall-item-panel.show{display:block;}
.stall-item-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.stall-item-name{font-family:var(--serif);font-size:.95rem;color:var(--amber);font-weight:600;}
.stall-item-chunxme-name{font-family:var(--mono);font-size:.6rem;color:var(--teal);letter-spacing:.08em;}
.stall-item-desc{font-family:var(--serif);font-size:.72rem;color:var(--text);line-height:1.6;font-style:italic;}
.stall-item-tags{display:flex;gap:6px;flex-wrap:wrap;}
.stall-item-tag{font-family:var(--mono);font-size:.48rem;letter-spacing:.08em;text-transform:uppercase;
  padding:2px 6px;border-radius:3px;background:rgba(255,230,180,.05);color:rgba(255,230,180,.4);
  border:1px solid rgba(255,230,180,.08);}
.stall-item-color{width:14px;height:14px;border-radius:3px;border:1px solid rgba(255,255,255,.1);}
.stall-consent{display:flex;gap:8px;margin-top:4px;}
.stall-keep{display:flex;align-items:center;gap:10px;margin-top:6px;padding-top:8px;
  border-top:1px solid rgba(255,230,180,.06);}
.stall-thumb{width:48px;height:48px;border-radius:4px;border:1px solid rgba(255,255,255,.08);
  image-rendering:pixelated;object-fit:cover;}
.stall-keep-label{font-family:var(--mono);font-size:.48rem;color:rgba(255,230,180,.3);
  letter-spacing:.08em;text-transform:uppercase;}
</style>
</head>
<body>
<div class="notif" id="notif"></div>
<div class="hdr">
  <div class="logo">Chunxly's Canvas</div>
  <div class="phase-tag" id="phaseTag">waiting</div>
</div>
<div class="voices">
  <div class="vrow int-row" id="intRow">
    <span class="vtag vtag-i">int</span>
    <span class="vtext vtext-i" id="intText">Canvas is blank. I have my beret. I have my brush. I am ready to see something.</span>
  </div>
  <div class="vrow">
    <span class="vtag vtag-o">out</span>
    <span class="vtext vtext-o" id="outText">Drop an image, or start fresh.</span>
  </div>
</div>
<div class="workspace" id="workspace">
  <canvas id="mainCanvas"></canvas>
  <div class="drop-zone" id="dropZone">
    <div class="drop-border" id="dropBorder">
      <div class="drop-label" id="dropLabel">drop a png for chunxly</div>
      <div class="drop-or" id="dropOr">or</div>
      <button class="btn" id="btnBlank">blank canvas</button>
      <button class="btn" id="btnCompare" style="display:none;">let chunxly compare</button>
    </div>
  </div>
  <div class="draw-bar" id="drawBar"></div>
  <div class="sprite-wrap" id="spriteWrap" style="left:16px;top:16px;">
    <canvas id="spriteCanvas" width="80" height="80"></canvas>
  </div>
</div>
<div class="bar">
  <div class="bar-left">
    <span class="node-count" id="nodeCount"></span>
  </div>
  <div class="bar-right">
    <button class="btn" id="btnSee" style="display:none;">let chunxly see</button>
    <button class="btn" id="btnFinish" style="display:none;">finish</button>
  </div>
</div>

<div class="seed-panel" id="seedPanel">
  <div class="seed-hdr">
    <span class="seed-hdr-label">CrankSeed</span>
    <button class="seed-copy" id="seedCopy">copy json</button>
  </div>
  <div class="seed-body" id="seedBody"></div>
</div>
<div class="stall-item-panel" id="stallItemPanel">
  <div class="stall-item-body" id="stallItemBody"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  Chunxly's Canvas — creature authoring tool
// ═══════════════════════════════════════════════════════

// ── state ──
const S = {
  phase: 'landing',   // landing | drawing | analyzing | daubing | visitor | done
  nodes: [],          // { id, x, y, color:[r,g,b], type, strength, direction, source }
  edges: [],          // { from, to, source }
  nextId: 0,
  imageData: null,    // ImageData from dropped/drawn image
  imageCanvas: null,  // offscreen canvas with the image
  imgW: 0, imgH: 0,
  // drawing state
  drawColor: [180, 140, 90],
  drawSize: 8,
  isDrawing: false,
  // interaction state
  dragNode: null,
  connectFrom: null,
  hoverNode: null,
  // chunxly animation
  chunxly: { x: 16, y: 16, targetX: 16, targetY: 16, expression: 'idle', daubQueue: [], daubIdx: 0, busy: false },
  // ping-pong
  suggestTimer: null,
  suggestEdge: null,
  // canvas sizing
  canvasSize: 512,
  // stall mode
  stallMode: false,
  stallName: '',
  chunxlySurfacingItem: null,
};

const PX = 5; // sprite pixel size
const SPRITE_CELLS = 16;

// ── DOM refs ──
const $canvas = document.getElementById('mainCanvas');
const $ctx = $canvas.getContext('2d');
const $drop = document.getElementById('dropZone');
const $drawBar = document.getElementById('drawBar');
const $sprite = document.getElementById('spriteCanvas');
const $sctx = $sprite.getContext('2d');
const $spriteWrap = document.getElementById('spriteWrap');

// ── colors for drawing palette ──
const DRAW_COLORS = [
  [220, 180, 140], [90, 158, 58], [85, 136, 204],
  [196, 96, 96], [160, 120, 200], [50, 50, 55], [230, 225, 215]
];
const DRAW_SIZES = [4, 8, 16];

// ── voice system ──
const VOICE = {
  landing: [
    ["Canvas is blank. I have my beret. I have my brush. I am ready to see something.",
     "Drop an image, or start fresh."],
  ],
  image_load: [
    ["An image. I can see colors in it already. I want to look closer. I am going to look closer.",
     "Oh! Let me see this."],
    ["Something to look at. I am noting the dimensions and the warmth. There is warmth in this.",
     "Mm. This is good."],
    ["The visitor brought something. I can feel where the color gathers. I am preparing my brush.",
     "There's a lot here."],
  ],
  blank_start: [
    ["A blank canvas. The visitor will draw first. I will watch carefully. I am watching.",
     "Go ahead — I'll watch."],
    ["Nothing yet. But the visitor has colors. I am patient. I am noting my patience.",
     "Draw something. I'm here."],
  ],
  blank_see: [
    ["The visitor says it's ready. I can see what they drew. I am going to find the interesting parts.",
     "Let me look..."],
    ["They want me to see it now. I will be thorough. I am always thorough.",
     "Oh! I see things already."],
  ],
  daub: [
    ["I see warmth here. I am drawing a {type} around it. The color wants to be held.",
     "There."],
    ["This part has presence. A {type} to contain it. I considered the size. This is right.",
     "Mm."],
    ["Edge. Clear edge. I am scribbling a {type} here. Tight. The boundary matters.",
     "Oh, this part."],
    ["Color gathers here like it meant to. A {type}. I am circling it so it knows I noticed.",
     "Here."],
    ["Interesting spot. High contrast. I see something the visitor might not see yet. A {type}.",
     "...yes."],
    ["Soft area. Color just sits here. A {type} for sitting color. Big and loose.",
     "Gentle one."],
    ["Something lives here. Not sure what yet. But I can draw around it. A {type}.",
     "This."],
    ["The color is dense here. I am making the boundary tight. A {type}.",
     "Hm. Dense."],
  ],
  daub_certain: [
    ["I keep seeing this one. Every time I look, it's there. It's real.",
     "This one I'm sure of."],
    ["Consistent. The color, the edge — it holds across every look. I trust this mark.",
     "Solid."],
  ],
  daub_tentative: [
    ["This appeared once. I'm noting it but I'm not certain. It might be noise. It might not.",
     "Maybe..."],
    ["Uncertain. I saw it, but only briefly. I'll mark it lightly.",
     "Hmm."],
  ],
  daub_done: [
    ["I placed {n} containers. I looked several times. {certain} feel solid, {tentative} are guesses. The visitor can work now.",
     "Your turn. Connect them, move them — it's yours now."],
    ["All my marks are down. {n} points of interest — {certain} I'm sure of. Now the visitor shapes them.",
     "I found {n} things. What do you see?"],
  ],
  visitor_connect: [
    ["The visitor connected two nodes. I see the relationship now. I didn't see it before. I am noting it.",
     "Oh — yes."],
    ["A connection. The visitor sees something between those two. I trust this.",
     "Mm, that works."],
    ["They drew a line. I wouldn't have drawn that one. But I understand it now that it's there.",
     "Interesting."],
  ],
  visitor_rearrange: [
    ["Moved. The visitor moved one of my marks. The new position might be better. I am considering it.",
     "Ah."],
    ["Rearranging. This is the visitor's right. The composition changes. I am watching it change.",
     "Go on."],
  ],
  suggest: [
    ["Those two feel related. I want to connect them. I think they should know each other.",
     "These two..."],
    ["I see proximity and color affinity. A connection would complete something here. I am suggesting.",
     "What about these?"],
  ],
  finish: [
    ["The creature is described. {n} nodes, {e} connections. I did my part. The visitor did theirs. It is whole.",
     "It's ready. A creature."],
    ["Finished. The configuration is written. Something will read this and become it. I helped make that.",
     "There it is."],
  ],
  fairy_first_vision: [
    ["The fairy is here. She sees something I didn't name. I am watching her.",
     "Oh."],
  ],
  fairy_done: [
    ["She showed me things. I understand the shape better now. We did this together.",
     "There."],
  ],
  idle_watch: [
    ["The visitor is thinking. I am also thinking. We are thinking at the same time.",
     "..."],
    ["Nothing happening. I am studying what we have so far. I like what we have so far.",
     "Take your time."],
    ["The visitor left that one alone. I think that's right.",
     "Mm."],
  ],
  compare_start: [
    ["The maze transformed my work. I want to see what it kept. I am looking carefully.",
     "Let me look at what came back."],
    ["Something came back from the maze. It won't be the same. I am preparing to compare.",
     "The maze had its say. Let me see."],
  ],
  compare_done: [
    ["I see it now. {preserved} held, {shifted} moved, {lost} gone. The maze added {emergent} of its own. I am noting all of this.",
     "{preserved} stayed. {emergent} are new."],
    ["The maze kept {preserved} of mine. Changed {shifted}. Lost {lost}. Found {emergent} I didn't see. This is interesting.",
     "Some stayed. Some changed. Some are new."],
  ],
  compare_preserved: [
    ["This one survived. The maze agreed with me. I am satisfied.",
     "Still here."],
  ],
  compare_shifted: [
    ["This moved. The maze saw it differently. I am noting the difference.",
     "It shifted."],
  ],
  compare_emergent: [
    ["The maze found something I didn't see. Interesting. I am noting my surprise.",
     "That's new."],
  ],
  // ── Chunxme's Stall voices ──
  stall_landing: [
    ["A visitor. No image, no brief. Just a visitor. I have my mustache. What will they make?",
     "Hello! Name your thing first — then we'll draw it."],
    ["Empty canvas. A stranger. I am ready to be generous. I am always generous in the stall.",
     "What are you making today?"],
  ],
  stall_name_received: [
    ["They said '{name}'. I don't know what that is yet. That's the good part.",
     "'{name}'! Perfect. Now show me."],
    ["'{name}'. I can already feel something. I am trying not to get ahead of myself.",
     "'{name}' — okay. Draw it for me."],
  ],
  stall_interpreting: [
    ["I'm looking at what they made. I see things. I always see things. I am being honest.",
     "Let me see what we've got here..."],
    ["The drawing is in front of me. I am finding the real thing inside it. It is in there.",
     "Oh, there's something here."],
  ],
  stall_reveal: [
    ["There it is. I named it and described it. The visitor's version is the true version. Mine is just what I see.",
     "There — that's what you made."],
    ["I found the thing inside their drawing. I may be wrong about the details. I am not wrong that something is there.",
     "It's real. It exists now."],
  ],
  stall_chunxly_stirs: [
    ["Wait. Something is happening. I see something here that is — I want to take the mustache off for a moment. Just a moment.",
     "Oh. Oh, I actually see something. Mind if I — may I paint this properly?"],
  ],
  stall_chunxly_declined: [
    ["They said no. That's fine. That's their right. I am putting the mustache back on. I liked the mustache anyway.",
     "Of course. It's yours as it is."],
  ],
  stall_chunxly_handoff: [
    ["The mustache is off. My real tools are on the bar. I'm handing them the brush — my brush. They'll know what to do. They already showed me they would.",
     "Here — my palette, my brushes. Paint over what you started. I trust you with it."],
    ["I don't do this. I don't hand someone my tools. But look at what they drew. They earned this.",
     "The full set. Smaller brush, bigger brush, one more color. Your drawing stays — build on it."],
  ],
  stall_chunxly_repainted: [
    ["They painted with my tools. On top of what they already made. I want to see what they did to it.",
     "Let me see what you made of it."],
    ["It's different now. They took what was theirs and added what was mine. That's — I need to look at this carefully.",
     "Show me."],

// picker state (null = closed)
S.picker = null; // { visionIndex, x, y, tiles: [{emoji, tx, ty, radius}] }

function visionAt(x, y) {
  // find a settled vision near (x,y) — check from newest to oldest
  const FLOAT_DIST = 28;
  for (let i = S.fairy.visions.length - 1; i >= 0; i--) {
    const v = S.fairy.visions[i];
    if (v.age < 48) continue; // still bursting
    const vy = v.y - FLOAT_DIST;
    const dx = x - v.x, dy = y - vy;
    if (Math.sqrt(dx * dx + dy * dy) < 16 * v.scale) return i;
  }
  return -1;
}

function openPicker(visionIndex, cx, cy) {
  // arrange ~10 emoji in a loose organic ring around the tap point
  const count = 10;
  const pool = [];
  // pick a sample from the palette — loosely relevant but with some randomness
  const shuffled = [...PICKER_PALETTE].sort(() => Math.random() - 0.5);
  for (let i = 0; i < count - 1 && i < shuffled.length; i++) pool.push(shuffled[i]);
  pool.push(PICKER_UNKNOWN); // always last

  const tiles = pool.map((emoji, i) => {
    const angle = (Math.PI * 2 * i / pool.length) + (Math.random() - 0.5) * 0.3;
    const dist = 32 + Math.random() * 12;
    return {
      emoji,
      tx: cx + Math.cos(angle) * dist,
      ty: cy + Math.sin(angle) * dist,
      radius: 12,
      rotation: (Math.random() - 0.5) * 0.2,
    };
  });

  S.picker = { visionIndex, x: cx, y: cy, tiles };
  render();
}

function closePicker() {
  S.picker = null;
  render();
}

function pickerTileAt(x, y) {
  if (!S.picker) return null;
  for (const tile of S.picker.tiles) {
    const dx = x - tile.tx, dy = y - tile.ty;
    if (Math.sqrt(dx * dx + dy * dy) < tile.radius + 4) return tile;
  }
  return null;
}

function renderPicker(ctx) {
  if (!S.picker) return;
  const p = S.picker;

  // dim background ring
  ctx.fillStyle = 'rgba(23,20,15,0.3)';
  ctx.beginPath();
  ctx.arc(p.x, p.y, 52, 0, Math.PI * 2);
  ctx.fill();

  for (const tile of p.tiles) {
    // glow under each tile
    ctx.fillStyle = 'rgba(255,240,200,0.08)';
    ctx.beginPath();
    ctx.arc(tile.tx, tile.ty, tile.radius, 0, Math.PI * 2);

    ctx.translate(tile.tx, tile.ty);
    ctx.rotate(tile.rotation);
    ctx.font = '14px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(tile.emoji, 0, 0);
    ctx.restore();

}

// ── connectivity helper (shared by seep, export, corridor width) ──
function getConnectedNodeIds(nodeId) {
  const connIds = new Set();
  S.edges.forEach(e => {
    if (e.from === nodeId) connIds.add(e.to);
    if (e.to === nodeId) connIds.add(e.from);
  });
  (S.fairy.diamonds || []).forEach(d => {
    if (d.nodeA === nodeId) connIds.add(d.nodeB);
    if (d.nodeB === nodeId) connIds.add(d.nodeA);
  });
  return connIds;
}

function pickFairyEmoji(node, diamonds) {
  const bw = node.fairyBodyWeight ?? 0;
  const as = node.fairyAccentScore ?? 0;
  const conv = node.conviction ?? 1;
  const role = node.structuralRole || 'detail';

  // count diamonds involving this node
  const myDiamonds = diamonds.filter(d => d.nodeA === node.id || d.nodeB === node.id);
  const diamondCount = myDiamonds.length;

  // check for strong symmetry or direction in connected diamonds
  const symCount = myDiamonds.filter(d => d.symmetric).length;
  const dirCount = myDiamonds.filter(d => d.direction !== 'none').length;
  const symRatio = diamondCount > 0 ? symCount / diamondCount : 0;
  const dirRatio = diamondCount > 0 ? dirCount / diamondCount : 0;

  // check for color similarity with connected nodes (mirror signal)
  let mirrorSignal = 0;
  for (const d of myDiamonds) {
    if (!d.symmetric) continue;
    const otherId = d.nodeA === node.id ? d.nodeB : d.nodeA;
    const other = S.nodes.find(n => n.id === otherId);
    if (!other) continue;
    const [nH] = rgbToHsl(...node.color);
    const [oH] = rgbToHsl(...other.color);
    const hueDist = Math.min(Math.abs(nH - oH), 360 - Math.abs(nH - oH));
    if (hueDist < 30) mirrorSignal += 0.5;
  }
  mirrorSignal = Math.min(1, mirrorSignal);

  // score each vocab pool
  const scores = {};
  scores.body_core  = (role === 'body' ? 0.6 : 0) + bw * 0.3 + symRatio * 0.1;
  scores.limb_reach = (role === 'limb' ? 0.5 : 0) + dirRatio * 0.3 + (1 - bw) * 0.1 + as * 0.1;
  scores.accent_tip = (role === 'accent' ? 0.5 : 0) + as * 0.3 + (1 - conv) * 0.2;
  scores.detail_eye = (role === 'detail' ? 0.4 : 0) + conv * 0.3 + (diamondCount <= 1 ? 0.2 : 0) + (bw < 0.2 ? 0.1 : 0);
  scores.ambient    = (bw < 0.2 ? 0.3 : 0) + (conv < 0.5 ? 0.3 : 0) + (node.size > 30 ? 0.2 : 0);
  scores.flow       = dirRatio * 0.6 + (1 - symRatio) * 0.2;
  scores.mirror     = mirrorSignal * 0.5 + symRatio * 0.3 + (role === 'body' ? 0.1 : 0);
  scores.outlier    = (diamondCount <= 1 ? 0.5 : 0) + (diamondCount === 0 ? 0.3 : 0) + as * 0.1;

  // sort pools by score descending
  const ranked = Object.entries(scores).sort((a, b) => b[1] - a[1]);

  // record winning pool on node — used by seep propagation for role hints
  node.fairyPool = ranked[0][0];

  // primary pool — pick from top scorer
  const topPool = FAIRY_VOCAB[ranked[0][0]];
  const primary = topPool[Math.floor(Math.random() * topPool.length)];

  // ~25% chance of combination if second pool is also strong (score > 0.35)
  if (ranked[1][1] > 0.35 && Math.random() < 0.25) {
    const secPool = FAIRY_VOCAB[ranked[1][0]];
    const secondary = secPool[Math.floor(Math.random() * secPool.length)];
    if (secondary !== primary) return primary + secondary;
  }

  // ~10% surprise — pick from an adjacent pool instead
  if (Math.random() < 0.1 && ranked.length > 1) {
    const surprisePool = FAIRY_VOCAB[ranked[1][0]];
    return surprisePool[Math.floor(Math.random() * surprisePool.length)];
  }

  return primary;
}

// ── seep propagation ──
// when fairy designates a node, a fraction bleeds to connected neighbors
function propagateSeep(node) {
  const emoji = node.fairyEmoji;
  const pool = node.fairyPool;
  if (!emoji) return;
  const neighbors = getConnectedNodeIds(node.id);
  for (const nid of neighbors) {
    const nb = S.nodes.find(n => n.id === nid);
    if (!nb || nb.fairyEmoji) continue; // fairy-direct always wins
    if (!nb.seepInfluence) nb.seepInfluence = {};
    if (!nb.seepRoleHints) nb.seepRoleHints = {};
    nb.seepInfluence[emoji] = (nb.seepInfluence[emoji] || 0) + SEEP_WEIGHT;
    if (pool) nb.seepRoleHints[pool] = (nb.seepRoleHints[pool] || 0) + SEEP_WEIGHT;
  }
}

// fairy state
S.fairy = {

  targetX: -50, targetY: -50,

function fairyPalette() {
  // return palette with body tinted to absorbed color
  const [cr, cg, cb] = S.fairy.color;
  return {
    'w': [180, 200, 220, 0.3],
    'W': [220, 240, 255, 0.5],

    'g': [cr, cg, cb, 0.25],
    '.': null,
  };
}

function renderFairy(ctx) {
  if (!S.fairy.visible) return;
  const f = S.fairy;
  const rows = FAIRY_DATA[f.expression] || FAIRY_DATA.idle;
  const pal = fairyPalette();
  const px = FAIRY_PX;
  const ox = f.x - (FAIRY_SIZE * px) / 2;
  const oy = f.y - (FAIRY_SIZE * px) / 2;

  // subtle glow behind fairy
  const [cr, cg, cb] = f.color;
  const glowAlpha = 0.08 + Math.sin(f.wingPhase * 0.1) * 0.04;
  ctx.fillStyle = `rgba(${cr},${cg},${cb},${glowAlpha})`;
  ctx.beginPath();
  ctx.arc(f.x, f.y, 14, 0, Math.PI * 2);
  ctx.fill();

  for (let r = 0; r < rows.length; r++) {
    for (let c = 0; c < rows[r].length; c++) {
      const ch = rows[r][c];
      const col = pal[ch];
      if (!col) continue;
      if (col.length === 4) {
        ctx.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},${col[3]})`;
      } else {
        ctx.fillStyle = `rgb(${col[0]},${col[1]},${col[2]})`;
      }
      ctx.fillRect(ox + c * px, oy + r * px, px, px);
    }
  }
}

function renderVisions(ctx) {
  // ── seep labels: quiet inheritance from neighbors ──
  // render BEFORE fairy visions so they sit underneath
  if (S.fairy.settled) {
    const maxSeep = Math.max(0.01, ...S.nodes.map(n => n.seepWeight || 0));
    for (const n of S.nodes) {
      if (!n.seepEmoji || n.fairyEmoji) continue; // fairy-direct takes precedence
      const [cr, cg, cb] = n.color;
      const seepAlpha = 0.35 + 0.25 * (n.seepWeight / maxSeep); // 0.35–0.60
      const floatY = n.y - 22; // float above node, less than fairy visions

      // cool teal glow (distinguished from fairy's warm amber)
      const glowR = 14;
      ctx.fillStyle = `rgba(80,${Math.min(255, cg + 60)},${Math.min(255, cb + 40)},${(seepAlpha * 0.3).toFixed(2)})`;
      ctx.beginPath();
      ctx.arc(n.x, floatY, glowR, 0, Math.PI * 2);
      ctx.fill();

      // emoji text at reduced opacity
      ctx.save();
      ctx.translate(n.x, floatY);
      ctx.globalAlpha = seepAlpha;
      ctx.font = '18px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(n.seepEmoji, 0, 0);
      ctx.restore();
      ctx.globalAlpha = 1;
    }
  }

  const visions = S.fairy.visions;
  if (!visions || visions.length === 0) return;

  const BURST_FRAMES = 48; // ~0.8s at 60fps
  const FLOAT_DIST = 28;   // emoji floats above conjuration point

  for (const v of visions) {
    const node = S.nodes.find(n => n.id === v.nodeId);
    if (!node) continue;
    const [cr, cg, cb] = node.color;

    // glitter burst — active during first 48 frames
    if (v.age < BURST_FRAMES) {
      const progress = v.age / BURST_FRAMES;
      const burstAlpha = 1 - progress;
      for (let i = 0; i < v.glitter.length; i++) {
        const g = v.glitter[i];
        const gx = v.x + g.dx * progress * g.dist;
        const gy = v.y + g.dy * progress * g.dist;
        const radius = 1.5 + g.size * (1 - progress * 0.5);
        const alpha = burstAlpha * g.alpha;
        ctx.fillStyle = `rgba(${cr},${cg},${cb},${alpha.toFixed(2)})`;
        ctx.beginPath();
        ctx.arc(gx, gy, radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // emoji label — fades in as burst progresses, then stays
    const burstDone = v.age >= BURST_FRAMES;
    const floatT = burstDone ? 1 : Math.min(1, v.age / BURST_FRAMES);
    const easeT = floatT < 1 ? floatT * floatT * (3 - 2 * floatT) : 1; // smoothstep
    const emojiY = v.y - easeT * FLOAT_DIST;
    const emojiAlpha = Math.min(1, v.age / 20); // fade in over ~0.33s

    // glow underneath — warm halo so emoji reads against any background
    const glowR = 18 * v.scale;
    const glowA = (v.isVisitor ? 0.22 : 0.16) * emojiAlpha;
    const tintR = v.isVisitor ? Math.min(255, cr + 30) : cr;
    const tintG = v.isVisitor ? cg : cg;
    const tintB = v.isVisitor ? Math.max(0, cb - 20) : cb;
    ctx.fillStyle = `rgba(${tintR},${tintG},${tintB},${glowA.toFixed(2)})`;
    ctx.beginPath();
    ctx.arc(v.x, emojiY, glowR, 0, Math.PI * 2);
    ctx.fill();

    // emoji text
    ctx.save();
    ctx.translate(v.x, emojiY);
    ctx.rotate(v.rotation);
    ctx.globalAlpha = emojiAlpha;
    ctx.font = `${Math.round(22 * v.scale)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(v.emoji, 0, 0);
    ctx.restore();
    ctx.globalAlpha = 1;
  }
}

// trace a color path between two points on the image
// returns { widths: number[], avgWidth, samples: [{x,y,color}] }
function traceColorPath(ax, ay, bx, by) {
  if (!S.imageCanvas) return null;
  const ictx = S.imageCanvas.getContext('2d');
  const w = S.imgW, h = S.imgH;
  const px = ictx.getImageData(0, 0, w, h).data;
  const sz = S.canvasSize;

  // convert canvas coords to image coords
  const iax = ax * w / sz, iay = ay * h / sz;
  const ibx = bx * w / sz, iby = by * h / sz;

  const dx = ibx - iax, dy = iby - iay;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 2) return null;

  // perpendicular direction for width measurement
  const perpX = -dy / dist, perpY = dx / dist;
  const steps = Math.max(8, Math.ceil(dist / 6));
  const widths = [];
  const pathSamples = [];

  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const cx = iax + dx * t, cy = iay + dy * t;

    // sample the center color
    const cix = Math.max(0, Math.min(w - 1, Math.round(cx)));
    const ciy = Math.max(0, Math.min(h - 1, Math.round(cy)));
    const coff = (ciy * w + cix) * 4;
    const cr = px[coff], cg = px[coff + 1], cb = px[coff + 2];
    const [cHue, cSat, cLit] = rgbToHsl(cr, cg, cb);

    pathSamples.push({ x: cx, y: cy, color: [cr, cg, cb], hue: cHue, sat: cSat, lit: cLit });

    // measure width: walk outward in perpendicular direction until color changes
    let halfWidth = 0;
    for (let d = 1; d < 40; d++) {
      const sx = cx + perpX * d, sy = cy + perpY * d;
      const six = Math.max(0, Math.min(w - 1, Math.round(sx)));
      const siy = Math.max(0, Math.min(h - 1, Math.round(sy)));
      const soff = (siy * w + six) * 4;
      const sr = px[soff], sg = px[soff + 1], sb = px[soff + 2];
      const [sHue] = rgbToHsl(sr, sg, sb);
      const hueDist = Math.min(Math.abs(cHue - sHue), 360 - Math.abs(cHue - sHue));
      const lumDist = Math.abs(cLit - (sr * 0.299 + sg * 0.587 + sb * 0.114) / 255);
      if (hueDist > 35 || lumDist > 0.25) { halfWidth = d; break; }
      halfWidth = d;
    }
    // also check the other direction
    let halfWidth2 = 0;
    for (let d = 1; d < 40; d++) {
      const sx = cx - perpX * d, sy = cy - perpY * d;
      const six = Math.max(0, Math.min(w - 1, Math.round(sx)));
      const siy = Math.max(0, Math.min(h - 1, Math.round(sy)));
      const soff = (siy * w + six) * 4;
      const sr = px[soff], sg = px[soff + 1], sb = px[soff + 2];
      const [sHue] = rgbToHsl(sr, sg, sb);
      const hueDist = Math.min(Math.abs(cHue - sHue), 360 - Math.abs(cHue - sHue));
      const lumDist = Math.abs(cLit - (sr * 0.299 + sg * 0.587 + sb * 0.114) / 255);
      if (hueDist > 35 || lumDist > 0.25) { halfWidth2 = d; break; }
      halfWidth2 = d;
    }
    widths.push(halfWidth + halfWidth2);
  }

  return {
    widths,
    avgWidth: widths.reduce((a, b) => a + b, 0) / widths.length,
    pathSamples,
  };
}

// build diamond contour between two nodes
function buildDiamond(nodeA, nodeB) {
  const trace = traceColorPath(nodeA.x, nodeA.y, nodeB.x, nodeB.y);
  if (!trace || trace.widths.length < 4) return null;

  const widths = trace.widths;
  const n = widths.length;
  const mid = Math.floor(n / 2);

  // asymmetry: compare first half vs second half of the width profile
  // if the path widens then narrows symmetrically → diamond is balanced
  // if it's wide at A and narrow at B → color tapers, direction A→B
  const firstHalfAvg = widths.slice(0, mid).reduce((a, b) => a + b, 0) / mid;
  const secondHalfAvg = widths.slice(mid).reduce((a, b) => a + b, 0) / (n - mid);
  const avgWidth = widths.reduce((a, b) => a + b, 0) / n;
  const maxWidth = Math.max(...widths);

  // symmetry: is the profile roughly the same shape in both halves?
  const halfDiff = Math.abs(firstHalfAvg - secondHalfAvg);
  const symmetric = halfDiff < avgWidth * 0.15; // within 15% of average = symmetric

  // direction: color flows from wider half to narrower half
  let direction = 'none';
  if (!symmetric) {
    direction = firstHalfAvg > secondHalfAvg ? 'a-to-b' : 'b-to-a';
  }

  // hierarchy: wider end is the parent (more color mass)
  const hierarchy = symmetric ? 'peer'
    : (firstHalfAvg > secondHalfAvg ? 'a-parent' : 'b-parent');

  return {
    nodeA: nodeA.id, nodeB: nodeB.id,
    widths,
    avgWidth, maxWidth,
    firstHalfAvg: Math.round(firstHalfAvg * 10) / 10,
    secondHalfAvg: Math.round(secondHalfAvg * 10) / 10,
    symmetric,
    direction,
    hierarchy,
    pathSamples: trace.pathSamples,
  };
}

// start fairy's journey across the canvas
function launchFairy() {
  if (S.nodes.length < 2) return;
  S.fairy.visible = true;
  S.fairy.expression = 'idle';

  // find pairs of same-color (or near-color) containers to visit
  const pairs = [];
  for (let i = 0; i < S.nodes.length; i++) {
    for (let j = i + 1; j < S.nodes.length; j++) {
      const a = S.nodes[i], b = S.nodes[j];
      const [ha] = rgbToHsl(...a.color), [hb] = rgbToHsl(...b.color);
      const hueDist = Math.min(Math.abs(ha - hb), 360 - Math.abs(ha - hb));
      // include both same-color pairs (for diamond) and cross-color pairs (for boundary discovery)
      const dist = Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
      if (dist < 20) continue; // too close
      // conviction-weighted affinity: fairy trusts Chunxly's confident reads
      const convWeight = ((a.conviction ?? 1) + (b.conviction ?? 1)) / 2;
      pairs.push({ a, b, hueDist, dist, affinity: (hueDist < 40 ? 1 : 0) * convWeight });
    }
  }

  // prioritize: same-color pairs first, then nearby cross-color pairs
  pairs.sort((a, b) => (b.affinity - a.affinity) || (a.dist - b.dist));

  // take up to 6 journeys
  S.fairy.journeyQueue = pairs.slice(0, 6);

  // initialize seep state on all nodes
  for (const n of S.nodes) {
    n.seepInfluence = {};
    n.seepRoleHints = {};
    n.seepEmoji = null;
    n.seepWeight = 0;
  }

  // start at Chunxly's position
  S.fairy.x = S.chunxly.x + 40;
  S.fairy.y = S.chunxly.y;
  startNextJourney();
}

// ═══════════════════════════════════════════════════════
//  Fairy structural reweighting
//  Called once the fairy completes all journeys.
//  Uses diamond width data to distinguish body mass from accent/extremity.
//  Adjusts node conviction and tags nodes with structuralRole before export.
// ═══════════════════════════════════════════════════════
function applyFairyReweighting() {
  const diamonds = S.fairy.diamonds;
  if (!diamonds || diamonds.length === 0) {
    document.getElementById('btnFinish').style.display = '';
    return;
  }

  // build per-node metrics from diamonds
  // wideMass: sum of avgWidth for diamonds where this node is the wide end (or symmetric)
  // narrowCount: times this node was the narrow/accent terminus of an asymmetric diamond
  const nodeMetrics = {};
  for (const n of S.nodes) {
    nodeMetrics[n.id] = { wideMass: 0, narrowCount: 0, totalDiamonds: 0 };
  }

  for (const d of diamonds) {
    const mA = nodeMetrics[d.nodeA];
    const mB = nodeMetrics[d.nodeB];
    if (!mA || !mB) continue;

    mA.totalDiamonds++;
    mB.totalDiamonds++;

    if (d.symmetric) {
      // both nodes are equal contributors — body mass
      mA.wideMass += d.avgWidth;
      mB.wideMass += d.avgWidth;
    } else if (d.hierarchy === 'a-parent') {
      mA.wideMass += d.avgWidth;
      mB.narrowCount++;
    } else if (d.hierarchy === 'b-parent') {
      mB.wideMass += d.avgWidth;
      mA.narrowCount++;
    }
  }

  // normalize wideMass across all nodes to get relative body weight 0–1
  const maxMass = Math.max(...Object.values(nodeMetrics).map(m => m.wideMass), 1);

  for (const n of S.nodes) {
    const m = nodeMetrics[n.id];
    if (!m || m.totalDiamonds === 0) continue;

    const bodyWeight = m.wideMass / maxMass;          // 0–1, how much body mass this node anchors
    const accentScore = m.narrowCount / m.totalDiamonds; // 0–1, how often it was the narrow end

    // structural role classification
    if (bodyWeight > 0.5 && accentScore < 0.4) {
      n.structuralRole = 'body';
    } else if (accentScore > 0.5 && bodyWeight < 0.3) {
      n.structuralRole = 'accent';
    } else if (bodyWeight > 0.3) {
      n.structuralRole = 'limb';
    } else {
      n.structuralRole = 'detail';
    }
    n.structuralRoleSource = 'diamond';

    // conviction boost for body anchors, gentle reduction for pure accents
    const prevConviction = n.conviction ?? 1.0;
    if (n.structuralRole === 'body') {
      n.conviction = Math.min(1.0, prevConviction + bodyWeight * 0.25);
    } else if (n.structuralRole === 'accent') {
      // don't eliminate — accents are real — but don't let them dominate color output
      n.conviction = Math.max(0.2, prevConviction - accentScore * 0.2);
    }

    n.fairyBodyWeight = Math.round(bodyWeight * 100) / 100;
    n.fairyAccentScore = Math.round(accentScore * 100) / 100;
  }

  // ── resolve seep: unvisited nodes inherit from neighbors ──
  const POOL_TO_ROLE = {
    body_core: 'body', mirror: 'body',
    limb_reach: 'limb', flow: 'limb',
    accent_tip: 'accent',
    detail_eye: 'detail', ambient: 'detail', outlier: 'detail',
  };

  for (const n of S.nodes) {
    // resolve seep emoji for unvisited nodes
    if (!n.fairyEmoji && n.seepInfluence) {
      const entries = Object.entries(n.seepInfluence);
      if (entries.length > 0) {
        entries.sort((a, b) => b[1] - a[1]);
        n.seepEmoji = entries[0][0];
        n.seepWeight = entries[0][1];
      }
    }

    // resolve seep structural role for unclassified nodes
    if (!n.structuralRole && n.seepRoleHints) {
      const hints = Object.entries(n.seepRoleHints);
      if (hints.length > 0) {
        hints.sort((a, b) => b[1] - a[1]);
        const topPool = hints[0][0];
        const topWeight = hints[0][1];
        n.structuralRole = POOL_TO_ROLE[topPool] || 'detail';
        n.structuralRoleSource = 'seep';
        // gentle conviction bump for body seep
        if (n.structuralRole === 'body') {
          n.conviction = Math.min(1.0, (n.conviction ?? 1.0) + topWeight * 0.1);
        }
      }
    }
  }

  render(); // re-render so conviction changes show in container opacity
  document.getElementById('btnFinish').style.display = '';
}

function startNextJourney() {
  if (S.fairy.journeyQueue.length === 0) {
    // fairy returns to Chunxly
    S.fairy.expression = 'settle';
    S.fairy.targetX = S.chunxly.x + 40;
    S.fairy.targetY = S.chunxly.y - 10;
    S.fairy.settled = true;
    // fairy is done — apply structural reweighting then reveal Finish
    applyFairyReweighting();
    // Chunxly acknowledges the fairy's work
    if (S.fairy.visions.length > 0) {
      const [iv, ov] = pickVoice('fairy_done');
      setVoice(iv, ov, true);
    }
    return;
  }

  const pair = S.fairy.journeyQueue.shift();
  const diamond = buildDiamond(pair.a, pair.b);

  // build bezier path from A to B (curve toward color boundary)
  const ax = pair.a.x, ay = pair.a.y, bx = pair.b.x, by = pair.b.y;
  const mx = (ax + bx) / 2, my = (ay + by) / 2;
  const dx = bx - ax, dy = by - ay;
  // curve perpendicular to the path, more for asymmetric diamonds
  const curvature = diamond ? (diamond.symmetric ? 0.08 : 0.2) : 0.1;
  const cpx = mx + (-dy) * curvature, cpy = my + dx * curvature;

  S.fairy.journey = {
    from: pair.a, to: pair.b,
    ax, ay, bx, by, cpx, cpy,
    t: 0,
    diamond,
    speed: 0.008 + Math.random() * 0.004, // slightly varied travel speed
  };

  if (diamond) {
    S.fairy.diamonds.push(diamond);
  }

  S.fairy.expression = 'flying';
  S.fairy.settled = false;
}

function conjureFairyVision(node) {
  if (!node || !node.id) return;
  const f = S.fairy;

  // don't re-vision a node already labeled
  if (f.visions.some(v => v.nodeId === node.id)) return;

  const emoji = pickFairyEmoji(node, f.diamonds);
  node.fairyEmoji = emoji;

  // seep: designation bleeds to connected neighbors
  propagateSeep(node);

  // generate glitter particles for the burst
  const glitter = [];
  const particleCount = 8 + Math.floor(Math.random() * 5); // 8-12
  for (let i = 0; i < particleCount; i++) {
    const angle = (Math.PI * 2 * i / particleCount) + (Math.random() - 0.5) * 0.4;
    glitter.push({
      dx: Math.cos(angle),
      dy: Math.sin(angle),
      dist: 12 + Math.random() * 16, // how far they travel
      size: 1 + Math.random() * 1.5,
      alpha: 0.3 + Math.random() * 0.5,
    });
  }

  f.visions.push({
    nodeId: node.id,
    emoji,
    x: node.x,
    y: node.y,
    rotation: (Math.random() - 0.5) * 0.28, // ±8° in radians
    scale: 1.3 + Math.random() * 0.3,        // 1.3–1.6×
    opacity: 1,
    glitter,
    age: 0,
    isVisitor: false,
  });

  // first vision — Chunxly notices
  if (!f.firstVisionFired) {
    f.firstVisionFired = true;
    const [iv, ov] = pickVoice('fairy_first_vision');
    setVoice(iv, ov, true);
  }
}

function updateFairy() {
  if (!S.fairy.visible) return;
  const f = S.fairy;
  f.wingPhase++;

  // flutter expression toggle while flying
  if (f.expression === 'flying' && f.wingPhase % 12 < 6) {
    // alternate between flying frames implicitly via wingPhase (used in render glow)
  }

  if (f.journey) {
    const j = f.journey;
    j.t += j.speed;

    if (j.t >= 1) {
      // arrived at destination
      j.t = 1;
      f.x = j.bx;
      f.y = j.by;

      // absorb the destination container's color
      const [r, g, b] = j.to.color;
      // blend toward new color
      f.color = [
        Math.round(f.color[0] * 0.3 + r * 0.7),
        Math.round(f.color[1] * 0.3 + g * 0.7),
        Math.round(f.color[2] * 0.3 + b * 0.7),
      ];

      // check color match with container
      const dc = Math.sqrt(
        (f.color[0] - r) ** 2 + (f.color[1] - g) ** 2 + (f.color[2] - b) ** 2
      );
      f.expression = dc < 40 ? 'settle' : 'wobble';

      // pause at container, then continue
      f.journey = null;
      f.settled = true;
      f.settleTimer = 60 + Math.random() * 40; // ~1-1.7 seconds at 60fps

      // conjure a vision at this settle point
      conjureFairyVision(j.to);
    } else {
      // quadratic bezier interpolation
      const t = j.t;
      const it = 1 - t;
      f.x = it * it * j.ax + 2 * it * t * j.cpx + t * t * j.bx;
      f.y = it * it * j.ay + 2 * it * t * j.cpy + t * t * j.by;

      // check if fairy crossed into new color territory
      if (S.imageCanvas && f.wingPhase % 8 === 0) {
        const ictx = S.imageCanvas.getContext('2d');
        const ix = Math.round(f.x * S.imgW / S.canvasSize);
        const iy = Math.round(f.y * S.imgH / S.canvasSize);
        if (ix >= 0 && ix < S.imgW && iy >= 0 && iy < S.imgH) {
          const pxData = ictx.getImageData(ix, iy, 1, 1).data;
          const [pH] = rgbToHsl(pxData[0], pxData[1], pxData[2]);
          const [fH] = rgbToHsl(...f.color);
          const hueDist = Math.min(Math.abs(pH - fH), 360 - Math.abs(pH - fH));
          if (hueDist > 45) {
            // crossed into new territory — absorb gradually
            f.color = [
              Math.round(f.color[0] * 0.6 + pxData[0] * 0.4),
              Math.round(f.color[1] * 0.6 + pxData[1] * 0.4),
              Math.round(f.color[2] * 0.6 + pxData[2] * 0.4),
            ];
          }
        }
      }
    }
  } else if (f.settled) {
    f.settleTimer--;
    if (f.settleTimer <= 0) {
      f.settled = false;
      startNextJourney();
    }
  }

  // smooth position for rendering (already set by bezier, but smoothing for settle drift)
  if (f.settled) {
    // gentle bob while settled
    f.y += Math.sin(f.wingPhase * 0.06) * 0.15;
  }

  // advance vision ages every frame
  for (const v of f.visions) {
    if (v.age < 200) v.age++; // cap to avoid overflow, burst is 48 frames
  }
}

let spriteFrame = 0;
function drawSprite(expression = 'idle') {
  const rows = SPRITE_DATA[expression] || SPRITE_DATA.idle;
  const px = PX;
  $sctx.clearRect(0, 0, 80, 80);
  for (let r = 0; r < rows.length; r++) {
    for (let c = 0; c < rows[r].length; c++) {
      const ch = rows[r][c];
      const col = SPRITE_PALETTE[ch];
      if (!col) continue;
      $sctx.fillStyle = `rgb(${col[0]},${col[1]},${col[2]})`;
      $sctx.fillRect(c * px, r * px, px, px);
    }
  }
}

function moveSprite(x, y) {
  S.chunxly.targetX = x;
  S.chunxly.targetY = y;
}

function updateSpritePosition() {
  const c = S.chunxly;
  const dx = c.targetX - c.x;
  const dy = c.targetY - c.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > 1) {
    const speed = Math.min(dist * 0.08, 6);
    c.x += (dx / dist) * speed;
    c.y += (dy / dist) * speed;
  } else {
    c.x = c.targetX;
    c.y = c.targetY;
  }
  $spriteWrap.style.left = Math.round(c.x) + 'px';
  $spriteWrap.style.top = Math.round(c.y) + 'px';
}

// ═══════════════════════════════════════════════════════
//  Drawing tool (blank canvas mode)
// ═══════════════════════════════════════════════════════
function buildDrawBar() {
  $drawBar.innerHTML = '';
  DRAW_COLORS.forEach((col, i) => {
    const sw = document.createElement('div');
    sw.className = 'draw-swatch' + (i === 0 ? ' active' : '');

      sw.classList.add('active');

  });

  sep.style.cssText = 'width:1px;height:18px;background:rgba(255,230,180,.08);margin:0 2px;';
  $drawBar.appendChild(sep);
  DRAW_SIZES.forEach((sz, i) => {
    const btn = document.createElement('div');

let lastDrawX = -1, lastDrawY = -1;
function drawBrush(x, y) {
  if (!S.imageCanvas) return;
  const ictx = S.imageCanvas.getContext('2d');
  const [r, g, b] = S.drawColor;
  ictx.fillStyle = `rgb(${r},${g},${b})`;
  ictx.beginPath();
  ictx.arc(x, y, S.drawSize / 2, 0, Math.PI * 2);
  ictx.fill();
  // interpolate if we have a last position
  if (lastDrawX >= 0) {
    const dx = x - lastDrawX, dy = y - lastDrawY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const steps = Math.ceil(dist / (S.drawSize * 0.3));
    for (let i = 1; i < steps; i++) {
      const t = i / steps;
      const ix = lastDrawX + dx * t, iy = lastDrawY + dy * t;
      ictx.beginPath();
      ictx.arc(ix, iy, S.drawSize / 2, 0, Math.PI * 2);
      ictx.fill();
    }
  }
  lastDrawX = x;
  lastDrawY = y;
}

// ═══════════════════════════════════════════════════════
//  Image analysis
// ═══════════════════════════════════════════════════════
function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
    else if (max === g) h = ((b - r) / d + 2) / 6;
    else h = ((r - g) / d + 4) / 6;
  }
  return [h * 360, s, l];
}

function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

// convex hull (Andrew's monotone chain) — returns hull points in order
function convexHull(points) {
  if (points.length < 3) return points.map(p => ({ x: p.x, y: p.y }));
  const pts = points.map(p => ({ x: p.x, y: p.y })).sort((a, b) => a.x - b.x || a.y - b.y);
  const cross = (o, a, b) => (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
  const lower = [];
  for (const p of pts) { while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop(); lower.push(p); }
  const upper = [];
  for (let i = pts.length - 1; i >= 0; i--) { const p = pts[i]; while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop(); upper.push(p); }
  lower.pop(); upper.pop();
  return lower.concat(upper);
}

// point-in-convex-polygon test with padding (fraction of hull diameter)
function pointInHull(px, py, hull, padding) {
  if (!hull || hull.length < 3) return true; // degenerate hull — everything is "inside"
  // expand hull outward by padding
  const cx = hull.reduce((s, p) => s + p.x, 0) / hull.length;
  const cy = hull.reduce((s, p) => s + p.y, 0) / hull.length;
  const expanded = hull.map(p => ({
    x: p.x + (p.x - cx) * padding,
    y: p.y + (p.y - cy) * padding
  }));
  // ray casting
  let inside = false;
  for (let i = 0, j = expanded.length - 1; i < expanded.length; j = i++) {
    const xi = expanded[i].x, yi = expanded[i].y;
    const xj = expanded[j].x, yj = expanded[j].y;
    if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi) inside = !inside;
  }
  return inside;
}

function analyzeImage() {
  if (!S.imageCanvas) return [];
  const ictx = S.imageCanvas.getContext('2d');
  const w = S.imgW, h = S.imgH;
  const data = ictx.getImageData(0, 0, w, h);
  const px = data.data;

  // jittered grid sampling
  const gridN = 8;
  const samples = [];
  for (let gy = 0; gy < gridN; gy++) {
    for (let gx = 0; gx < gridN; gx++) {
      const cx = ((gx + 0.5) / gridN) * w + (Math.random() - 0.5) * (w / gridN) * 0.4;
      const cy = ((gy + 0.5) / gridN) * h + (Math.random() - 0.5) * (h / gridN) * 0.4;
      const ix = Math.max(0, Math.min(w - 1, Math.round(cx)));
      const iy = Math.max(0, Math.min(h - 1, Math.round(cy)));
      const off = (iy * w + ix) * 4;
      const r = px[off], g = px[off + 1], b = px[off + 2], a = px[off + 3];
      if (a < 30) continue;
      const [hue, sat, lit] = rgbToHsl(r, g, b);
      samples.push({ x: cx, y: cy, r, g, b, hue, sat, lit });
    }
  }

  // adaptive second pass: sample more densely where colors change
  // Chunxly scans broadly, then looks closer where things get interesting
  const cellW = w / gridN, cellH = h / gridN;
  const interestingSamps = samples.filter(samp => {
    // check if any neighbor sample is a different color (hue shift > 30° or lit shift > 0.2)
    return samples.some(other => {
      if (other === samp) return false;
      const dist = Math.sqrt((samp.x - other.x) ** 2 + (samp.y - other.y) ** 2);
      if (dist > cellW * 2) return false;
      const hueDist = Math.min(Math.abs(samp.hue - other.hue), 360 - Math.abs(samp.hue - other.hue));
      return hueDist > 30 || Math.abs(samp.lit - other.lit) > 0.2;
    });
  });
  // around each interesting point, place 4 extra samples (half-cell offsets)
  const halfC = cellW * 0.5;
  const offsets = [[-halfC, -halfC], [halfC, -halfC], [-halfC, halfC], [halfC, halfC]];
  for (const samp of interestingSamps) {
    for (const [ox, oy] of offsets) {
      const sx = samp.x + ox + (Math.random() - 0.5) * halfC * 0.4;
      const sy = samp.y + oy + (Math.random() - 0.5) * halfC * 0.4;
      const ix = Math.max(0, Math.min(w - 1, Math.round(sx)));
      const iy = Math.max(0, Math.min(h - 1, Math.round(sy)));
      const off = (iy * w + ix) * 4;
      const r = px[off], g = px[off + 1], b = px[off + 2], a = px[off + 3];
      if (a < 30) continue;
      // skip if too close to existing sample
      const tooClose = samples.some(s => Math.sqrt((s.x - sx) ** 2 + (s.y - sy) ** 2) < cellW * 0.3);
      if (tooClose) continue;
      const [hue, sat, lit] = rgbToHsl(r, g, b);
      samples.push({ x: sx, y: sy, r, g, b, hue, sat, lit });
    }
  }

  // edge detection via local pixel gradient
  const stepPx = Math.max(2, Math.round(Math.max(w, h) / gridN * 0.15));
  for (const samp of samples) {
    const ix = Math.max(stepPx, Math.min(w - 1 - stepPx, Math.round(samp.x)));
    const iy = Math.max(stepPx, Math.min(h - 1 - stepPx, Math.round(samp.y)));
    const lumAt = (x2, y2) => {
      const off = (y2 * w + x2) * 4;
      return (px[off] * 0.299 + px[off+1] * 0.587 + px[off+2] * 0.114) / 255;
    };
    const lumU = lumAt(ix, iy - stepPx), lumD = lumAt(ix, iy + stepPx);
    const lumL = lumAt(ix - stepPx, iy), lumR = lumAt(ix + stepPx, iy);
    const gx = lumR - lumL, gy = lumD - lumU;
    samp.gradMag = Math.sqrt(gx * gx + gy * gy);
    samp.gradAngle = Math.atan2(gy, gx);

    let maxEdge = 0;
    for (const other of samples) {
      if (other === samp) continue;
      const dist = Math.sqrt((samp.x - other.x) ** 2 + (samp.y - other.y) ** 2);
      if (dist < Math.max(w, h) / gridN * 1.6) {
        const lumDiff = Math.abs(samp.lit - other.lit);
        const hueDiff = Math.min(Math.abs(samp.hue - other.hue), 360 - Math.abs(samp.hue - other.hue)) / 180;
        const edge = lumDiff * 0.7 + hueDiff * 0.3 * Math.min(samp.sat, other.sat);
        if (edge > maxEdge) maxEdge = edge;
      }
    }
    samp.edge = Math.max(maxEdge, samp.gradMag);
    samp.energy = samp.sat * 0.6 + Math.max(0, samp.lit - 0.08) * 0.4;
  }

  // background suppression: find dominant color cluster and dampen it
  // group by HSL proximity — the biggest group is likely background
  const clusters = [];
  for (const samp of samples) {
    let placed = false;
    for (const cl of clusters) {
      const rep = cl[0];
      const hueDist = Math.min(Math.abs(samp.hue - rep.hue), 360 - Math.abs(samp.hue - rep.hue));
      if (hueDist < 35 && Math.abs(samp.lit - rep.lit) < 0.25 && Math.abs(samp.sat - rep.sat) < 0.3) {
        cl.push(samp);
        placed = true;
        break;
      }
    }
    if (!placed) clusters.push([samp]);
  }
  clusters.sort((a, b) => b.length - a.length);
  const bgCluster = clusters[0];
  const bgRatio = bgCluster.length / samples.length;
  // if dominant cluster holds >40% of samples, it's likely background
  const bgSet = bgRatio > 0.4 ? new Set(bgCluster) : new Set();
  // heavier suppression when bg dominates more
  const bgDampen = bgRatio > 0.6 ? 0.04 : bgRatio > 0.5 ? 0.08 : 0.15;

  // focal scoring
  for (const samp of samples) {
    samp.focal = samp.edge * samp.sat * (1 + (samp.edge > 0.25 ? 0.5 : 0));
    const cx = samp.x / w - 0.5, cy = samp.y / h - 0.5;
    samp.focal *= 1 + (1 - Math.sqrt(cx * cx + cy * cy)) * 0.2;
    // dampen background cluster — Chunxly is more interested in the subject
    if (bgSet.has(samp)) samp.focal *= bgDampen;
  }

  // select top candidates, only from areas with actual content
  samples.sort((a, b) => b.focal - a.focal);
  const minDist = Math.max(w, h) * 0.08;
  const selected = [];
  let bgCount = 0;
  const maxBg = 2; // Chunxly notices the background but doesn't obsess
  for (const samp of samples) {
    if (selected.length >= 12) break;
    if (samp.energy < 0.12) continue; // skip negative space — it's implicit
    if (bgSet.has(samp) && bgCount >= maxBg) continue; // cap background containers
    const tooClose = selected.some(s =>
      Math.sqrt((s.x - samp.x) ** 2 + (s.y - samp.y) ** 2) < minDist
    );
    if (tooClose) continue;
    if (bgSet.has(samp)) bgCount++;

    // container character: how Chunxly sees this spot
    // boundary = how tight/defined the container edge is (0 = loose/soft, 1 = tight/sharp)
    const boundary = Math.min(1, samp.gradMag * 1.5 + samp.edge * 0.5);
    // size = how big a region to scribble around (large soft masses → big, sharp details → small)
    const size = 15 + (1 - boundary) * 30 + samp.energy * 10;
    // wobble = how irregular the scribble is (high energy + low boundary → more wobble)
    const wobble = 0.3 + (1 - boundary) * 0.5 + Math.random() * 0.2;

    selected.push({
      x: samp.x, y: samp.y,
      color: [samp.r, samp.g, samp.b],
      size, boundary, wobble,
      energy: samp.energy,
      gradMag: samp.gradMag,
      gradAngle: samp.gradAngle,
      edge: samp.edge,
      sat: samp.sat,
      // generate scribble path (wobbled circle with N points)
      scribble: generateScribble(size, wobble, boundary),
    });
  }

  // color diversity: ensure every non-background color cluster gets at least one container
  // Chunxly should notice each color present, even with just one daub
  function sampInSelected(samp) {
    return selected.some(s => {
      const dr = s.color[0] - samp.r, dg = s.color[1] - samp.g, db = s.color[2] - samp.b;
      return Math.sqrt(dr*dr + dg*dg + db*db) < 60; // close enough in RGB space
    });
  }
  for (const cl of clusters) {
    if (cl === bgCluster && bgSet.size > 0) continue; // bg already handled
    if (selected.length >= 16) break;
    // check if this cluster has a representative
    const rep = cl[0];
    if (sampInSelected(rep)) continue;
    // pick the best sample from this cluster (highest focal)
    const best = cl.filter(s => s.energy >= 0.12).sort((a, b) => b.focal - a.focal)[0];
    if (!best) continue;
    const boundary = Math.min(1, best.gradMag * 1.5 + best.edge * 0.5);
    const size = 15 + (1 - boundary) * 30 + best.energy * 10;
    const wobble = 0.3 + (1 - boundary) * 0.5 + Math.random() * 0.2;
    selected.push({
      x: best.x, y: best.y,
      color: [best.r, best.g, best.b],
      size, boundary, wobble,
      energy: best.energy, gradMag: best.gradMag,
      gradAngle: best.gradAngle, edge: best.edge, sat: best.sat,
      scribble: generateScribble(size, wobble, boundary),
    });
  }

  // ensure at least 5 total
  if (selected.length < 5 && samples.length >= 5) {
    for (const samp of samples) {
      if (selected.length >= 7) break;
      if (samp.energy < 0.12) continue;
      const tooClose = selected.some(s =>
        Math.sqrt((s.x - samp.x) ** 2 + (s.y - samp.y) ** 2) < minDist * 0.6
      );
      if (tooClose) continue;
      const boundary = Math.min(1, samp.gradMag * 1.5 + samp.edge * 0.5);
      const size = 15 + (1 - boundary) * 25;
      const wobble = 0.4 + Math.random() * 0.3;
      selected.push({
        x: samp.x, y: samp.y,
        color: [samp.r, samp.g, samp.b],
        size, boundary, wobble,
        energy: samp.energy, gradMag: samp.gradMag,
        gradAngle: samp.gradAngle, edge: samp.edge, sat: samp.sat,
        scribble: generateScribble(size, wobble, boundary),
      });
    }
  }

  return selected;
}

// ── multi-pass consensus ──
// Chunxly looks at the image several times. Each jittered pass sees slightly
// differently. Containers that keep appearing gain conviction; one-timers are tentative.
// ── border sampling: detect background color from canvas edges ──
function sampleBorderColor() {
  if (!S.imageCanvas) return null;
  const ctx = S.imageCanvas.getContext('2d');
  const w = S.imgW, h = S.imgH;
  const px = ctx.getImageData(0, 0, w, h).data;

  // sample ~60 pixels along each edge (evenly spaced), skip corners
  const samples = [];
  const step = Math.max(1, Math.floor(Math.max(w, h) / 60));
  // top and bottom rows
  for (let x = step; x < w - step; x += step) {
    const ti = (x + 0 * w) * 4;
    samples.push([px[ti], px[ti + 1], px[ti + 2]]);
    const bi = (x + (h - 1) * w) * 4;
    samples.push([px[bi], px[bi + 1], px[bi + 2]]);
  }
  // left and right columns
  for (let y = step; y < h - step; y += step) {
    const li = (0 + y * w) * 4;
    samples.push([px[li], px[li + 1], px[li + 2]]);
    const ri = ((w - 1) + y * w) * 4;
    samples.push([px[ri], px[ri + 1], px[ri + 2]]);
  }

  if (samples.length === 0) return null;

  // cluster border samples by color proximity (threshold 45 RGB distance)
  const clusters = [];
  for (const s of samples) {
    let placed = false;
    for (const cl of clusters) {
      const dr = cl.avg[0] - s[0], dg = cl.avg[1] - s[1], db = cl.avg[2] - s[2];
      if (Math.sqrt(dr * dr + dg * dg + db * db) < 45) {
        cl.members.push(s);
        cl.avg = [
          cl.members.reduce((a, m) => a + m[0], 0) / cl.members.length,
          cl.members.reduce((a, m) => a + m[1], 0) / cl.members.length,
          cl.members.reduce((a, m) => a + m[2], 0) / cl.members.length,
        ];
        placed = true;
        break;
      }
    }
    if (!placed) clusters.push({ avg: [...s], members: [s] });
  }

  // dominant cluster = background
  clusters.sort((a, b) => b.members.length - a.members.length);
  const dominant = clusters[0];
  // only treat as background if it covers >30% of border samples
  if (dominant.members.length / samples.length < 0.3) return null;
  return dominant.avg.map(Math.round);
}

function analyzeMultiPass(passes = 5) {
  if (!S.imageCanvas) return [];
  const allPasses = [];
  for (let p = 0; p < passes; p++) allPasses.push(analyzeImage());
  if (allPasses.every(a => a.length === 0)) return [];

  const matchDist = Math.max(S.imgW, S.imgH) * 0.08;
  const colorDist = 60;

  // first pass is the anchor set
  const consensus = allPasses[0].map(c => ({
    ...c,
    _matches: [c],   // accumulate matched containers from later passes
    _hits: 1,
  }));

  // match subsequent passes against consensus
  for (let p = 1; p < passes; p++) {
    const pass = allPasses[p];
    const claimed = new Set();
    for (const cand of pass) {
      let bestIdx = -1, bestDist = Infinity;
      for (let ci = 0; ci < consensus.length; ci++) {
        const con = consensus[ci];
        const dx = con.x - cand.x, dy = con.y - cand.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist >= matchDist) continue;
        const dr = con.color[0] - cand.color[0], dg = con.color[1] - cand.color[1], db = con.color[2] - cand.color[2];
        if (Math.sqrt(dr * dr + dg * dg + db * db) >= colorDist) continue;
        if (dist < bestDist) { bestDist = dist; bestIdx = ci; }
      }
      if (bestIdx >= 0 && !claimed.has(bestIdx)) {
        consensus[bestIdx]._matches.push(cand);
        consensus[bestIdx]._hits++;
        claimed.add(bestIdx);
      } else {
        // new container not seen before — add as tentative
        consensus.push({ ...cand, _matches: [cand], _hits: 1 });
      }
    }
  }

  // build final set with conviction + merged properties
  const result = [];
  for (const con of consensus) {
    const conviction = con._hits / passes;
    const ms = con._matches;
    // average position, size, boundary, energy, edge, sat across matches
    const avgX = ms.reduce((s, m) => s + m.x, 0) / ms.length;
    const avgY = ms.reduce((s, m) => s + m.y, 0) / ms.length;
    const avgSize = ms.reduce((s, m) => s + m.size, 0) / ms.length;
    const avgBoundary = ms.reduce((s, m) => s + m.boundary, 0) / ms.length;
    const avgEnergy = ms.reduce((s, m) => s + m.energy, 0) / ms.length;
    const avgEdge = ms.reduce((s, m) => s + m.edge, 0) / ms.length;
    const avgSat = ms.reduce((s, m) => s + m.sat, 0) / ms.length;
    // keep color from highest-focal match
    const best = ms.reduce((a, b) => (b.focal || 0) > (a.focal || 0) ? b : a, ms[0]);
    result.push({
      x: avgX, y: avgY,
      color: best.color,
      size: avgSize,
      boundary: avgBoundary,
      wobble: con.wobble,
      energy: avgEnergy,
      gradMag: best.gradMag || 0,
      gradAngle: best.gradAngle || 0,
      edge: avgEdge,
      sat: avgSat,
      scribble: generateScribble(avgSize, con.wobble, avgBoundary),
      focal: best.focal || 0,
      conviction,
    });
  }

  // sort by conviction desc, then focal desc — most certain first
  result.sort((a, b) => (b.conviction - a.conviction) || (b.focal - a.focal));

  // ── border-sampled background filter ──
  // remove containers whose color matches the dominant border color
  const bgColor = sampleBorderColor();
  if (bgColor) {
    const BG_THRESHOLD = 50; // RGB distance — generous to catch near-background
    const filtered = result.filter(c => {
      const dr = c.color[0] - bgColor[0];
      const dg = c.color[1] - bgColor[1];
      const db = c.color[2] - bgColor[2];
      return Math.sqrt(dr * dr + dg * dg + db * db) > BG_THRESHOLD;
    });
    // only apply filter if it doesn't remove everything
    if (filtered.length >= 2) return filtered;
  }

  return result;
}

// generate a scribble path: array of {dx, dy} offsets from center
// loose containers = big wobbly blobs, tight containers = small jittery marks
function generateScribble(size, wobble, boundary) {
  const points = [];
  const n = boundary > 0.6 ? 8 + Math.floor(Math.random() * 4) : 12 + Math.floor(Math.random() * 6);
  for (let i = 0; i < n; i++) {
    const angle = (i / n) * Math.PI * 2;
    const r = size * (0.8 + wobble * (Math.random() - 0.5) * 1.4);
    // tight containers get angular wobble (jittery), loose get radial wobble (blobby)
    const ax = boundary > 0.6
      ? angle + (Math.random() - 0.5) * 0.3
      : angle + (Math.random() - 0.5) * 0.15;
    points.push({ dx: Math.cos(ax) * r, dy: Math.sin(ax) * r });
  }
  return points;
}

// ═══════════════════════════════════════════════════════
//  Daubing animation
// ═══════════════════════════════════════════════════════
async function daubSequence(candidates) {
  setPhase('daubing');
  S.chunxly.busy = true;
  drawSprite('looking');
  let certainVoiceCount = 0, tentativeVoiceCount = 0;

  for (let i = 0; i < candidates.length; i++) {
    const c = candidates[i];
    // scale candidate position to canvas coords
    const sx = (c.x / S.imgW) * S.canvasSize;
    const sy = (c.y / S.imgH) * S.canvasSize;

    // move Chunxly sprite near the node (offset so sprite doesn't cover it)
    const offsetX = sx > S.canvasSize / 2 ? -90 : 10;
    const offsetY = sy > S.canvasSize / 2 ? -90 : 10;
    moveSprite(Math.max(0, Math.min(S.canvasSize - 80, sx + offsetX)),
               Math.max(0, Math.min(S.canvasSize - 80, sy + offsetY)));

    // wait for travel
    await sleep(400);
    drawSprite('looking');
    await sleep(300);

    // daub!
    drawSprite('daubing');
    // describe what Chunxly sees — conviction voices throttled to avoid repetition
    const conv = c.conviction ?? 1.0;
    let iv, ov;
    if (conv >= 0.8 && certainVoiceCount < 2) {
      [iv, ov] = pickVoice('daub_certain');
      certainVoiceCount++;
    } else if (conv < 0.4 && tentativeVoiceCount < 1) {
      [iv, ov] = pickVoice('daub_tentative');
      tentativeVoiceCount++;
    } else {
      const sizeWord = c.size > 35 ? 'big soft' : c.size > 22 ? 'medium' : 'tight little';
      [iv, ov] = pickVoice('daub', { type: sizeWord + ' container' });
    }
    setVoice(iv, ov, true);

    // create container node
    const node = {
      id: S.nextId++,
      x: sx, y: sy,
      color: c.color,
      size: c.size,
      boundary: c.boundary,
      wobble: c.wobble,
      scribble: c.scribble,
      energy: c.energy,
      gradMag: c.gradMag || 0,
      gradAngle: c.gradAngle || 0,
      edge: c.edge || 0,
      sat: c.sat || 0,
      conviction: c.conviction ?? 1.0,
      source: 'chunxly'
    };
    S.nodes.push(node);
    render();
    updateNodeCount();

    await sleep(500);
    drawSprite(Math.random() > 0.5 ? 'pleased' : 'idle');
    await sleep(400);
  }

  // done daubing
  drawSprite('pleased');
  const certainCount = S.nodes.filter(n => (n.conviction ?? 1) >= 0.6).length;
  const tentativeCount = S.nodes.length - certainCount;
  const [doneIv, doneOv] = pickVoice('daub_done', {
    n: String(S.nodes.length),
    certain: String(certainCount),
    tentative: String(tentativeCount),
  });
  setVoice(doneIv, doneOv, true);
  S.chunxly.busy = false;

  // move sprite to corner
  moveSprite(16, S.canvasSize - 96);
  setPhase('visitor');
  startPingPong();

  // launch the fairy — Finish button reveals only after she completes all journeys
  launchFairy();

  // if this is a round-trip comparison, run delta analysis after fairy settles
  if (S.originalContainers && S.originalContainers.length) {
    setTimeout(() => compareWithOriginal(), 3000);
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ═══════════════════════════════════════════════════════
//  Rendering
// ═══════════════════════════════════════════════════════
function render() {
  const sz = S.canvasSize;
  $ctx.clearRect(0, 0, sz, sz);

  // background
  $ctx.fillStyle = '#17140f';
  $ctx.fillRect(0, 0, sz, sz);

  // image background (if loaded)
  if (S.imageCanvas) {
    // stall/chunxly-painting: the drawing IS the artwork — full opacity
    // normal mode: reference image underneath nodes — dimmed
    const isDirectPainting = S.stallMode || S.phase === 'chunxly-painting';
    $ctx.globalAlpha = isDirectPainting ? 1.0 : 0.35;
    $ctx.drawImage(S.imageCanvas, 0, 0, S.imgW, S.imgH, 0, 0, sz, sz);
    $ctx.globalAlpha = 1;
  }

  // no grid — the canvas is a painting surface, not a spreadsheet

  // edges
  for (const edge of S.edges) {
    const nA = S.nodes.find(n => n.id === edge.from);
    const nB = S.nodes.find(n => n.id === edge.to);
    if (!nA || !nB) continue;
    // slight bezier curve
    const mx = (nA.x + nB.x) / 2;
    const my = (nA.y + nB.y) / 2;
    const dx = nB.x - nA.x, dy = nB.y - nA.y;
    const perpX = -dy * 0.1, perpY = dx * 0.1;
    $ctx.strokeStyle = edge.source === 'chunxly'
      ? 'rgba(138,180,196,0.5)' : 'rgba(94,196,168,0.5)';
    $ctx.lineWidth = 2;
    $ctx.beginPath();
    $ctx.moveTo(nA.x, nA.y);
    $ctx.quadraticCurveTo(mx + perpX, my + perpY, nB.x, nB.y);
    $ctx.stroke();
  }

  // suggest edge preview
  if (S.suggestEdge) {
    const nA = S.nodes.find(n => n.id === S.suggestEdge.from);
    const nB = S.nodes.find(n => n.id === S.suggestEdge.to);
    if (nA && nB) {
      const t = Date.now() / 800;
      const alpha = 0.2 + Math.sin(t) * 0.15;
      $ctx.strokeStyle = `rgba(212,168,75,${alpha})`;
      $ctx.lineWidth = 1.5;
      $ctx.setLineDash([4, 4]);
      $ctx.beginPath();
      $ctx.moveTo(nA.x, nA.y);
      $ctx.lineTo(nB.x, nB.y);
      $ctx.stroke();
      $ctx.setLineDash([]);
    }
  }

  // connection preview line
  if (S.connectFrom !== null && S.hoverNode !== null && S.hoverNode !== S.connectFrom) {
    const nA = S.nodes.find(n => n.id === S.connectFrom);
    const nB = S.nodes.find(n => n.id === S.hoverNode);
    if (nA && nB) {
      $ctx.strokeStyle = 'rgba(94,196,168,0.3)';
      $ctx.lineWidth = 1.5;
      $ctx.setLineDash([3, 3]);
      $ctx.beginPath();
      $ctx.moveTo(nA.x, nA.y);
      $ctx.lineTo(nB.x, nB.y);
      $ctx.stroke();
      $ctx.setLineDash([]);
    }
  }

  // connection hints: when hovering a node, show faint lines to nearby unconnected nodes
  if (S.hoverNode !== null && S.phase === 'visitor') {
    const hNode = S.nodes.find(n => n.id === S.hoverNode);
    if (hNode) {
      for (const other of S.nodes) {
        if (other.id === hNode.id) continue;
        const connected = S.edges.some(e =>
          (e.from === hNode.id && e.to === other.id) || (e.to === hNode.id && e.from === other.id)
        );
        if (connected) continue;
        const d = Math.sqrt((hNode.x - other.x) ** 2 + (hNode.y - other.y) ** 2);
        if (d > sz * 0.5) continue;
        const alpha = Math.max(0.04, 0.15 * (1 - d / (sz * 0.5)));
        $ctx.strokeStyle = `rgba(255,230,180,${alpha})`;
        $ctx.lineWidth = 1;
        $ctx.setLineDash([2, 4]);
        $ctx.beginPath();
        $ctx.moveTo(hNode.x, hNode.y);
        $ctx.lineTo(other.x, other.y);
        $ctx.stroke();
        $ctx.setLineDash([]);
      }
    }
  }

  // containers (Chunxly's scribbled marks)
  for (const node of S.nodes) {
    const [r, g, b] = node.color;
    const isHover = S.hoverNode === node.id;
    const scribble = node.scribble;

    const conv = node.conviction ?? 1.0;

    if (scribble && scribble.length > 2) {
      // draw the scribbled container
      const hoverGrow = isHover ? 1.12 : 1;

      // fill — conviction modulates opacity (certain=0.20, tentative=0.05)
      const fillA = isHover ? 0.22 : (0.05 + conv * 0.15);
      $ctx.fillStyle = `rgba(${r},${g},${b},${fillA})`;
      $ctx.beginPath();
      $ctx.moveTo(node.x + scribble[0].dx * hoverGrow, node.y + scribble[0].dy * hoverGrow);
      for (let i = 1; i < scribble.length; i++) {
        // smooth between points with quadratic curves for organic feel
        const prev = scribble[i - 1];
        const curr = scribble[i];
        const cpx = node.x + (prev.dx + curr.dx) * 0.5 * hoverGrow;
        const cpy = node.y + (prev.dy + curr.dy) * 0.5 * hoverGrow;
        $ctx.quadraticCurveTo(
          node.x + prev.dx * hoverGrow, node.y + prev.dy * hoverGrow,
          cpx, cpy
        );
      }
      // close back to first point
      const last = scribble[scribble.length - 1];
      const first = scribble[0];
      $ctx.quadraticCurveTo(
        node.x + last.dx * hoverGrow, node.y + last.dy * hoverGrow,
        node.x + first.dx * hoverGrow, node.y + first.dy * hoverGrow
      );
      $ctx.closePath();
      $ctx.fill();

      // stroke — conviction modulates opacity; tentative containers get dashed scribble
      const baseBorderA = node.boundary > 0.5 ? 0.5 : 0.3;
      const borderAlpha = isHover ? 0.7 : baseBorderA * (0.4 + conv * 0.6);
      $ctx.strokeStyle = isHover ? 'rgba(212,168,75,0.8)' : (
        node.source === 'chunxly'
          ? `rgba(${r},${g},${b},${borderAlpha})`
          : `rgba(94,196,168,${borderAlpha})`
      );
      $ctx.lineWidth = isHover ? 2 : (node.boundary > 0.5 ? 1.5 : 1);
      if (!isHover && conv < 0.5) $ctx.setLineDash([3, 4]);
      $ctx.beginPath();
      $ctx.moveTo(node.x + scribble[0].dx * hoverGrow, node.y + scribble[0].dy * hoverGrow);
      for (let i = 1; i < scribble.length; i++) {
        const prev = scribble[i - 1];
        const curr = scribble[i];
        const cpx = node.x + (prev.dx + curr.dx) * 0.5 * hoverGrow;
        const cpy = node.y + (prev.dy + curr.dy) * 0.5 * hoverGrow;
        $ctx.quadraticCurveTo(
          node.x + prev.dx * hoverGrow, node.y + prev.dy * hoverGrow,
          cpx, cpy
        );
      }
      $ctx.quadraticCurveTo(
        node.x + last.dx * hoverGrow, node.y + last.dy * hoverGrow,
        node.x + first.dx * hoverGrow, node.y + first.dy * hoverGrow
      );
      $ctx.closePath();
      $ctx.stroke();
      $ctx.setLineDash([]);
    } else {
      // fallback for visitor-placed nodes (no scribble yet): simple circle
      const radius = (node.size || 15) * (isHover ? 1.15 : 1);
      $ctx.fillStyle = `rgba(${r},${g},${b},0.15)`;
      $ctx.beginPath();
      $ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
      $ctx.fill();
      $ctx.strokeStyle = isHover ? 'rgba(212,168,75,0.8)' : 'rgba(94,196,168,0.4)';
      $ctx.lineWidth = isHover ? 2 : 1.5;
      $ctx.beginPath();
      $ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
      $ctx.stroke();
    }

    // center dot — conviction modulates presence
    const dotA = 0.3 + conv * 0.4;
    $ctx.fillStyle = `rgba(${r},${g},${b},${dotA})`;
    $ctx.beginPath();
    $ctx.arc(node.x, node.y, 3, 0, Math.PI * 2);
    $ctx.fill();
  }

  // diamond traces — subtle width ribbons showing what the fairy discovered
  for (const d of S.fairy.diamonds) {
    if (!d.pathSamples || d.pathSamples.length < 2) continue;
    const nA = S.nodes.find(n => n.id === d.nodeA);
    const nB = S.nodes.find(n => n.id === d.nodeB);
    if (!nA || !nB) continue;

    const dx = nB.x - nA.x, dy = nB.y - nA.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 1) continue;
    const perpX = -dy / dist, perpY = dx / dist;

    // draw the diamond width ribbon
    $ctx.fillStyle = d.symmetric
      ? 'rgba(94,196,168,0.04)'  // symmetric: teal tint
      : 'rgba(212,168,75,0.04)'; // asymmetric: amber tint
    $ctx.beginPath();
    const steps = d.widths.length;
    // top edge
    for (let i = 0; i < steps; i++) {
      const t = i / (steps - 1);
      const px = nA.x + (nB.x - nA.x) * t;
      const py = nA.y + (nB.y - nA.y) * t;
      const hw = d.widths[i] * 0.5 * (sz / S.imgW); // scale to canvas
