      if (i === 0) $ctx.moveTo(px + perpX * hw, py + perpY * hw);
      else $ctx.lineTo(px + perpX * hw, py + perpY * hw);
    }
    // bottom edge (reverse)
    for (let i = steps - 1; i >= 0; i--) {
      const t = i / (steps - 1);
      const px = nA.x + (nB.x - nA.x) * t;
      const py = nA.y + (nB.y - nA.y) * t;
      const hw = d.widths[i] * 0.5 * (sz / S.imgW);
      $ctx.lineTo(px - perpX * hw, py - perpY * hw);
    }
    $ctx.closePath();
    $ctx.fill();

    // direction indicator for asymmetric diamonds
    if (!d.symmetric) {
      const wideEnd = d.direction === 'a-to-b' ? nA : nB;
      const narrowEnd = d.direction === 'a-to-b' ? nB : nA;
      $ctx.strokeStyle = 'rgba(212,168,75,0.12)';
      $ctx.lineWidth = 1;
      $ctx.setLineDash([2, 3]);
      $ctx.beginPath();
      $ctx.moveTo(wideEnd.x, wideEnd.y);
      const arrowX = narrowEnd.x * 0.3 + wideEnd.x * 0.7;
      const arrowY = narrowEnd.y * 0.3 + wideEnd.y * 0.7;
      $ctx.lineTo(arrowX, arrowY);
      $ctx.stroke();
      $ctx.setLineDash([]);
    }
  }

  // round-trip delta overlay
  if (S.roundTrip) {
    const rt = S.roundTrip;
    const sz = S.canvasSize;

    // ghost dots: original container positions (amber hollow circles)
    for (const pair of rt.pairs) {
      const ox = pair.original.x * sz, oy = pair.original.y * sz;
      $ctx.strokeStyle = pair.status === 'preserved'
        ? 'rgba(212,168,75,0.25)' : 'rgba(138,180,196,0.3)';
      $ctx.lineWidth = 1;
      $ctx.setLineDash([]);
      $ctx.beginPath();
      $ctx.arc(ox, oy, 6, 0, Math.PI * 2);
      $ctx.stroke();

      // delta line: ghost → current position (dashed)
      if (pair.status === 'shifted') {
        $ctx.strokeStyle = pair.positionShift > 0.08
          ? 'rgba(138,180,196,0.3)' : 'rgba(212,168,75,0.2)';
        $ctx.lineWidth = 1;
        $ctx.setLineDash([3, 3]);
        $ctx.beginPath();
        $ctx.moveTo(ox, oy);
        $ctx.lineTo(pair.mazeNode.x, pair.mazeNode.y);
        $ctx.stroke();
        $ctx.setLineDash([]);
      }
    }

    // lost markers: X at original positions
    for (const orig of rt.lost) {
      const ox = orig.x * sz, oy = orig.y * sz;
      $ctx.strokeStyle = 'rgba(196,96,96,0.35)';
      $ctx.lineWidth = 1.5;
      $ctx.beginPath();
      $ctx.moveTo(ox - 4, oy - 4); $ctx.lineTo(ox + 4, oy + 4);
      $ctx.moveTo(ox + 4, oy - 4); $ctx.lineTo(ox - 4, oy + 4);
      $ctx.stroke();
    }

    // hull outline: faint boundary showing Chunxly's confidence region
    if (rt.hull && rt.hull.length >= 3) {
      $ctx.strokeStyle = 'rgba(212,168,75,0.12)';
      $ctx.lineWidth = 1;
      $ctx.setLineDash([4, 6]);
      $ctx.beginPath();
      // expand hull by 10% (same as classification padding) for visual
      const hcx = rt.hull.reduce((s, p) => s + p.x, 0) / rt.hull.length;
      const hcy = rt.hull.reduce((s, p) => s + p.y, 0) / rt.hull.length;
      rt.hull.forEach((p, i) => {
        const ex = (p.x + (p.x - hcx) * 0.1) * sz;
        const ey = (p.y + (p.y - hcy) * 0.1) * sz;
        if (i === 0) $ctx.moveTo(ex, ey); else $ctx.lineTo(ex, ey);
      });
      $ctx.closePath();
      $ctx.stroke();
      $ctx.setLineDash([]);
    }

    // emergent glow: teal ring on containers the maze added (inside hull)
    const emergentIds = new Set(rt.emergent.map(n => n.id));
    for (const node of S.nodes) {
      if (!emergentIds.has(node.id)) continue;
      const pulse = 0.15 + Math.sin(Date.now() * 0.003) * 0.1;
      $ctx.strokeStyle = `rgba(94,196,168,${pulse})`;
      $ctx.lineWidth = 2;
      $ctx.beginPath();
      $ctx.arc(node.x, node.y, (node.size || 15) + 6, 0, Math.PI * 2);
      $ctx.stroke();
    }

    // stray markers: dim gray ring on containers outside hull (noise)
    const strayIds = new Set((rt.stray || []).map(n => n.id));
    for (const node of S.nodes) {
      if (!strayIds.has(node.id)) continue;
      $ctx.strokeStyle = 'rgba(120,120,120,0.15)';
      $ctx.lineWidth = 1;
      $ctx.setLineDash([2, 3]);
      $ctx.beginPath();
      $ctx.arc(node.x, node.y, (node.size || 15) + 6, 0, Math.PI * 2);
      $ctx.stroke();
      $ctx.setLineDash([]);
    }
  }

  // fairy visions (behind sprite, accumulate on canvas)
  renderVisions($ctx);

  // fairy sprite
  renderFairy($ctx);

  // part-label picker (topmost layer)
  renderPicker($ctx);
}

function updateNodeCount() {
  const nc = document.getElementById('nodeCount');
  const edges = S.edges.length;
  let text = `${S.nodes.length} container${S.nodes.length !== 1 ? 's' : ''}`;
  if (edges) text += ` · ${edges} edge${edges !== 1 ? 's' : ''}`;
  nc.textContent = text;
}

// ═══════════════════════════════════════════════════════
//  Visitor interaction
// ═══════════════════════════════════════════════════════
function nodeAt(x, y) {
  let best = null, bestDist = 20;
  for (const n of S.nodes) {
    const d = Math.sqrt((n.x - x) ** 2 + (n.y - y) ** 2);
    if (d < bestDist) { best = n; bestDist = d; }
  }
  return best;
}

function canvasCoords(e) {
  const rect = $canvas.getBoundingClientRect();
  const scaleX = S.canvasSize / rect.width;
  const scaleY = S.canvasSize / rect.height;
  if (e.touches) {
    return {
      x: (e.touches[0].clientX - rect.left) * scaleX,
      y: (e.touches[0].clientY - rect.top) * scaleY
    };
  }
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

let pointerDown = false, pointerMoved = false, pointerStartNode = null;
let longPressTimer = null;
function isDrawingPhase() { return S.phase === 'drawing' || S.phase === 'chunxly-painting'; }

function onPointerDown(e) {
  e.preventDefault();
  const { x, y } = canvasCoords(e);
  pointerDown = true;
  pointerMoved = false;

  if (isDrawingPhase()) {
    S.isDrawing = true;
    lastDrawX = -1; lastDrawY = -1;
    drawBrush(x * S.imgW / S.canvasSize, y * S.imgH / S.canvasSize);
    render();
    return;
  }

  if (S.phase !== 'visitor') return;

  const node = nodeAt(x, y);
  pointerStartNode = node;

  if (node) {
    // start potential drag or connection
    longPressTimer = setTimeout(() => {
      // long press = delete
      if (!pointerMoved && pointerStartNode === node) {
        removeNode(node.id);
        pointerStartNode = null;
        showNotif('node removed');
      }
    }, 600);
  }
}

function onPointerMove(e) {
  e.preventDefault();
  if (!pointerDown && S.phase !== 'visitor') return;
  const { x, y } = canvasCoords(e);

  if (isDrawingPhase() && S.isDrawing) {
    drawBrush(x * S.imgW / S.canvasSize, y * S.imgH / S.canvasSize);
    render();
    return;
  }

  if (S.phase !== 'visitor') {
    // hover
    const node = nodeAt(x, y);
    S.hoverNode = node ? node.id : null;
    render();
    return;
  }

  const node = nodeAt(x, y);
  S.hoverNode = node ? node.id : null;

  if (pointerDown && pointerStartNode) {
    const dx = x - pointerStartNode.x, dy = y - pointerStartNode.y;
    if (Math.sqrt(dx * dx + dy * dy) > 5) {
      pointerMoved = true;
      if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    }

    if (pointerMoved) {
      if (node && node !== pointerStartNode) {
        // hovering over another node → show connection preview
        S.connectFrom = pointerStartNode.id;
      } else if (!node) {
        // dragging node to new position
        pointerStartNode.x = x;
        pointerStartNode.y = y;
        S.connectFrom = null;
      }
    }
  }

  render();
}

function onPointerUp(e) {
  e.preventDefault();
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }

  if (isDrawingPhase()) {
    S.isDrawing = false;
    lastDrawX = -1; lastDrawY = -1;
    pointerDown = false;
    return;
  }

  if (S.phase !== 'visitor') { pointerDown = false; return; }

  const coords = e.changedTouches
    ? { x: (e.changedTouches[0].clientX - $canvas.getBoundingClientRect().left) * (S.canvasSize / $canvas.getBoundingClientRect().width),
        y: (e.changedTouches[0].clientY - $canvas.getBoundingClientRect().top) * (S.canvasSize / $canvas.getBoundingClientRect().height) }
    : canvasCoords(e);
  const { x, y } = coords;

  // picker interaction — check before normal node handling
  if (S.picker && !pointerMoved) {
    const tile = pickerTileAt(x, y);
    if (tile) {
      // visitor selected a label
      const v = S.fairy.visions[S.picker.visionIndex];
      if (v) {
        const node = S.nodes.find(n => n.id === v.nodeId);
        if (node) {
          node.partLabel = tile.emoji;
          v.emoji = tile.emoji;
          v.isVisitor = true;
        }
      }
      closePicker();
      pointerDown = false;
      pointerMoved = false;
      pointerStartNode = null;
      return;
    }
    // tapped outside picker — dismiss
    closePicker();
  }

  // vision tap — open picker if tapping a settled emoji
  if (!pointerMoved) {
    const vi = visionAt(x, y);
    if (vi >= 0) {
      const v = S.fairy.visions[vi];
      openPicker(vi, v.x, v.y - 20);
      pointerDown = false;
      pointerMoved = false;
      pointerStartNode = null;
      return;
    }
  }

  const node = nodeAt(x, y);

  if (pointerStartNode && pointerMoved && node && node !== pointerStartNode) {
    // connect the two nodes
    const existing = S.edges.find(e =>
      (e.from === pointerStartNode.id && e.to === node.id) ||
      (e.to === pointerStartNode.id && e.from === node.id)
    );
    if (existing) {
      // toggle off
      S.edges = S.edges.filter(e => e !== existing);
    } else {
      S.edges.push({ from: pointerStartNode.id, to: node.id, source: 'visitor' });
      voiceOnConnect();
    }
    updateNodeCount();
  } else if (pointerStartNode && !pointerMoved && node === pointerStartNode) {
    // tap: cycle container size (small → medium → large → small)
    const sizes = [15, 28, 42];
    let closest = 0;
    let closestDist = Infinity;
    sizes.forEach((s, i) => { const d = Math.abs(node.size - s); if (d < closestDist) { closestDist = d; closest = i; } });
    const nextSize = sizes[(closest + 1) % sizes.length];
    node.size = nextSize;
    const wobble = node.wobble || 0.4;
    const boundary = node.boundary || 0.3;
    node.scribble = generateScribble(nextSize, wobble, boundary);
    showNotif(nextSize <= 18 ? 'tight' : nextSize <= 32 ? 'medium' : 'loose');
  } else if (!pointerStartNode && !pointerMoved) {
    // tap on empty space: add visitor container
    const color = sampleImageAt(x, y);
    const size = 22;
    const wobble = 0.4 + Math.random() * 0.2;
    const boundary = 0.3;
    const node = {
      id: S.nextId++,
      x, y, color,
      size, boundary, wobble,
      energy: 0.5, gradMag: 0, gradAngle: 0, edge: 0, sat: 0.5,
      scribble: generateScribble(size, wobble, boundary),
      source: 'visitor'
    };
    S.nodes.push(node);
    updateNodeCount();
    showNotif('container added');
  } else if (pointerStartNode && pointerMoved && !node) {
    // dragged to empty space = rearrange
    voiceOnRearrange();
  }

  S.connectFrom = null;
  pointerDown = false;
  pointerMoved = false;
  pointerStartNode = null;
  render();
}

function onRightClick(e) {
  e.preventDefault();
  if (S.phase !== 'visitor') return;
  const { x, y } = canvasCoords(e);
  const node = nodeAt(x, y);
  if (node) {
    removeNode(node.id);
    showNotif('node removed');
  }
}

function removeNode(id) {
  S.nodes = S.nodes.filter(n => n.id !== id);
  S.edges = S.edges.filter(e => e.from !== id && e.to !== id);
  updateNodeCount();
  render();
}

function sampleImageAt(canvasX, canvasY) {
  if (!S.imageCanvas) return [180, 140, 90];
  const ix = Math.round(canvasX * S.imgW / S.canvasSize);
  const iy = Math.round(canvasY * S.imgH / S.canvasSize);
  const ictx = S.imageCanvas.getContext('2d');
  const px = ictx.getImageData(Math.max(0, Math.min(S.imgW - 1, ix)),
                                Math.max(0, Math.min(S.imgH - 1, iy)), 1, 1).data;
  return [px[0], px[1], px[2]];
}

let lastConnectVoice = 0;
function voiceOnConnect() {
  const now = Date.now();
  if (now - lastConnectVoice < 4000) return;
  lastConnectVoice = now;
  const [iv, ov] = pickVoice('visitor_connect');
  setVoice(iv, ov, true);
}

let lastRearrangeVoice = 0;
function voiceOnRearrange() {
  const now = Date.now();
  if (now - lastRearrangeVoice < 5000) return;
  lastRearrangeVoice = now;
  const [iv, ov] = pickVoice('visitor_rearrange');
  setVoice(iv, ov, true);
}

// event binding
$canvas.addEventListener('mousedown', onPointerDown);
$canvas.addEventListener('mousemove', onPointerMove);
$canvas.addEventListener('mouseup', onPointerUp);
$canvas.addEventListener('mouseleave', () => {
  if (isDrawingPhase()) { S.isDrawing = false; lastDrawX = -1; lastDrawY = -1; }
  pointerDown = false; S.hoverNode = null; S.connectFrom = null; render();
});
$canvas.addEventListener('contextmenu', onRightClick);
$canvas.addEventListener('touchstart', onPointerDown, { passive: false });
$canvas.addEventListener('touchmove', onPointerMove, { passive: false });
$canvas.addEventListener('touchend', onPointerUp, { passive: false });

// ═══════════════════════════════════════════════════════
//  Ping-pong (Chunxly's eager suggestions)
// ═══════════════════════════════════════════════════════
let pingPongIval = null;
function startPingPong() {
  if (pingPongIval) clearInterval(pingPongIval);
  pingPongIval = setInterval(maybeSuggest, 6000 + Math.random() * 4000);
}

function maybeSuggest() {
  if (S.phase !== 'visitor' || S.chunxly.busy) return;
  if (S.nodes.length < 2) return;

  // find two nearby unconnected nodes
  let bestPair = null, bestDist = Infinity;
  for (let i = 0; i < S.nodes.length; i++) {
    for (let j = i + 1; j < S.nodes.length; j++) {
      const a = S.nodes[i], b = S.nodes[j];
      const connected = S.edges.some(e =>
        (e.from === a.id && e.to === b.id) || (e.to === a.id && e.from === b.id)
      );
      if (connected) continue;
      const d = Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
      // color affinity bonus
      const colorDist = Math.sqrt(
        (a.color[0] - b.color[0]) ** 2 +
        (a.color[1] - b.color[1]) ** 2 +
        (a.color[2] - b.color[2]) ** 2
      );
      const score = d + colorDist * 0.3;
      if (score < bestDist) { bestDist = score; bestPair = [a, b]; }
    }
  }

  if (!bestPair || bestDist > S.canvasSize * 0.6) return;

  // suggest this connection
  S.suggestEdge = { from: bestPair[0].id, to: bestPair[1].id };
  const [iv, ov] = pickVoice('suggest');
  setVoice(iv, ov, true);
  drawSprite('eager');

  // auto-connect after 4s if not dismissed
  S.suggestTimer = setTimeout(() => {
    if (S.suggestEdge) {
      S.edges.push({ from: S.suggestEdge.from, to: S.suggestEdge.to, source: 'chunxly' });
      S.suggestEdge = null;
      drawSprite('pleased');
      updateNodeCount();
      render();
    }
  }, 4000);

  render();
}

// dismiss suggestion on any visitor action (handled in pointer events)
function dismissSuggestion() {
  if (S.suggestEdge) {
    S.suggestEdge = null;
    if (S.suggestTimer) { clearTimeout(S.suggestTimer); S.suggestTimer = null; }
    render();
  }
}

// ═══════════════════════════════════════════════════════
//  Export
// ═══════════════════════════════════════════════════════
function exportCreature() {
  if (S.nodes.length === 0) { showNotif('no nodes to export'); return; }

  setPhase('done');
  if (pingPongIval) { clearInterval(pingPongIval); pingPongIval = null; }
  dismissSuggestion();

  // derive pin type from container properties (Chunxly's language → EFDP's language)
  function derivePin(node) {
    const b = node.boundary || 0.3;
    const gm = node.gradMag || 0;
    const e = node.edge || 0;
    const s = node.sat || 0;
    // tight + sharp gradient = triangle, structured edge = square, else circle
    let type;
    if (b > 0.75 && gm > 0.35 && e > 0.3 && s > 0.2) type = 'triangle';
    else if (b > 0.45 && e > 0.15) type = 'square';
    else type = 'circle';
    // direction from gradient angle
    let direction = 0;
    if (type === 'triangle' && node.gradAngle !== undefined) {
      const deg = ((node.gradAngle * 180 / Math.PI) + 360 + 90) % 360;
      if (deg < 45 || deg >= 315) direction = 0;
      else if (deg < 135) direction = 1;
      else if (deg < 225) direction = 2;
      else direction = 3;
    }
    // strength from energy, boundary, and conviction
    // conviction scales: 0.2 → ×0.5, 0.6 → ×0.8, 1.0 → ×1.0
    const conv = node.conviction ?? 1.0;
    const convScale = 0.5 + conv * 0.5;
    const rawStr = (node.energy || 0.5) * 6 + (node.edge || 0) * 4;
    const strength = Math.max(1, Math.min(10, Math.round(rawStr * convScale)));
    return { type, direction, strength };
  }

  // pin configuration (containers condensed to pins)
  const pinConfig = S.nodes.map((n, i) => {
    const pin = derivePin(n);
    return {
      x: n.x / S.canvasSize,
      y: n.y / S.canvasSize,
      color: n.color,
      type: pin.type,
      strength: pin.strength,
      direction: pin.direction,
      size: n.size,
      boundary: n.boundary,
      conviction: n.conviction ?? 1.0,
      structuralRole: n.structuralRole || 'unclassified',
      fairyBodyWeight: n.fairyBodyWeight ?? null,
      fairyAccentScore: n.fairyAccentScore ?? null,
      fairyEmoji: n.fairyEmoji || n.seepEmoji || null,
      partLabel: n.partLabel || n.fairyEmoji || n.seepEmoji || null,
      partLabelSource: n.partLabel ? 'visitor' : (n.fairyEmoji ? 'fairy' : (n.seepEmoji ? 'seep' : null)),
      connected: [...getConnectedNodeIds(n.id)]
        .map(id => S.nodes.findIndex(nn => nn.id === id))
        .filter(idx => idx >= 0)
    };
  });

  // add round-trip delta to matched pins
  if (S.roundTrip) {
    for (const pair of S.roundTrip.pairs) {
      const idx = S.nodes.indexOf(pair.mazeNode);
      if (idx >= 0 && pinConfig[idx]) {
        pinConfig[idx].delta = {
          positionShift: pair.positionShift,
          colorShift: pair.colorShift,
          sizeChange: pair.sizeChange,
          originalConviction: pair.original.conviction,
          status: pair.status,
        };
      }
    }
  }

  // CrankSeed
  const pinCounts = { circle: 0, square: 0, triangle: 0 };
  pinConfig.forEach(p => pinCounts[p.type]++);
  const dominantPinType = Object.entries(pinCounts).sort((a, b) => b[1] - a[1])[0]?.[0] || 'circle';

  // dominant color: weighted average by fairy body mass (accent nodes contribute less)
  // falls back to flat average if fairy data isn't available
  // filter out nodes matching image background (detected by Stall pixel analysis)
  const bgThreshold = 55;
  let bgColor = null;
  if (S.stallAnalysis && S.stallAnalysis._bgColor) {
    bgColor = S.stallAnalysis._bgColor;
  }
  const colorWeightSum = [0, 0, 0];
  let totalWeight = 0;
  S.nodes.forEach(n => {
    // skip nodes whose color is close to the image background
    if (bgColor) {
      const bgDist = Math.sqrt((n.color[0] - bgColor[0]) ** 2 + (n.color[1] - bgColor[1]) ** 2 + (n.color[2] - bgColor[2]) ** 2);
      if (bgDist < bgThreshold) return;
    }
    // body nodes get full weight, accents get 0.15, limbs/details get 0.5
    const roleWeight = n.structuralRole === 'body' ? 1.0
      : n.structuralRole === 'accent' ? 0.15
      : n.structuralRole === 'limb' ? 0.6
      : 0.4;
    const w = (n.fairyBodyWeight ?? 0.5) * roleWeight * (n.conviction ?? 1.0);
    colorWeightSum[0] += n.color[0] * w;
    colorWeightSum[1] += n.color[1] * w;
    colorWeightSum[2] += n.color[2] * w;
    totalWeight += w;
  });
  const avgColor = totalWeight > 0
    ? [
        Math.round(colorWeightSum[0] / totalWeight),
        Math.round(colorWeightSum[1] / totalWeight),
        Math.round(colorWeightSum[2] / totalWeight),
      ]
    : (() => {
        const flat = [0, 0, 0];
        S.nodes.forEach(n => { flat[0] += n.color[0]; flat[1] += n.color[1]; flat[2] += n.color[2]; });
        return flat.map(v => Math.round(v / S.nodes.length));
      })();
  const dominantHex = rgbToHex(avgColor[0], avgColor[1], avgColor[2]);

  // secondary color: color of non-background node furthest from average
  let maxColorDist = 0, secondaryHex = null;
  for (const n of S.nodes) {
    if (bgColor) {
      const bgDist = Math.sqrt((n.color[0] - bgColor[0]) ** 2 + (n.color[1] - bgColor[1]) ** 2 + (n.color[2] - bgColor[2]) ** 2);
      if (bgDist < bgThreshold) continue;
    }
    const d = Math.sqrt((n.color[0] - avgColor[0]) ** 2 + (n.color[1] - avgColor[1]) ** 2 + (n.color[2] - avgColor[2]) ** 2);
    if (d > maxColorDist && d > 50) { maxColorDist = d; secondaryHex = rgbToHex(n.color[0], n.color[1], n.color[2]); }
  }

  // palette key — match against largest color cluster's hue (most pixels)
  // hue-based matching correctly maps "bright red" to fire, not to item/brown
  // falls back to RGB distance for low-saturation clusters
  const CRANK_PAL_REFS = {
    nature: [90, 158, 58], creature: [15, 52, 96], item: [139, 69, 19],
    fire: [139, 0, 0], ice: [0, 51, 102], poison: [75, 0, 130],
    ghost: [26, 26, 62], earth: [61, 43, 31], water: [0, 136, 204], light: [61, 51, 0]
  };
  // hue (center of 30° bucket) → palette key mapping
  const HUE_PAL_MAP = [
    /* 0°   red         */ 'fire',
    /* 30°  orange      */ 'item',
    /* 60°  yellow      */ 'light',
    /* 90°  yellow-grn  */ 'nature',
    /* 120° green       */ 'nature',
    /* 150° cyan-grn    */ 'water',
    /* 180° cyan        */ 'water',
    /* 210° blue        */ 'creature',
    /* 240° indigo      */ 'ghost',
    /* 270° purple      */ 'poison',
    /* 300° magenta     */ 'poison',
    /* 330° red-magenta */ 'fire',
  ];
  let bestPal = 'creature';
  const topCluster = S.stallAnalysis && S.stallAnalysis._colorClusters && S.stallAnalysis._colorClusters[0];
  if (topCluster && topCluster.count > 0) {
    // check saturation of cluster color — hue is only meaningful for saturated colors
    const [, clusterSat] = rgbToHsl(topCluster.color[0], topCluster.color[1], topCluster.color[2]);
    if (clusterSat > 0.15) {
      bestPal = HUE_PAL_MAP[Math.floor(topCluster.hue / 30) % 12];
    } else {
      // low saturation (gray/brown) — use RGB distance as fallback
      let bestPalDist = Infinity;
      for (const [key, ref] of Object.entries(CRANK_PAL_REFS)) {
        const d = Math.sqrt((topCluster.color[0] - ref[0]) ** 2 + (topCluster.color[1] - ref[1]) ** 2 + (topCluster.color[2] - ref[2]) ** 2);
        if (d < bestPalDist) { bestPalDist = d; bestPal = key; }
      }
    }
  } else {
    // no cluster data — use weighted average with RGB distance
    let bestPalDist = Infinity;
    for (const [key, ref] of Object.entries(CRANK_PAL_REFS)) {
      const d = Math.sqrt((avgColor[0] - ref[0]) ** 2 + (avgColor[1] - ref[1]) ** 2 + (avgColor[2] - ref[2]) ** 2);
      if (d < bestPalDist) { bestPalDist = d; bestPal = key; }
    }
  }

  // cohesion from graph topology
  const components = findComponents();
  let cohesionMode;
  if (components.length === 1 && S.edges.length > 0) {
    // check if star-like (one node with high degree)
    const degrees = {};
    S.edges.forEach(e => { degrees[e.from] = (degrees[e.from] || 0) + 1; degrees[e.to] = (degrees[e.to] || 0) + 1; });
    const maxDeg = Math.max(...Object.values(degrees));
    if (maxDeg >= S.nodes.length * 0.5) cohesionMode = 'radial';
    else {
      // check chain-like (mostly degree 2)
      const deg2 = Object.values(degrees).filter(d => d <= 2).length;
      cohesionMode = deg2 >= Object.keys(degrees).length * 0.7 ? 'directional' : 'clustered';
    }
  } else if (components.length > 1) {
    cohesionMode = 'clustered';
  } else {
    cohesionMode = 'scattered';
  }

  const meanStrength = pinConfig.length
    ? pinConfig.reduce((s, p) => s + p.strength, 0) / pinConfig.length : 0;
  const PIN_TYPE_HINTS = {
    circle: ['blob', 'ring', 'circle'],
    square: ['rect', 'cross', 'diamond'],
    triangle: ['spike', 'line', 'scatter'],
  };
  const maxType = pinCounts[dominantPinType] / Math.max(1, pinConfig.length);
  const extraShapeHints = maxType > 0.5
    ? PIN_TYPE_HINTS[dominantPinType]
    : ['irregular', 'blob'];

  // average boundary as a measure of how "defined" the creature is
  const avgBoundary = S.nodes.reduce((s, n) => s + (n.boundary || 0.3), 0) / Math.max(1, S.nodes.length);

  // fairy's structural observations
  const diamonds = S.fairy.diamonds || [];
  const symmetricCount = diamonds.filter(d => d.symmetric).length;
  const asymmetricCount = diamonds.length - symmetricCount;
  const avgDiamondWidth = diamonds.length
    ? Math.round(diamonds.reduce((s, d) => s + (d.avgWidth || 0), 0) / diamonds.length * 10) / 10 : 0;

  const crankSeed = {
    source: 'chunxly',
    pinCounts,
    dominantPinType,
    dominantHex,
    paletteKey: bestPal,
    secondaryHex,
    cohesionMode,
    meanStrength: Math.round(meanStrength * 10) / 10,
    calcifiedRatio: Math.round(avgBoundary * 100) / 100,
    totalKiwis: 0,
    kiwiDensity: 'sparse',
    layerCount: components.length,
    extraShapeHints,
    // conviction (multi-pass consensus)
    avgConviction: Math.round(S.nodes.reduce((s, n) => s + (n.conviction ?? 1), 0) / Math.max(1, S.nodes.length) * 100) / 100,
    convictionProfile: (() => {
      const avg = S.nodes.reduce((s, n) => s + (n.conviction ?? 1), 0) / Math.max(1, S.nodes.length);
      return avg > 0.7 ? 'certain' : avg > 0.4 ? 'mixed' : 'tentative';
    })(),
    // fairy structural observations
    fairyTraces: diamonds.length,
    symmetryRatio: diamonds.length ? Math.round(symmetricCount / diamonds.length * 100) / 100 : 0,
    avgDiamondWidth,
    structuralDirection: asymmetricCount > symmetricCount ? 'directional' : 'balanced',
    // structural role breakdown (from fairy reweighting)
    structuralProfile: (() => {
      const roles = { body: 0, limb: 0, accent: 0, detail: 0, unclassified: 0 };
      S.nodes.forEach(n => {
        const r = n.structuralRole || 'unclassified';
        roles[r] = (roles[r] || 0) + 1;
      });
      return roles;
    })(),
    // per-aspect shape vocabulary (populated after export, but seeded here from node data)
    aspects: (() => {
      const bodyNodes = pinConfig.filter(p => p.structuralRole === 'body' || p.structuralRole === 'limb');
      const accentNodes = pinConfig.filter(p => p.structuralRole === 'accent' || p.structuralRole === 'detail');
      if (bodyNodes.length === 0 && accentNodes.length === 0) return null;
      const result = [];
      if (bodyNodes.length >= 2) {
        const avg = [0,0,0];
        bodyNodes.forEach(p => { avg[0]+=p.color[0]; avg[1]+=p.color[1]; avg[2]+=p.color[2]; });
        result.push({
          role: 'body',
          hex: rgbToHex(Math.round(avg[0]/bodyNodes.length), Math.round(avg[1]/bodyNodes.length), Math.round(avg[2]/bodyNodes.length)),
          pinCount: bodyNodes.length,
          shape: inferAspectShape(bodyNodes),
          avgConviction: Math.round(bodyNodes.reduce((s,p) => s+(p.conviction??1),0)/bodyNodes.length*100)/100,
        });
      }
      if (accentNodes.length >= 2) {
        const avg = [0,0,0];
        accentNodes.forEach(p => { avg[0]+=p.color[0]; avg[1]+=p.color[1]; avg[2]+=p.color[2]; });
        result.push({
          role: 'accent',
          hex: rgbToHex(Math.round(avg[0]/accentNodes.length), Math.round(avg[1]/accentNodes.length), Math.round(avg[2]/accentNodes.length)),
          pinCount: accentNodes.length,
          shape: inferAspectShape(accentNodes),
          avgConviction: Math.round(accentNodes.reduce((s,p) => s+(p.conviction??1),0)/accentNodes.length*100)/100,
        });
      }
      return result.length > 0 ? result : null;
    })(),
    // fairy visions
    fairyVisions: S.fairy.visions.length,
    partLabels: (() => {
      let fairy = 0, visitor = 0, seep = 0, unlabeled = 0;
      S.nodes.forEach(n => {
        if (n.partLabel) visitor++;
        else if (n.fairyEmoji) fairy++;
        else if (n.seepEmoji) seep++;
        else unlabeled++;
      });
      return { fairy, visitor, seep, unlabeled };
    })(),
  };

  // add Stall analysis data (tags, naming, entity identity, color clusters)
  if (S.stallAnalysis) {
    crankSeed.stallTags = S.stallAnalysis.tags || [];
    crankSeed.stallName = S.stallAnalysis.chunxme_name || null;
    crankSeed.stallDescription = S.stallAnalysis.description || null;
    if (S.stallAnalysis._colorClusters) {
      crankSeed.colorClusters = S.stallAnalysis._colorClusters;
    }
  }
  if (S.stallName) {
    crankSeed.slug = S.stallName.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    crankSeed.entityName = S.stallName;
  }

  // add round-trip data if comparison was performed
  if (S.roundTrip) {
    crankSeed.roundTrip = {
      ...S.roundTrip.summary,
      avgPositionShift: S.roundTrip.avgPositionShift,
      avgColorShift: S.roundTrip.avgColorShift,
    };
  }

  // write to localStorage
  try {
    localStorage.setItem('baseline-session/chunxly-canvas', JSON.stringify(pinConfig));
    localStorage.setItem('baseline-session/crank-seed', JSON.stringify(crankSeed));
    // store original containers for round-trip comparison (normalized to canvas coords)
    if (!S.roundTrip) {
      const originals = S.nodes.map(n => ({
        x: n.x / S.canvasSize, y: n.y / S.canvasSize,
        color: n.color, size: n.size, boundary: n.boundary, conviction: n.conviction ?? 1.0
      }));
      // compute bounding hull from high-conviction containers
      const hullSources = originals.filter(o => (o.conviction ?? 1) >= 0.5);
      const hull = convexHull(hullSources.length >= 3 ? hullSources : originals);
      localStorage.setItem('baseline-session/chunxly-original', JSON.stringify({ containers: originals, hull }));
    }
    // clean up consumed snapshot after round-trip export
    if (S.roundTrip) {
      localStorage.removeItem('baseline-session/efdp-snapshot');
    }
  } catch (e) { /* storage full, etc */ }

  // hub postMessage
  if (window.parent !== window) {
    const emoji = ['🎨', '🖌️', '✨', '🦎', '🐙', '🌸'][Math.floor(Math.random() * 6)];
    window.parent.postMessage({ type: 'hub:scraggle', emoji, signal: 'Chunxly finished a creature.' }, '*');
  }

  // voice
  const [iv, ov] = pickVoice('finish', { n: String(S.nodes.length), e: String(S.edges.length) });
  setVoice(iv, ov, true);
  drawSprite('pleased');
  document.getElementById('btnFinish').style.display = 'none';

  showNotif('creature exported');
  showSeedPanel(crankSeed);

  // generate CPM templates — full single + per-aspect (backward compat, derived from layers)
  generateCPM(pinConfig);

  // ── layer clustering: identity-based grouping from fairy signal ──
  const layers = clusterLayers(pinConfig);
  if (layers && layers.length > 0) {
    // render filled PNGs per layer and store
    const layerPNGs = [];
    for (const layer of layers) {
      const dataUrl = renderLayerPNG(layer, pinConfig);
      const storageKey = `baseline-session/chunxly-layer-${layer.id}`;
      try { localStorage.setItem(storageKey, dataUrl); } catch(e) {}
      layerPNGs.push({ id: layer.id, key: storageKey });
    }

    // store layer metadata (includes PNG storage keys)
    try {
      const layerMeta = layers.map((l, i) => ({
        id: l.id, emoji: l.emoji, role: l.role, source: l.source,
        hex: l.hex, bounds: l.bounds, order: l.order,
        avgConviction: l.avgConviction, nodeCount: l.nodeCount, shape: l.shape,
        pngKey: layerPNGs[i]?.key || null,
      }));
      localStorage.setItem('baseline-session/chunxly-layer-meta', JSON.stringify(layerMeta));
    } catch(e) {}

    // update crankSeed layerCount to reflect identity-based layers
    crankSeed.layerCount = layers.length;

    // derive aspects from layers (Option B: backward-compat projection)
    // body aspect = all layers with role body or limb
    // accent aspect = all layers with role accent or detail
    const bodyLayerPins = [];
    const accentLayerPins = [];
    for (const layer of layers) {
      const pins = layer.nodeIndices.map(idx => pinConfig[idx]);
      if (layer.role === 'body' || layer.role === 'limb') bodyLayerPins.push(...pins);
      else if (layer.role === 'accent' || layer.role === 'detail') accentLayerPins.push(...pins);
      else bodyLayerPins.push(...pins); // unclassified → body bucket
    }

    // update crankSeed aspects from layer-derived buckets
    const derivedAspects = [];
    if (bodyLayerPins.length >= 2) {
      const avg = [0,0,0];
      bodyLayerPins.forEach(p => { avg[0]+=p.color[0]; avg[1]+=p.color[1]; avg[2]+=p.color[2]; });
      derivedAspects.push({
        role: 'body',
        hex: rgbToHex(Math.round(avg[0]/bodyLayerPins.length), Math.round(avg[1]/bodyLayerPins.length), Math.round(avg[2]/bodyLayerPins.length)),
        pinCount: bodyLayerPins.length,
        shape: inferAspectShape(bodyLayerPins),
        avgConviction: Math.round(bodyLayerPins.reduce((s,p) => s+(p.conviction??1),0)/bodyLayerPins.length*100)/100,
      });
    }
    if (accentLayerPins.length >= 2) {
      const avg = [0,0,0];
      accentLayerPins.forEach(p => { avg[0]+=p.color[0]; avg[1]+=p.color[1]; avg[2]+=p.color[2]; });
      derivedAspects.push({
        role: 'accent',
        hex: rgbToHex(Math.round(avg[0]/accentLayerPins.length), Math.round(avg[1]/accentLayerPins.length), Math.round(avg[2]/accentLayerPins.length)),
        pinCount: accentLayerPins.length,
        shape: inferAspectShape(accentLayerPins),
        avgConviction: Math.round(accentLayerPins.reduce((s,p) => s+(p.conviction??1),0)/accentLayerPins.length*100)/100,
      });
    }
    if (derivedAspects.length > 0) crankSeed.aspects = derivedAspects;

    // re-persist updated crankSeed
    try {
      localStorage.setItem('baseline-session/crank-seed', JSON.stringify(crankSeed));
    } catch(e) {}

    // update panel to reflect layer-derived aspects
    showSeedPanel(crankSeed);

    // generate backward-compat aspect CPMs from layer-derived buckets
    generateAspectCPMs(pinConfig);
  } else {
    // no layers (no fairy data) — fall back to old aspect generation
    generateAspectCPMs(pinConfig);
    try { localStorage.removeItem('baseline-session/chunxly-layer-meta'); } catch(e) {}
  }
}

function findComponents() {
  const visited = new Set();
  const components = [];
  for (const node of S.nodes) {
    if (visited.has(node.id)) continue;
    const comp = [];
    const queue = [node.id];
    while (queue.length) {
      const id = queue.shift();
      if (visited.has(id)) continue;
      visited.add(id);
      comp.push(id);
      S.edges.forEach(e => {
        if (e.from === id && !visited.has(e.to)) queue.push(e.to);
        if (e.to === id && !visited.has(e.from)) queue.push(e.from);
      });
    }
    components.push(comp);
  }
  // include isolated nodes as singleton components
  for (const node of S.nodes) {
    if (!visited.has(node.id)) {
      components.push([node.id]);
    }
  }
  return components;
}

// ═══════════════════════════════════════════════════════
//  clusterLayers — group nodes by fairy signal identity
//  Priority: visitor label > fairy emoji > fairy pool >
//            seep cluster > structural role fallback
//  Spatially disjoint clusters with same emoji → separate layers
//  Single-node layers merge into nearest layer by role
// ═══════════════════════════════════════════════════════
function clusterLayers(pinConfig) {
  const nodeById = new Map();
  S.nodes.forEach((n, i) => nodeById.set(n.id, { node: n, idx: i, pin: pinConfig[i] }));

  // ── Step 1: assign each node to a layer key by priority cascade ──
  const layerAssign = new Map(); // nodeIndex → layerKey

  const POOL_TO_ROLE = {
    body_core: 'body', mirror: 'body',
    limb_reach: 'limb', flow: 'limb',
    accent_tip: 'accent',
    detail_eye: 'detail', ambient: 'detail', outlier: 'detail',
  };

  S.nodes.forEach((n, i) => {
    let key = null;
    let source = null;

    // Priority 1: visitor label
    if (n.partLabel) {
      key = `visitor:${n.partLabel}`;
      source = 'visitor';
    }
    // Priority 2: fairy emoji (direct vision)
    else if (n.fairyEmoji) {
      key = `fairy:${n.fairyEmoji}`;
      source = 'fairy';
    }
    // Priority 3: fairy pool (structural intuition, even if emoji differ)
    else if (n.fairyPool) {
      key = `pool:${n.fairyPool}`;
      source = 'pool';
    }
    // Priority 4: seep cluster — dominant seep influence source
    else if (n.seepInfluence) {
      const entries = Object.entries(n.seepInfluence);
      if (entries.length > 0) {
        entries.sort((a, b) => b[1] - a[1]);
        key = `seep:${entries[0][0]}`;
        source = 'seep';
      }
    }

    // Priority 5: structural role fallback
    if (!key) {
      const role = n.structuralRole || 'unclassified';
      if (role === 'body' || role === 'limb') key = 'role:body-limb';
      else if (role === 'accent' || role === 'detail') key = 'role:accent-detail';
      else key = 'role:unclassified';
      source = source || 'role';
    }

    layerAssign.set(i, { key, source });
  });

  // ── Step 2: group nodes by layer key ──
  const keyGroups = new Map(); // key → [nodeIndex, ...]
  for (const [idx, assign] of layerAssign) {
    if (!keyGroups.has(assign.key)) keyGroups.set(assign.key, []);
    keyGroups.get(assign.key).push(idx);
  }

  // ── Step 3: spatial separation — split disjoint clusters within same key ──
  // Two nodes in the same key-group are "spatially connected" if they share
  // an edge (fairy diamond or drawn edge). Disjoint subgraphs become separate layers.
  const preLayers = []; // { key, emoji, role, source, nodeIndices }

  for (const [key, indices] of keyGroups) {
    // BFS within this group using graph connectivity
    const inGroup = new Set(indices);
    const visited = new Set();

    for (const startIdx of indices) {
      if (visited.has(startIdx)) continue;
      const cluster = [];
      const queue = [startIdx];
      while (queue.length) {
        const idx = queue.shift();
        if (visited.has(idx)) continue;
        visited.add(idx);
        cluster.push(idx);
        // walk connected neighbors that are in this same key-group
        const pin = pinConfig[idx];
        if (pin.connected) {
          for (const nIdx of pin.connected) {
            if (inGroup.has(nIdx) && !visited.has(nIdx)) queue.push(nIdx);
          }
        }
      }
      // also pull in spatially close nodes in the same group that lack edges
      // (proximity fallback: within 0.08 normalized distance)
      for (const cIdx of indices) {
        if (visited.has(cIdx)) continue;
        const cp = pinConfig[cIdx];
        for (const inIdx of cluster) {
          const ip = pinConfig[inIdx];
          const dx = cp.x - ip.x, dy = cp.y - ip.y;
          if (Math.sqrt(dx * dx + dy * dy) < 0.08) {
            visited.add(cIdx);
            cluster.push(cIdx);
            break;
          }
        }
      }

      // derive emoji and role for this cluster
      const keyParts = key.split(':');
      const keyType = keyParts[0];
      const keyVal = keyParts.slice(1).join(':');
      let emoji = null, role = null;

      if (keyType === 'visitor') {
        emoji = keyVal;
        // derive role from the majority structural role in this cluster
        role = majorityRole(cluster);
      } else if (keyType === 'fairy') {
        emoji = keyVal;
        role = majorityRole(cluster);
      } else if (keyType === 'pool') {
        emoji = clusterDominantEmoji(cluster);
        role = POOL_TO_ROLE[keyVal] || majorityRole(cluster);
      } else if (keyType === 'seep') {
        emoji = keyVal;
        role = majorityRole(cluster);
      } else {
        // role fallback
        emoji = clusterDominantEmoji(cluster);
        role = keyVal === 'body-limb' ? 'body' : keyVal === 'accent-detail' ? 'accent' : 'unclassified';
      }

      preLayers.push({
        key, emoji, role,
        source: layerAssign.get(cluster[0])?.source || 'role',
        nodeIndices: cluster,
      });
    }
  }

  // ── Step 4: minimum layer size — merge single-node layers ──
  const layers = [];
  const orphans = [];

  for (const layer of preLayers) {
    if (layer.nodeIndices.length >= 2) {
      layers.push(layer);
    } else {
      orphans.push(layer.nodeIndices[0]);
    }
  }

  // merge each orphan into nearest layer by structural role, then by spatial distance
  for (const orphIdx of orphans) {
    const orphNode = S.nodes[orphIdx];
    const orphRole = orphNode.structuralRole || 'unclassified';
    const orphPos = pinConfig[orphIdx];

    let bestLayer = null, bestDist = Infinity;

    for (const layer of layers) {
      // prefer role match
      const roleMatch = (
        (orphRole === 'body' || orphRole === 'limb') && (layer.role === 'body' || layer.role === 'limb')
      ) || (
        (orphRole === 'accent' || orphRole === 'detail') && (layer.role === 'accent' || layer.role === 'detail')
      );

      // spatial distance to nearest node in layer
      let minDist = Infinity;
      for (const lIdx of layer.nodeIndices) {
        const lp = pinConfig[lIdx];
        const dx = orphPos.x - lp.x, dy = orphPos.y - lp.y;
        minDist = Math.min(minDist, Math.sqrt(dx * dx + dy * dy));
      }

      // role match gets a big distance bonus
      const effectiveDist = roleMatch ? minDist * 0.5 : minDist;
      if (effectiveDist < bestDist) {
        bestDist = effectiveDist;
        bestLayer = layer;
      }
    }

    if (bestLayer) {
      bestLayer.nodeIndices.push(orphIdx);
    }
    // if no layers exist at all (extreme edge case), orphan is dropped — creature is too sparse
  }

  // ── Step 5: compute layer metadata ──
  const result = layers.map((layer, i) => {
    const pins = layer.nodeIndices.map(idx => pinConfig[idx]);
    const nodes = layer.nodeIndices.map(idx => S.nodes[idx]);

    // averaged hex color for this layer
    const avg = [0, 0, 0];
    nodes.forEach(n => { avg[0] += n.color[0]; avg[1] += n.color[1]; avg[2] += n.color[2]; });
    const count = nodes.length;
    const hex = rgbToHex(
      Math.round(avg[0] / count),
      Math.round(avg[1] / count),
      Math.round(avg[2] / count)
    );

    // spatial bounds (normalized 0-1)
    const xs = pins.map(p => p.x), ys = pins.map(p => p.y);
    const bounds = {
      minX: Math.min(...xs), maxX: Math.max(...xs),
      minY: Math.min(...ys), maxY: Math.max(...ys),
    };
    bounds.centroidX = (bounds.minX + bounds.maxX) / 2;
    bounds.centroidY = (bounds.minY + bounds.maxY) / 2;

    // conviction average
    const avgConviction = Math.round(
      nodes.reduce((s, n) => s + (n.conviction ?? 1), 0) / count * 100
    ) / 100;

    return {
      id: `${layer.emoji || layer.role}-${i}`,
      emoji: layer.emoji,
      role: layer.role,
      source: layer.source,
      hex,
      bounds,
      avgConviction,
      nodeCount: count,
      nodeIndices: layer.nodeIndices,
      shape: inferAspectShape(pins),
    };
  });

  // ── Step 6: layer ordering for compositing ──
  // body core → limbs (by centroid proximity to body) → detail → accent
  const ROLE_ORDER = { body: 0, limb: 1, detail: 2, accent: 3, unclassified: 1 };
  // find body centroid for limb ordering
  const bodyLayers = result.filter(l => l.role === 'body');
  const bodyCentroid = bodyLayers.length > 0
    ? {
        x: bodyLayers.reduce((s, l) => s + l.bounds.centroidX, 0) / bodyLayers.length,
        y: bodyLayers.reduce((s, l) => s + l.bounds.centroidY, 0) / bodyLayers.length,
      }
    : { x: 0.5, y: 0.5 };

  result.sort((a, b) => {
    const ra = ROLE_ORDER[a.role] ?? 1, rb = ROLE_ORDER[b.role] ?? 1;
    if (ra !== rb) return ra - rb;
    // within same role tier, closer to body centroid = lower in stack
    const da = Math.sqrt((a.bounds.centroidX - bodyCentroid.x) ** 2 + (a.bounds.centroidY - bodyCentroid.y) ** 2);
    const db = Math.sqrt((b.bounds.centroidX - bodyCentroid.x) ** 2 + (b.bounds.centroidY - bodyCentroid.y) ** 2);
    return da - db;
  });

  // assign compositing order
  result.forEach((layer, i) => { layer.order = i; });

  return result;

  // ── helpers ──
  function majorityRole(indices) {
    const counts = {};
    indices.forEach(idx => {
      const r = S.nodes[idx].structuralRole || 'unclassified';
      counts[r] = (counts[r] || 0) + 1;
    });
    return Object.entries(counts).sort((a, b) => b[1] - a[1])[0]?.[0] || 'unclassified';
  }

  function clusterDominantEmoji(indices) {
    const counts = {};
    indices.forEach(idx => {
      const n = S.nodes[idx];
      const e = n.partLabel || n.fairyEmoji || n.seepEmoji;
      if (e) counts[e] = (counts[e] || 0) + 1;
    });
    const top = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
    return top ? top[0] : null;
  }
}

// ═══════════════════════════════════════════════════════
//  renderLayerPNG — render a single layer as a filled PNG
//  Takes a layer object (from clusterLayers) and pinConfig,
//  returns a data URL (PNG, 512×512, transparent background,
//  flat color fill with hard edges)
// ═══════════════════════════════════════════════════════
function renderLayerPNG(layer, pinConfig) {
  const size = S.canvasSize || 512;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // parse layer hex to RGB
  const hex = layer.hex;
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);

  // work on a binary mask (1 = filled, 0 = empty) at canvas resolution
  const mask = new Uint8Array(size * size);

  // ── inflate each node: circle of radius based on node size ──
  // node.size is 4/8/16 px (container size), inflate further for solid body
  const layerIdxSet = new Set(layer.nodeIndices);

  for (const idx of layer.nodeIndices) {
    const n = S.nodes[idx];
    const cx = Math.round(n.x);
    const cy = Math.round(n.y);
    // inflation radius: node size + conviction-scaled padding
    const baseR = (n.size || 8) * 1.2;
    const conv = n.conviction ?? 1.0;
    const inflateR = Math.round(baseR + conv * 6);

    for (let dy = -inflateR; dy <= inflateR; dy++) {
      for (let dx = -inflateR; dx <= inflateR; dx++) {
        if (dx * dx + dy * dy > inflateR * inflateR) continue;
        const px = cx + dx, py = cy + dy;
        if (px >= 0 && px < size && py >= 0 && py < size) {
          mask[py * size + px] = 1;
        }
      }
    }
  }

  // ── walk edges between connected nodes within this layer ──
  // Bresenham with inflation radius along the path
  const edgeSet = new Set();
  for (const idx of layer.nodeIndices) {
    const pin = pinConfig[idx];
    if (!pin.connected) continue;
    for (const jIdx of pin.connected) {
      if (!layerIdxSet.has(jIdx)) continue;
      const key = Math.min(idx, jIdx) + '-' + Math.max(idx, jIdx);
      if (edgeSet.has(key)) continue;
      edgeSet.add(key);

      const nA = S.nodes[idx], nB = S.nodes[jIdx];
      // corridor width: average of both node sizes, scaled by conviction
      const avgSize = ((nA.size || 8) + (nB.size || 8)) / 2;
      const avgConv = ((nA.conviction ?? 1) + (nB.conviction ?? 1)) / 2;
      const corridorR = Math.round(avgSize * 0.8 + avgConv * 4);

      // Bresenham walk at canvas resolution
      let x0 = Math.round(nA.x), y0 = Math.round(nA.y);
      const x1 = Math.round(nB.x), y1 = Math.round(nB.y);
      const dx = Math.abs(x1 - x0), dy = Math.abs(y1 - y0);
      const sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
      let err = dx - dy;
      let steps = 0;
      const maxSteps = dx + dy + 1;

      while (steps++ < maxSteps + size) {
        // inflate around current position
        for (let iy = -corridorR; iy <= corridorR; iy++) {
          for (let ix = -corridorR; ix <= corridorR; ix++) {
            if (ix * ix + iy * iy > corridorR * corridorR) continue;
            const px = x0 + ix, py = y0 + iy;
            if (px >= 0 && px < size && py >= 0 && py < size) {
              mask[py * size + px] = 1;
            }
          }
        }
        if (x0 === x1 && y0 === y1) break;
        const e2 = 2 * err;
        if (e2 > -dy) { err -= dy; x0 += sx; }
        if (e2 < dx) { err += dx; y0 += sy; }
      }
    }
  }

  // ── flood-fill interior gaps ──
  // find enclosed regions: any 0-cell fully surrounded by 1-cells that
  // can't reach the canvas border should be filled
  const visited = new Uint8Array(size * size);
  // BFS from all border 0-cells to mark exterior
  const queue = [];
  for (let x = 0; x < size; x++) {
    if (!mask[x]) queue.push(x); // top row
    if (!mask[(size - 1) * size + x]) queue.push((size - 1) * size + x); // bottom
  }
  for (let y = 1; y < size - 1; y++) {
    if (!mask[y * size]) queue.push(y * size); // left
    if (!mask[y * size + size - 1]) queue.push(y * size + size - 1); // right
  }
  for (const idx of queue) visited[idx] = 1;

  let qi = 0;
  while (qi < queue.length) {
    const pos = queue[qi++];
    const px = pos % size, py = (pos - px) / size;
    const neighbors = [
      py > 0 ? pos - size : -1,
      py < size - 1 ? pos + size : -1,
      px > 0 ? pos - 1 : -1,
      px < size - 1 ? pos + 1 : -1,
    ];
    for (const np of neighbors) {
      if (np >= 0 && !mask[np] && !visited[np]) {
        visited[np] = 1;
        queue.push(np);
      }
    }
  }

  // any unvisited 0-cell is interior — fill it
  for (let i = 0; i < size * size; i++) {
    if (!mask[i] && !visited[i]) mask[i] = 1;
  }

  // ── render mask to canvas ──
  const imgData = ctx.createImageData(size, size);
  const data = imgData.data;
  for (let i = 0; i < size * size; i++) {
    if (mask[i]) {
      const off = i * 4;
      data[off] = r;
      data[off + 1] = g;
      data[off + 2] = b;
      data[off + 3] = 255;
    }
    // else: stays transparent (0,0,0,0)
  }
  ctx.putImageData(imgData, 0, 0);

  return canvas.toDataURL('image/png');
}

function generateCPM(pinConfig, name) {
  // generate a .cpm-compatible template string that EFDP can parse
  // EFDP format: # colors → "A #hex", # pins → "A = type #hex str:N dir:D", # grid → letter rows
  const lines = ['# name', name || 'Chunxly Creature', '', '# scale', '6', '', '# colors'];
  const colorMap = new Map(); // hex → letter
  const pinLetters = [];      // per-pin letter assignments
  let letter = 65; // 'A'

  // assign letters to unique colors
  pinConfig.forEach(p => {
    const hex = rgbToHex(p.color[0], p.color[1], p.color[2]);
    if (!colorMap.has(hex)) {
      const ch = String.fromCharCode(letter++);
      colorMap.set(hex, ch);
      lines.push(`${ch} ${hex}`);
    }
    pinLetters.push(colorMap.get(hex));
  });

  // pins section
  lines.push('', '# pins');
  const dirs = ['up', 'right', 'down', 'left'];
  const emittedPins = new Set(); // avoid duplicate pin definitions for same letter
  pinConfig.forEach((p, i) => {
    const ch = pinLetters[i];
    if (emittedPins.has(ch)) return; // one definition per letter
    emittedPins.add(ch);
    const hex = rgbToHex(p.color[0], p.color[1], p.color[2]);
    const cv = Math.round((p.conviction ?? 1) * 100) / 100;
    const rolePart = p.structuralRole && p.structuralRole !== 'unclassified' ? ` role:${p.structuralRole}` : '';
    lines.push(`${ch} = ${p.type} ${hex} str:${p.strength} conv:${cv} dir:${dirs[p.direction] || 'up'}${rolePart}`);
  });

  // grid section — map pin positions onto a grid
  // larger grid = more shape fidelity for skeleton inflation
  lines.push('', '# grid');
  const gridSize = Math.min(18, Math.max(10, 10 + Math.floor((pinConfig.length - 8) / 6)));
  if (pinConfig.length > 0) {
    // contract positions toward centroid (20%) for tighter form
    const cx = pinConfig.reduce((s, p) => s + p.x, 0) / pinConfig.length;
    const cy = pinConfig.reduce((s, p) => s + p.y, 0) / pinConfig.length;
    const contract = 0.20;

    const grid = Array.from({ length: gridSize }, () => Array(gridSize).fill('.'));
    const pinGridPos = []; // store grid coords per pin for edge export

    pinConfig.forEach((p, i) => {
      const px = p.x + (cx - p.x) * contract;
      const py = p.y + (cy - p.y) * contract;
      const gx = Math.max(0, Math.min(gridSize - 1, Math.floor(px * gridSize)));
      const gy = Math.max(0, Math.min(gridSize - 1, Math.floor(py * gridSize)));
      grid[gy][gx] = pinLetters[i];
      pinGridPos.push({ gx, gy });
    });

    // ── skeleton inflation ──
    // instead of a convex hull, inflate the fairy's edge paths
    // this preserves concavities, limbs, and actual creature topology
    // each edge is walked (Bresenham) and cells within radius are filled

    // average color for fill cells
    const fillColor = [0, 0, 0];
    pinConfig.forEach(p => { fillColor[0] += p.color[0]; fillColor[1] += p.color[1]; fillColor[2] += p.color[2]; });
    fillColor[0] = Math.round(fillColor[0] / pinConfig.length);
    fillColor[1] = Math.round(fillColor[1] / pinConfig.length);
    fillColor[2] = Math.round(fillColor[2] / pinConfig.length);

    const fillCh = String.fromCharCode(letter++);
    const fillHex = rgbToHex(fillColor[0], fillColor[1], fillColor[2]);

    // collect all edge pairs (fairy connections)
    const skelEdges = [];
    const skelEdgeSet = new Set();
    pinConfig.forEach((p, i) => {
      if (!p.connected) return;
      for (const j of p.connected) {
        if (j >= pinConfig.length) continue;
        const key = Math.min(i, j) + '-' + Math.max(i, j);
        if (skelEdgeSet.has(key)) continue;
        skelEdgeSet.add(key);
        skelEdges.push([i, j]);
      }
    });

    // inflation radius scales with grid: ~1 cell on small grids, ~2 on larger
    const radius = gridSize >= 14 ? 2 : 1;

    // mark a cell and its neighbors within radius as fill
    function inflateMark(gx, gy) {
      for (let dy = -radius; dy <= radius; dy++) {
        for (let dx = -radius; dx <= radius; dx++) {
          if (dx * dx + dy * dy > radius * radius + 0.5) continue; // circular
          const nx = gx + dx, ny = gy + dy;
          if (nx >= 0 && nx < gridSize && ny >= 0 && ny < gridSize) {
            if (grid[ny][nx] === '.') grid[ny][nx] = fillCh;
          }
        }
      }
    }

    // walk each edge and inflate along the path
    for (const [a, b] of skelEdges) {
      const pa = pinGridPos[a], pb = pinGridPos[b];
      if (!pa || !pb) continue;
      // Bresenham walk
      let x0 = pa.gx, y0 = pa.gy, x1 = pb.gx, y1 = pb.gy;
      const dx = Math.abs(x1 - x0), dy = Math.abs(y1 - y0);
      const sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
      let err = dx - dy;
      while (true) {
        inflateMark(x0, y0);
        if (x0 === x1 && y0 === y1) break;
        const e2 = 2 * err;
        if (e2 > -dy) { err -= dy; x0 += sx; }
        if (e2 < dx) { err += dx; y0 += sy; }
      }
    }

    // also inflate around each pin position (ensure pins have body)
    pinGridPos.forEach(p => inflateMark(p.gx, p.gy));

    // insert fill color into colors section
    const pinsIdx = lines.indexOf('# pins');
    if (pinsIdx > 0) {
      lines.splice(pinsIdx - 1, 0, `${fillCh} ${fillHex}`);
    }

    grid.forEach(row => lines.push(row.join(' ')));

    // edges section — fairy's structural connections between pins
    // EFDP will erase walls along paths between connected grid cells
    // When connected pins share a grid cell, nudge one to nearest empty neighbor

    // pre-compute connection density per node for corridor width formula
    const densityMap = new Map();
    S.nodes.forEach(n => densityMap.set(n.id, getConnectedNodeIds(n.id).size));
    const maxDensity = Math.max(1, ...densityMap.values());

    // role → width contribution
    const ROLE_WIDTH = { body: 1.0, limb: 0.7, accent: 0.3, detail: 0.2, unclassified: 0.5 };

    const occupied = new Set();
    pinGridPos.forEach(p => occupied.add(p.gx + ',' + p.gy));

    const edgeSet = new Set();
    pinConfig.forEach((p, i) => {
      if (!p.connected) return;
      for (const j of p.connected) {
        if (j >= pinConfig.length) continue;
        const key = Math.min(i, j) + '-' + Math.max(i, j);
        if (edgeSet.has(key)) continue;
        edgeSet.add(key);
      }
    });
    if (edgeSet.size > 0) {
      // build node ID lookup for diamond width matching
      const nodeIdForPin = S.nodes.map(n => n.id);

      lines.push('', '# edges');
      for (const key of edgeSet) {
        const [a, b] = key.split('-').map(Number);
        let pa = pinGridPos[a], pb = pinGridPos[b];
        if (!pa || !pb) continue;
        // if same cell, nudge pin b toward its original direction from a
        if (pa.gx === pb.gx && pa.gy === pb.gy) {
          const origA = pinConfig[a], origB = pinConfig[b];
          const dx = origB.x - origA.x, dy = origB.y - origA.y;
          // try to move b one cell in the dominant direction
          const ndx = dx === 0 ? 0 : (dx > 0 ? 1 : -1);
          const ndy = dy === 0 ? 0 : (dy > 0 ? 1 : -1);
          const candidates = [
            { gx: pb.gx + ndx, gy: pb.gy + ndy },  // preferred: diagonal toward original
            { gx: pb.gx + ndx, gy: pb.gy },          // horizontal
            { gx: pb.gx, gy: pb.gy + ndy },          // vertical
          ];
          for (const c of candidates) {
            if (c.gx >= 0 && c.gx < gridSize && c.gy >= 0 && c.gy < gridSize) {
              pb = c;
              break;
            }
          }
        }
        if (pa.gx !== pb.gx || pa.gy !== pb.gy) {
          // look up diamond + node data for organic corridor width
          const idA = nodeIdForPin[a], idB = nodeIdForPin[b];
          const nA = S.nodes.find(n => n.id === idA);
          const nB = S.nodes.find(n => n.id === idB);
          const diamond = (S.fairy.diamonds || []).find(d =>
            (d.nodeA === idA && d.nodeB === idB) || (d.nodeA === idB && d.nodeB === idA)
          );

          // blended corridor width from structural data
          const widthF = diamond ? Math.min(1, diamond.avgWidth / 25) : 0.3;
          const convA = nA?.conviction ?? 1, convB = nB?.conviction ?? 1;
          const convF = (convA + convB) / 2;
          const roleA = ROLE_WIDTH[nA?.structuralRole || 'unclassified'];
          const roleB = ROLE_WIDTH[nB?.structuralRole || 'unclassified'];
          const roleF = (roleA + roleB) / 2;
          const dA = densityMap.get(idA) || 0, dB = densityMap.get(idB) || 0;
          const densityF = ((dA + dB) / 2) / maxDensity;
          const symF = diamond ? (diamond.symmetric ? 0.8 : 0.4) : 0.5;

          const raw = diamond
            ? widthF * 0.35 + convF * 0.20 + roleF * 0.20 + densityF * 0.15 + symF * 0.10
            : convF * 0.35 + roleF * 0.35 + densityF * 0.30; // no diamond: rely on node data
          const corridorW = raw >= 0.65 ? 3 : raw >= 0.38 ? 2 : 1;

          lines.push(`${pa.gx},${pa.gy} ${pb.gx},${pb.gy} w:${corridorW}`);
        }
      }
    }

    // annotations section — per-pin fairy emoji, visitor labels, roles at grid positions
    const annotLines = [];
    pinGridPos.forEach((pg, i) => {
      if (!pg) return;
      const p = pinConfig[i];
      const emoji = p.partLabel || p.fairyEmoji;
      if (!emoji) return;
      const src = p.partLabelSource || '';
      const role = p.structuralRole || '';
      annotLines.push(`${pg.gx},${pg.gy} emoji:${emoji}${src ? ' src:' + src : ''}${role ? ' role:' + role : ''}`);
    });
    if (annotLines.length > 0) {
      lines.push('', '# annotations');
      lines.push(...annotLines);
    }
  }

  const cpm = lines.join('\n');
  // store for paste-in to EFDP (backward compat — full single CPM)
  if (!name || name === 'Chunxly Creature') {
    try {
      localStorage.setItem('baseline-session/chunxly-cpm', cpm);
    } catch (e) { /* */ }
  }

  // generate touch-up layer if round-trip comparison data exists
  if (S.roundTrip && (!name || name === 'Chunxly Creature')) generateTouchupCPM(pinConfig);

  return cpm;
}

// ═══════════════════════════════════════════════════════
//  Per-aspect CPM export
//  Groups nodes by structural role into body/accent buckets,
//  assigns unclassified nodes by color similarity,
//  generates a separate CPM for each aspect.
// ═══════════════════════════════════════════════════════
function generateAspectCPMs(pinConfig) {
  // bucket classified nodes
  const bodyPins = [];
  const accentPins = [];
  const unclassified = [];

  pinConfig.forEach(p => {
    if (p.structuralRole === 'body' || p.structuralRole === 'limb') {
      bodyPins.push(p);
    } else if (p.structuralRole === 'accent' || p.structuralRole === 'detail') {
      accentPins.push(p);
    } else {
      unclassified.push(p);
    }
  });

  // if no fairy classification at all, no aspects to split
  if (bodyPins.length === 0 && accentPins.length === 0) {
    try { localStorage.removeItem('baseline-session/chunxly-aspects'); } catch(e) {}
    return null;
  }

  // compute average color per bucket for assignment of unclassified nodes
  function avgColor(pins) {
    if (pins.length === 0) return [128, 128, 128];
    const s = [0, 0, 0];
    pins.forEach(p => { s[0] += p.color[0]; s[1] += p.color[1]; s[2] += p.color[2]; });
    return s.map(v => v / pins.length);
  }

  function colorDist(c1, c2) {
    return Math.sqrt((c1[0]-c2[0])**2 + (c1[1]-c2[1])**2 + (c1[2]-c2[2])**2);
  }

  // assign unclassified nodes
  if (accentPins.length > 0 && bodyPins.length > 0) {
    // both buckets exist — assign by nearest color
    const bodyAvgC = avgColor(bodyPins);
    const accentAvgC = avgColor(accentPins);
    unclassified.forEach(p => {
      if (colorDist(p.color, bodyAvgC) <= colorDist(p.color, accentAvgC)) {
        bodyPins.push(p);
      } else {
        accentPins.push(p);
      }
    });
  } else if (unclassified.length >= 4) {
    // only one bucket (or none) has classified nodes — try color-distance split
    // use body centroid as anchor; nodes far from it become accent
    const anchor = bodyPins.length > 0 ? avgColor(bodyPins) : avgColor(unclassified);
    const distances = unclassified.map(p => ({ p, d: colorDist(p.color, anchor) }));
    distances.sort((a, b) => a.d - b.d);

    // split at the largest gap in sorted distances (natural color boundary)
    let bestGap = 0, splitIdx = distances.length;
    for (let i = 1; i < distances.length; i++) {
      const gap = distances[i].d - distances[i - 1].d;
      if (gap > bestGap && distances[i].d > 30) { // min 30 color distance to split
        bestGap = gap;
        splitIdx = i;
      }
    }

    // only split if the gap is meaningful (> 20 color units)
    if (bestGap > 20 && splitIdx < distances.length) {
      distances.slice(0, splitIdx).forEach(({ p }) => bodyPins.push(p));
      distances.slice(splitIdx).forEach(({ p }) => accentPins.push(p));
    } else {
      // no clear color boundary — all go to body
      unclassified.forEach(p => bodyPins.push(p));
    }
  } else {
    // few unclassified — just add to body
    unclassified.forEach(p => bodyPins.push(p));
  }

  // flatten each bucket to a single uniform color
  // shape is the signal — color is just metadata the CrankSeed carries as hex
  function flattenToSolidColor(pins) {
    const avg = avgColor(pins).map(Math.round);
    return pins.map(p => ({
      ...p,
      color: [...avg],
    }));
  }

  // build aspect entries (only buckets with >= 2 nodes)
  const aspects = [];
  if (bodyPins.length >= 2) {
    const solidBody = flattenToSolidColor(bodyPins);
    aspects.push({
      role: 'body',
      cpm: generateCPM(solidBody, 'Chunxly Body'),
      hex: rgbToHex(...avgColor(bodyPins).map(Math.round)),
      pinCount: bodyPins.length,
      shape: inferAspectShape(bodyPins),
      avgConviction: Math.round(bodyPins.reduce((s, p) => s + (p.conviction ?? 1), 0) / bodyPins.length * 100) / 100,
    });
  }
  if (accentPins.length >= 2) {
    const solidAccent = flattenToSolidColor(accentPins);
    aspects.push({
      role: 'accent',
      cpm: generateCPM(solidAccent, 'Chunxly Accent'),
      hex: rgbToHex(...avgColor(accentPins).map(Math.round)),
      pinCount: accentPins.length,
      shape: inferAspectShape(accentPins),
      avgConviction: Math.round(accentPins.reduce((s, p) => s + (p.conviction ?? 1), 0) / accentPins.length * 100) / 100,
    });
  }

  // store for EFDP
  if (aspects.length > 0) {
    try {
      localStorage.setItem('baseline-session/chunxly-aspects', JSON.stringify(aspects));
    } catch(e) {}
  }

  return aspects;
}

function inferAspectShape(pins) {
  if (pins.length < 2) return 'compact';
  const xs = pins.map(p => p.x);
  const ys = pins.map(p => p.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const w = maxX - minX || 0.01;
  const h = maxY - minY || 0.01;
  const ratio = Math.max(w, h) / Math.min(w, h);

  // spatial spread: standard deviation of positions
  const meanX = xs.reduce((a, b) => a + b, 0) / xs.length;
  const meanY = ys.reduce((a, b) => a + b, 0) / ys.length;
  const stddev = Math.sqrt(
    pins.reduce((s, p) => s + (p.x - meanX) ** 2 + (p.y - meanY) ** 2, 0) / pins.length
  );

  if (ratio > 1.5) return 'elongated';
  if (stddev < 0.15) return 'compact';
  if (stddev > 0.3) return 'scattered';
  return 'blob';
}

function generateTouchupCPM(currentPins) {
  // Chunxly's second pass: reinforce lost containers, correct shifted ones
  const rt = S.roundTrip;
  if (!rt || !S.originalContainers) return;

  const touchupPins = [];

  // lost containers: place reinforcement pins at original positions, boosted strength
  for (const lost of rt.lost) {
    touchupPins.push({
      x: lost.x, y: lost.y,
      color: lost.color,
      type: 'circle',
      strength: 7, // strong reinforcement
      direction: 0,
      conviction: lost.conviction || 0.8
    });
  }

  // shifted containers: place corrective pins nudged back toward original position
  for (const pair of rt.pairs) {
    if (pair.positionShift < 0.02) continue; // preserved — no correction needed
    const orig = pair.original;
    const cur = pair.mazeNode;
    // nudge: place pin between original and current, biased toward original
    const nx = orig.x / S.canvasSize;
    const ny = orig.y / S.canvasSize;
    const cx = cur.x / S.canvasSize;
    const cy = cur.y / S.canvasSize;
    const corrX = nx + (nx - cx) * 0.3; // overshoot slightly past original
    const corrY = ny + (ny - cy) * 0.3;
    touchupPins.push({
      x: Math.max(0, Math.min(1, corrX)),
      y: Math.max(0, Math.min(1, corrY)),
      color: orig.color,
      type: 'circle',
      strength: Math.min(8, 4 + Math.round(pair.positionShift * 20)),
      direction: 0,
      conviction: orig.conviction || 0.8
    });
  }

  if (touchupPins.length === 0) return;

  // build CPM using same format as generateCPM
  const lines = ['# name', 'Chunxly Touch-up', '', '# scale', '6', '', '# colors'];
  const colorMap = new Map();
  const pinLetters = [];
  let letter = 65;

  touchupPins.forEach(p => {
    const hex = rgbToHex(p.color[0], p.color[1], p.color[2]);
    if (!colorMap.has(hex)) {
      colorMap.set(hex, String.fromCharCode(letter++));
      lines.push(`${colorMap.get(hex)} ${hex}`);
    }
    pinLetters.push(colorMap.get(hex));
  });

  lines.push('', '# pins');
  const dirs = ['up', 'right', 'down', 'left'];
  const emitted = new Set();
  touchupPins.forEach((p, i) => {
    const ch = pinLetters[i];
    if (emitted.has(ch)) return;
    emitted.add(ch);
    const hex = rgbToHex(p.color[0], p.color[1], p.color[2]);
    lines.push(`${ch} = ${p.type} ${hex} str:${p.strength} dir:${dirs[p.direction] || 'up'}`);
  });

  // use same grid size as base CPM
  const gridSize = Math.min(10, Math.max(6, 6 + Math.floor((touchupPins.length - 12) / 8)));
  lines.push('', '# grid');
  const cx = touchupPins.reduce((s, p) => s + p.x, 0) / touchupPins.length;
  const cy = touchupPins.reduce((s, p) => s + p.y, 0) / touchupPins.length;
  const grid = Array.from({ length: gridSize }, () => Array(gridSize).fill('.'));
  touchupPins.forEach((p, i) => {
    const px = p.x + (cx - p.x) * 0.25;
    const py = p.y + (cy - p.y) * 0.25;
    const gx = Math.max(0, Math.min(gridSize - 1, Math.floor(px * gridSize)));
    const gy = Math.max(0, Math.min(gridSize - 1, Math.floor(py * gridSize)));
    grid[gy][gx] = pinLetters[i];
  });
  grid.forEach(row => lines.push(row.join(' ')));

  try {
    localStorage.setItem('baseline-session/chunxly-cpm-touchup', lines.join('\n'));
  } catch (e) { /* */ }
}

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      // create offscreen canvas
      const maxDim = 512;
      let w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) {
        const scale = maxDim / Math.max(w, h);
        w = Math.round(w * scale);
        h = Math.round(h * scale);
      }
      const oc = document.createElement('canvas');
      oc.width = w; oc.height = h;
      oc.getContext('2d').drawImage(img, 0, 0, w, h);
      S.imageCanvas = oc;
      S.imgW = w;
      S.imgH = h;

      // ask for creature name before analysis (mirrors Stall's name-before-draw)
      promptCreatureName(() => {
        $drop.classList.add('hidden');
        const [iv, ov] = pickVoice('image_load');
        setVoice(iv, ov, true);
        setPhase('analyzing');
        render();

        // brief pause then analyze + daub
        setTimeout(() => {
          const candidates = analyzeMultiPass();
          if (candidates.length === 0) {
            setVoice("The image is... very uniform. I can't find distinct features. I am noting my confusion.",
                     "Hmm. Try a different image?", true);
            setPhase('visitor');
            document.getElementById('btnFinish').style.display = '';
            return;
          }
          // run Stall pixel analysis alongside multi-pass (for tags + naming)
          S.stallAnalysis = analyzeStallDrawing();
          daubSequence(candidates);
        }, 800);
      });
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

        fallback.push({
          x: sz * (0.2 + Math.random() * 0.6),
          y: sz * (0.2 + Math.random() * 0.6),
          color: DRAW_COLORS[Math.floor(Math.random() * DRAW_COLORS.length)],
          size: fbSize, boundary: fbBoundary, wobble: fbWobble,
          energy: 0.5, gradMag: 0, gradAngle: 0, edge: 0, sat: 0.5,
          scribble: generateScribble(fbSize, fbWobble, fbBoundary),
          focal: 0.1
        });

      // use imgW/imgH for coordinate mapping
      fallback.forEach(f => { f.x = f.x * S.imgW / S.canvasSize; f.y = f.y * S.imgH / S.canvasSize; });
      daubSequence(fallback);
    } else {
      daubSequence(candidates);
    }
  }, 800);
}

function loadMazeSnapshot() {
  // load original containers from previous Chunxly export
  const origRaw = localStorage.getItem('baseline-session/chunxly-original');
  const snapUrl = localStorage.getItem('baseline-session/efdp-snapshot');
  if (!origRaw || !snapUrl) return;

  const origData = JSON.parse(origRaw);
  // support both old flat array format and new { containers, hull } format
  S.originalContainers = origData.containers || origData;
  S.originalHull = origData.hull || null;

  const [iv, ov] = pickVoice('compare_start');
  setVoice(iv, ov, true);
  setPhase('analyzing');
  drawSprite('looking');

  const img = new Image();
  img.onload = () => {
    const maxDim = 512;
    let w = img.width, h = img.height;
    if (w > maxDim || h > maxDim) {
      const scale = maxDim / Math.max(w, h);
      w = Math.round(w * scale);
      h = Math.round(h * scale);
    }
    const oc = document.createElement('canvas');
    oc.width = w; oc.height = h;
    oc.getContext('2d').drawImage(img, 0, 0, w, h);
    S.imageCanvas = oc;
    S.imgW = w;
    S.imgH = h;

    document.getElementById('dropZone').classList.add('hidden');
    render();

    setTimeout(() => {
      const candidates = analyzeMultiPass();
      if (candidates.length === 0) {
        setVoice("The maze image is... empty. I can't find anything. I am confused.",
                 "Nothing came back?", true);
        setPhase('visitor');
        document.getElementById('btnFinish').style.display = '';
        return;
      }
      daubSequence(candidates);
    }, 800);
  };
  img.src = snapUrl;
}

function compareWithOriginal() {
  if (!S.originalContainers || !S.originalContainers.length) return;

  const originals = S.originalContainers;
  const mazeNodes = S.nodes;
  const matchDistThresh = 0.15; // 15% of canvas
  const colorDistThresh = 80;

  // for each original, find best matching maze node
  const pairs = [];       // { original, mazeNode, positionShift, colorShift, sizeChange }
  const origMatched = new Set();
  const mazeMatched = new Set();

  for (let oi = 0; oi < originals.length; oi++) {
    const orig = originals[oi];
    let bestIdx = -1, bestDist = Infinity;
    for (let mi = 0; mi < mazeNodes.length; mi++) {
      if (mazeMatched.has(mi)) continue;
      const mn = mazeNodes[mi];
      const mnx = mn.x / S.canvasSize, mny = mn.y / S.canvasSize;
      const dx = orig.x - mnx, dy = orig.y - mny;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist >= matchDistThresh) continue;
      const dr = orig.color[0] - mn.color[0], dg = orig.color[1] - mn.color[1], db = orig.color[2] - mn.color[2];
      const cDist = Math.sqrt(dr * dr + dg * dg + db * db);
      if (cDist >= colorDistThresh) continue;
      const combined = dist + cDist / 500; // weight spatial more
      if (combined < bestDist) { bestDist = combined; bestIdx = mi; }
    }
    if (bestIdx >= 0) {
      const mn = mazeNodes[bestIdx];
      const mnx = mn.x / S.canvasSize, mny = mn.y / S.canvasSize;
      const posShift = Math.sqrt((orig.x - mnx) ** 2 + (orig.y - mny) ** 2);
      const dr = orig.color[0] - mn.color[0], dg = orig.color[1] - mn.color[1], db = orig.color[2] - mn.color[2];
      const colShift = Math.sqrt(dr * dr + dg * dg + db * db);
      pairs.push({
        original: orig,
        mazeNode: mn,
        mazeIdx: bestIdx,
        positionShift: Math.round(posShift * 1000) / 1000,
        colorShift: Math.round(colShift),
        sizeChange: Math.round((mn.size / (orig.size || 20)) * 100) / 100,
        status: (posShift < 0.05 && colShift < 40) ? 'preserved' : 'shifted',
      });
      origMatched.add(oi);
      mazeMatched.add(bestIdx);
    }
  }

  const lost = originals.filter((_, i) => !origMatched.has(i));
  const emergentRaw = mazeNodes.filter((_, i) => !mazeMatched.has(i));
  const preserved = pairs.filter(p => p.status === 'preserved').length;
  const shifted = pairs.filter(p => p.status === 'shifted').length;

  // classify emergent containers by hull membership
  // 10% padding — emergents just outside the hull are still plausible
  const hull = S.originalHull;
  const emergent = [];
  const stray = [];
  for (const mn of emergentRaw) {
    const nx = mn.x / S.canvasSize, ny = mn.y / S.canvasSize;
    if (pointInHull(nx, ny, hull, 0.1)) {
      emergent.push(mn);
    } else {
      stray.push(mn);
    }
  }

  S.roundTrip = {
    pairs,
    lost,
    emergent,
    stray,
    hull,
    summary: { preserved, shifted, lost: lost.length, emergent: emergent.length, stray: stray.length },
    avgPositionShift: pairs.length ? Math.round(pairs.reduce((s, p) => s + p.positionShift, 0) / pairs.length * 1000) / 1000 : 0,
    avgColorShift: pairs.length ? Math.round(pairs.reduce((s, p) => s + p.colorShift, 0) / pairs.length) : 0,
  };

  // voice the results
  const [civ, cov] = pickVoice('compare_done', {
    preserved: String(preserved),
    shifted: String(shifted),
    lost: String(lost.length),
    emergent: String(emergent.length),
    stray: String(stray.length),
  });
  setVoice(civ, cov, true);
  render();
}

function showSeedPanel(seed) {
  const panel = document.getElementById('seedPanel');
  const body = document.getElementById('seedBody');
  body.innerHTML = '';

  function row(key, valHtml) {
    const r = document.createElement('div');
    r.className = 'seed-row';
    r.innerHTML = `<span class="seed-key">${key}</span><span class="seed-val">${valHtml}</span>`;
    body.appendChild(r);
  }
  function divider() {
    const d = document.createElement('div');
    d.className = 'seed-divider';
    body.appendChild(d);
  }
  function swatch(hex) {
    return `<span class="seed-swatch" style="background:${hex}"></span>${hex}`;
  }

  // entity identity + stall tags (if present)
  if (seed.entityName) {
    row('creature', `<span style="color:var(--amber)">${seed.entityName}</span>`);
    if (seed.slug) row('slug', seed.slug);
  }
  if (seed.stallTags && seed.stallTags.length > 0) {
    row('tags', seed.stallTags.map(t => `<span class="stall-item-tag">${t}</span>`).join(' '));
  }
  if (seed.stallName) {
    row('stall name', seed.stallName);
  }
  if (seed.entityName || seed.stallTags) divider();

  // shape
  const shapeHints = seed.extraShapeHints ? seed.extraShapeHints.join(', ') : '—';
  row('shape', `${seed.dominantPinType} — ${shapeHints}`);
  row('cohesion', seed.cohesionMode || '—');
  row('conviction', `${seed.convictionProfile} (${seed.avgConviction})`);

  divider();

  // color + affinity
  const KITCHENDOM_AFFINITY = {
    earth: 'Umamian', creature: 'Umamian',
    ice: 'Salterran', item: 'Salterran',
    poison: 'Sourvren', nature: 'Sourvren',
    ghost: 'Bitterish', fire: 'Bitterish',
    light: 'Sweetese', water: 'Sweetese',
  };
  const affinity = KITCHENDOM_AFFINITY[seed.paletteKey];
  row('dominant', swatch(seed.dominantHex));
  if (seed.secondaryHex) row('secondary', swatch(seed.secondaryHex));
  row('palette key', seed.paletteKey || '—');
  if (affinity) row('affinity', `<span style="color:var(--teal)">${affinity}</span>`);

  divider();

  // structure
  const sp = seed.structuralProfile || {};
  const spParts = Object.entries(sp).filter(([,v]) => v > 0).map(([k,v]) => `${k}×${v}`).join('  ');
  row('structure', spParts || '—');
  row('layers', String(seed.layerCount ?? '—'));
  row('fairy traces', `${seed.fairyTraces ?? 0} (sym ${seed.symmetryRatio ?? 0}, dir ${seed.structuralDirection || '—'})`);

  // pin breakdown
  const pc = seed.pinCounts || {};
  const pinStr = Object.entries(pc).filter(([,v])=>v>0).map(([k,v])=>`${k}×${v}`).join('  ');
  row('pins', pinStr || '—');

  // aspects
  if (seed.aspects && seed.aspects.length > 0) {
    divider();
    for (const asp of seed.aspects) {
      const el = document.createElement('div');
      el.className = 'seed-aspect';
      el.innerHTML = `
        <div class="seed-aspect-role">${asp.role}</div>
        <div class="seed-row"><span class="seed-key">color</span><span class="seed-val">${swatch(asp.hex)}</span></div>
        <div class="seed-row"><span class="seed-key">shape</span><span class="seed-val">${asp.shape || '—'}</span></div>
        <div class="seed-row"><span class="seed-key">pins</span><span class="seed-val">${asp.pinCount}</span></div>
        <div class="seed-row"><span class="seed-key">conviction</span><span class="seed-val">${asp.avgConviction}</span></div>
      `;
      body.appendChild(el);
    }
  }

  // round-trip if present
  if (seed.roundTrip) {
    divider();
    const rt = seed.roundTrip;
    row('round-trip', `preserved ${rt.preserved}  shifted ${rt.shifted}  lost ${rt.lost}  emergent ${rt.emergent}`);
  }

  panel.classList.add('show');

  // copy button
  document.getElementById('seedCopy').onclick = () => {
    navigator.clipboard.writeText(JSON.stringify(seed, null, 2)).then(() => showNotif('copied'));
  };
}

];
const STALL_SIZES = [6, 14];

function enterStallMode() {

function letChunxmeSee() {
