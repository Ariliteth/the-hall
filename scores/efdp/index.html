<script>
// --- Diffusion constants ---
const SAME_COLOR_DIST = 60;    // Manhattan RGB distance below which two colors count as "same"
const KIWI_CHANGE_DIST = 30;   // Manhattan RGB distance above which a color shift drops a kiwi
const RATE_OPEN = 0.85;        // spread into empty neighbor
const RATE_SAME = 0.90;        // spread into same-color neighbor (conductor)
const RATE_CONTESTED = 0.50;   // spread into different-color neighbor
const CALCIFY_AT = 10;         // strength at which a cell goes silent
const PIN_ANCHOR_MULT = 1.5;   // pin re-anchor multiplier
const PIN_ANCHOR_CAP = 9.5;    // pin cell never reaches calcification
const LEGACY_THRESHOLD = 1.0;  // pin places legacy walls when strength drops below this
const DIR_VECS = [[0,-1], [1,0], [0,1], [-1,0]];  // up, right, down, left
const BEAM_WALL_BREAK_CHANCE = 0.4;                 // triangle: 40% to remove wall on hit
const PRESS_SEED_THRESHOLD = 0.5;                   // min strength to seed the BFS press
const TARGET_DENSITY = 80;                           // ideal cells per pin for coverage
const THIRD_KIWI_THRESHOLD = 1;   // min kiwi count for a cell to be "hot"
const THIRD_MIN_CLUSTER = 3;      // min cells in a hot cluster to suggest a pin
const THIRD_STRENGTH_MIN = 2;     // min pin strength for suggestions
const THIRD_STRENGTH_MAX = 6;     // max pin strength for suggestions

// --- Helpers ---
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function rgbToHex(r,g,b) {
  return '#'+[r,g,b].map(v=>Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join('');
}
function shiftColor(r, g, b) {
  // Nudge color toward a lighter/more vivid variant so detail layer is visually distinct.
  // If dark (avg < 128): lerp 20% toward white. If light: boost saturation 20%.
  const avg = (r + g + b) / 3;
  if (avg < 128) {
    return [r + (255 - r) * 0.2, g + (255 - g) * 0.2, b + (255 - b) * 0.2];
  } else {
    // Boost saturation: push each channel away from the average
    return [
      Math.max(0, Math.min(255, r + (r - avg) * 0.3)),
      Math.max(0, Math.min(255, g + (g - avg) * 0.3)),
      Math.max(0, Math.min(255, b + (b - avg) * 0.3))
    ];
  }
}

// --- Crank Export Helpers ---
// Reference pal[2] colors from the Crank's 10 palettes (for nearest-match)
const CRANK_PAL_REFS = {
  nature:[90,158,58], creature:[15,52,96], item:[139,69,19],
  fire:[139,0,0], ice:[0,51,102], poison:[75,0,130],
  ghost:[26,26,62], earth:[61,43,31], water:[0,136,204],
  light:[61,51,0]
};

function readDominantColor(cc, N) {
  // Bucket into 4×4×4 RGB cubes (64 buckets), weighted by strength
  const buckets = new Float64Array(64);
  const sums = new Float64Array(64 * 3);
  for (let i = 0; i < N * 4; i += 4) {
    const s = cc[i+3];
    if (s < 0.5) continue;
    const bi = (Math.min(3, cc[i] >> 6)) * 16 + (Math.min(3, cc[i+1] >> 6)) * 4 + Math.min(3, cc[i+2] >> 6);
    buckets[bi] += s;
    sums[bi*3]   += cc[i]   * s;
    sums[bi*3+1] += cc[i+1] * s;
    sums[bi*3+2] += cc[i+2] * s;
  }
  let best = -1, bestW = 0;
  for (let b = 0; b < 64; b++) { if (buckets[b] > bestW) { bestW = buckets[b]; best = b; } }
  if (best < 0) return [128, 128, 128];
  return [Math.round(sums[best*3]/bestW), Math.round(sums[best*3+1]/bestW), Math.round(sums[best*3+2]/bestW)];
}

function readSecondaryColor(cc, N, domRgb) {
  const buckets = new Float64Array(64);
  const sums = new Float64Array(64 * 3);
  for (let i = 0; i < N * 4; i += 4) {
    const s = cc[i+3];
    if (s < 0.5) continue;
    const dr = cc[i]-domRgb[0], dg = cc[i+1]-domRgb[1], db = cc[i+2]-domRgb[2];
    if (Math.sqrt(dr*dr+dg*dg+db*db) < 60) continue; // skip cells near dominant
    const bi = (Math.min(3, cc[i] >> 6)) * 16 + (Math.min(3, cc[i+1] >> 6)) * 4 + Math.min(3, cc[i+2] >> 6);
    buckets[bi] += s;
    sums[bi*3]   += cc[i]   * s;
    sums[bi*3+1] += cc[i+1] * s;
    sums[bi*3+2] += cc[i+2] * s;
  }
  let best = -1, bestW = 0;
  for (let b = 0; b < 64; b++) { if (buckets[b] > bestW) { bestW = buckets[b]; best = b; } }
  if (best < 0 || bestW < 1) return null;
  return rgbToHex(Math.round(sums[best*3]/bestW), Math.round(sums[best*3+1]/bestW), Math.round(sums[best*3+2]/bestW));
}

function nearestPaletteKey(r, g, b) {
  let bestKey = 'creature', bestD = Infinity;
  for (const [k, ref] of Object.entries(CRANK_PAL_REFS)) {
    const d = (r-ref[0])**2 + (g-ref[1])**2 + (b-ref[2])**2;
    if (d < bestD) { bestD = d; bestKey = k; }
  }
  return bestKey;
}

function inferCohesion(km, W, H) {
  const N = W * H;
  let sumX = 0, sumY = 0, total = 0;
  for (let ci = 0; ci < N; ci++) {
    if (km[ci] > 0) {
      sumX += (ci % W) * km[ci];
      sumY += Math.floor(ci / W) * km[ci];
      total += km[ci];
    }
  }
  if (total < 1) return 'scattered';
  const cx = sumX / total, cy = sumY / total;
  // Mean distance from centroid
  let sumDist = 0;
  for (let ci = 0; ci < N; ci++) {
    if (km[ci] > 0) {
      const dx = (ci % W) - cx, dy = Math.floor(ci / W) - cy;
      sumDist += Math.sqrt(dx*dx + dy*dy) * km[ci];
    }
  }
  const meanDist = sumDist / total;
  const gridRadius = Math.sqrt(W*W + H*H) / 2;
  const ratio = meanDist / gridRadius;
  if (ratio < 0.3) {
    // Tight — radial if near center, clustered if offset
    const centerDist = Math.sqrt((cx - W/2)**2 + (cy - H/2)**2);
    return centerDist < gridRadius * 0.2 ? 'radial' : 'clustered';
  }
  // Spread — check directionality via variance ratio
  let varX = 0, varY = 0;
  for (let ci = 0; ci < N; ci++) {
    if (km[ci] > 0) {
      varX += ((ci % W) - cx)**2 * km[ci];
      varY += (Math.floor(ci / W) - cy)**2 * km[ci];
    }
  }
  varX /= total; varY /= total;
  const maxV = Math.max(varX, varY, 0.01), minV = Math.max(Math.min(varX, varY), 0.01);
  return (maxV / minV) > 2.5 ? 'directional' : 'scattered';
}

function readMeanStrength(cc, N) {
  let sum = 0, count = 0;
  for (let i = 3; i < N * 4; i += 4) {
    if (cc[i] > 0) { sum += cc[i]; count++; }
  }
  return count > 0 ? Math.round((sum / count) * 100) / 100 : 0;
}

function pinTypeToShapeHints(counts, dominant) {
  const map = {
    circle: ['blob', 'ring', 'circle'],
    square: ['rect', 'cross', 'diamond'],
    triangle: ['spike', 'line', 'scatter'],
  };
  // Check if mixed (no type has >50% share)
  const total = counts.circle + counts.square + counts.triangle;
  if (total === 0) return ['irregular', 'blob'];
  if (counts[dominant] / total < 0.5) return ['irregular', 'blob'];
  return map[dominant] || ['irregular', 'blob'];
}

function exportCrankSeed() {
  saveActiveLayer();
  const W = maze.W, H = maze.H, N = W * H;

  // Pin census across all layers
  const counts = { circle: 0, square: 0, triangle: 0 };
  layers.forEach(l => l.pins.forEach(p => { if (counts[p.type] !== undefined) counts[p.type]++; }));
  const dominantPinType = Object.keys(counts).reduce((a, b) => counts[a] >= counts[b] ? a : b);

  // Dominant + secondary color from active layer cellColors
  const domRgb = readDominantColor(cellColors, N);
  const dominantHex = rgbToHex(domRgb[0], domRgb[1], domRgb[2]);
  const paletteKey = nearestPaletteKey(domRgb[0], domRgb[1], domRgb[2]);
  const secondaryHex = readSecondaryColor(cellColors, N, domRgb);

  // Cohesion from kiwiMap
  const cohesionMode = inferCohesion(kiwiMap, W, H);

  // Inflation hints
  const meanStrength = readMeanStrength(cellColors, N);
  const calcifiedRatio = Math.round((calcifiedCount / N) * 1000) / 1000;

  // Kiwi density
  const kiwiDensity = totalKiwis < N * 0.05 ? 'sparse'
                    : totalKiwis < N * 0.20 ? 'moderate' : 'dense';

  // Shape hints from pin types
  const extraShapeHints = pinTypeToShapeHints(counts, dominantPinType);

  return {
    source: 'efdp',
    pinCounts: counts, dominantPinType,
    dominantHex, paletteKey, secondaryHex,
    cohesionMode, meanStrength, calcifiedRatio,
    totalKiwis, kiwiDensity,
    layerCount: layers.length,
    extraShapeHints,
  };
}

function sendToCrank() {
  if (totalPulses === 0) { setStatus('Run diffusion first'); return; }
  const seed = exportCrankSeed();
  try {
    localStorage.setItem('baseline-session/crank-seed', JSON.stringify(seed));
  } catch(e) { setStatus('Failed to write seed'); return; }
  // Scraggle
  try {
    const raw = localStorage.getItem('baseline-session/scraggles') || '[]';
    const arr = JSON.parse(raw);
    arr.push({ emoji: '\uD83C\uDFB0', signal: 'maze seed ready', source: 'efdp', arrivedAt: Date.now() });
    localStorage.setItem('baseline-session/scraggles', JSON.stringify(arr));
  } catch(e) {}
  setStatus('Seed sent to Crank \u2192 ' + seed.paletteKey + ' / ' + seed.cohesionMode);
}

// --- Maze generation (unchanged) ---
function makeMaze(W, H, algo) {
  const rw = new Uint8Array(W*H); rw.fill(1);
  const bw = new Uint8Array(W*H); bw.fill(1);
  const idx = (x,y) => y*W+x;

  if (algo === 'backtracker') {
    const visited = new Uint8Array(W*H);
    const stack = [[0,0]];
    visited[0] = 1;
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    while (stack.length) {
      const [x,y] = stack[stack.length-1];
      const sh = dirs.slice().sort(()=>Math.random()-0.5);
      let moved = false;
      for (const [dx,dy] of sh) {
        const nx=x+dx, ny=y+dy;
        if (nx>=0&&nx<W&&ny>=0&&ny<H&&!visited[idx(nx,ny)]) {
          visited[idx(nx,ny)]=1;
          if (dx===1) rw[idx(x,y)]=0;
          else if (dx===-1) rw[idx(nx,ny)]=0;
          else if (dy===1) bw[idx(x,y)]=0;
          else bw[idx(nx,ny)]=0;
          stack.push([nx,ny]); moved=true; break;
        }
      }
      if (!moved) stack.pop();
    }
  } else if (algo === 'prim') {
    const visited = new Uint8Array(W*H);
    const walls = [];
    const addW = (x,y) => {
      if(x+1<W) walls.push([x,y,x+1,y]);
      if(x-1>=0) walls.push([x,y,x-1,y]);
      if(y+1<H) walls.push([x,y,x,y+1]);
      if(y-1>=0) walls.push([x,y,x,y-1]);
    };
    visited[0]=1; addW(0,0);
    while (walls.length) {
      const ri=Math.floor(Math.random()*walls.length);
      const [x1,y1,x2,y2]=walls.splice(ri,1)[0];
      if(visited[idx(x2,y2)]) continue;
      visited[idx(x2,y2)]=1;
      if(x2>x1) rw[idx(x1,y1)]=0;
      else if(x2<x1) rw[idx(x2,y2)]=0;
      else if(y2>y1) bw[idx(x1,y1)]=0;
      else bw[idx(x2,y2)]=0;
      addW(x2,y2);
    }
  } else { // kruskal
    const parent = Array.from({length:W*H},(_,i)=>i);
    const find = i => { while(parent[i]!==i){parent[i]=parent[parent[i]];i=parent[i];} return i; };
    const union = (a,b) => { parent[find(a)]=find(b); };
    const edges=[];
    for(let y=0;y<H;y++) for(let x=0;x<W;x++) {
      if(x+1<W) edges.push([x,y,x+1,y]);
      if(y+1<H) edges.push([x,y,x,y+1]);
    }
    edges.sort(()=>Math.random()-0.5);
    for(const [x1,y1,x2,y2] of edges) {
      if(find(idx(x1,y1))!==find(idx(x2,y2))) {
        union(idx(x1,y1),idx(x2,y2));
        if(x2>x1) rw[idx(x1,y1)]=0; else bw[idx(x1,y1)]=0;
      }
    }
  }
  return {rw,bw,W,H};
}

/**
 * Wall density: after maze generation, randomly remove a percentage of interior walls.
 * At 0% you get the full maze. At 80% it's very open and color flows freely.
 */
function applyWallDensity(maze, density) {
  if (density <= 0) return;
  const {rw, bw, W, H} = maze;
  // Collect all interior walls
  const walls = [];
  for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
    const ci = y * W + x;
    if (x+1 < W && rw[ci]) walls.push({type: 'rw', ci});
    if (y+1 < H && bw[ci]) walls.push({type: 'bw', ci});
  }
  // Shuffle (Fisher-Yates)
  for (let i = walls.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [walls[i], walls[j]] = [walls[j], walls[i]];
  }
  // Remove density% of them
  const toRemove = Math.floor(walls.length * density / 100);
  for (let i = 0; i < toRemove; i++) {
    const {type, ci} = walls[i];
    if (type === 'rw') rw[ci] = 0;
    else bw[ci] = 0;
  }
}

// --- State ---
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let CELL = 18, maze = null, cellColors = null, pins = [];
let mode = 'pin', currentColor = '#f5c842', currentStrength = 5;
let kiwiMap = null, calcifiedCount = 0, totalKiwis = 0, showKiwis = false;
let decayRate = 0.5, totalPulses = 0, totalLegacyWalls = 0;
let directionBias = null; // null or { dx, dy, strength }
let currentPinType = 'circle', currentDirection = 1; // 0=up, 1=right, 2=down, 3=left
let wallDensity = 0; // % of interior walls to remove after maze generation
let layers = [], activeLayerIndex = 0;
let thirdMode = 'interactive';  // 'interactive' | 'pipeline'
let thirdSuggestions = [];      // ghost pin suggestions from The Third

// --- Layer management ---

function createLayer(name) {
  const N = maze ? maze.W * maze.H : 0;
  return {
    name: name || `Layer ${layers.length + 1}`,
    cellColors: new Float32Array(N * 4),
    pins: [],
    kiwiMap: new Float32Array(N),
    calcifiedCount: 0,
    totalKiwis: 0,
    totalPulses: 0,
    totalLegacyWalls: 0,
    decayRate: 0.5,
    blendMode: layers.length === 0 ? 'overwrite' : 'alpha',
    opacity: 1.0,
    pinMemory: null
  };
}

function saveActiveLayer() {
  if (layers.length === 0) return;
  const layer = layers[activeLayerIndex];
  layer.cellColors = cellColors;
  layer.pins = pins;
  layer.kiwiMap = kiwiMap;
  layer.calcifiedCount = calcifiedCount;
  layer.totalKiwis = totalKiwis;
  layer.totalPulses = totalPulses;
  layer.totalLegacyWalls = totalLegacyWalls;
  layer.decayRate = decayRate;
}

function loadActiveLayer() {
  if (layers.length === 0) return;
  const layer = layers[activeLayerIndex];
  cellColors = layer.cellColors;
  pins = layer.pins;
  kiwiMap = layer.kiwiMap;
  calcifiedCount = layer.calcifiedCount;
  totalKiwis = layer.totalKiwis;
  totalPulses = layer.totalPulses;
  totalLegacyWalls = layer.totalLegacyWalls;
  decayRate = layer.decayRate;
  // Sync UI to reflect this layer's settings
  document.getElementById('decay-rate').value = Math.round(decayRate * 10);
  document.getElementById('decay-val').textContent = decayRate.toFixed(1);
}

function switchToLayer(index) {
  if (index === activeLayerIndex && layers.length > 0) return;
  saveActiveLayer();
  activeLayerIndex = index;
  loadActiveLayer();
  renderMaze();
  updatePinList();
  updateLayerPanel();
  updateMemoryButtons();
  setStatus(`Layer ${index + 1}: ${layers[index].name}`);
}

function addLayer() {
  if (!maze) return;
  saveActiveLayer();
  const layer = createLayer();
  layers.push(layer);
  activeLayerIndex = layers.length - 1;
  loadActiveLayer();
  renderMaze();
  updatePinList();
  updateLayerPanel();
  setStatus(`${layer.name} added. Place pins on this layer.`);
}

function removeLayer(index) {
  if (layers.length <= 1) return;
  saveActiveLayer();
  layers.splice(index, 1);
  if (activeLayerIndex >= layers.length) activeLayerIndex = layers.length - 1;
  loadActiveLayer();
  renderMaze();
  updatePinList();
  updateLayerPanel();
}

function updateLayerPanel() {
  const list = document.getElementById('layer-list');
  list.innerHTML = '';
  layers.forEach((layer, i) => {
    const row = document.createElement('div');
    row.className = 'layer-row' + (i === activeLayerIndex ? ' active' : '');
    row.onclick = () => switchToLayer(i);

    const name = document.createElement('span');
    name.className = 'layer-name';
    name.textContent = (layer.pinMemory ? '\u{1F4CC} ' : '') + layer.name;

    const blend = document.createElement('select');
    blend.className = 'layer-blend';
    blend.innerHTML = '<option value="overwrite">OW</option><option value="alpha">\u03B1</option>';
    blend.value = layer.blendMode;
    blend.onclick = e => e.stopPropagation();
    blend.onchange = e => { layer.blendMode = e.target.value; renderMaze(); };

    const opacity = document.createElement('input');
    opacity.type = 'range'; opacity.min = 0; opacity.max = 100;
    opacity.value = Math.round(layer.opacity * 100);
    opacity.onclick = e => e.stopPropagation();

    const opVal = document.createElement('span');
    opVal.className = 'layer-opacity-val';
    opVal.textContent = Math.round(layer.opacity * 100) + '%';

    opacity.oninput = e => {
      layer.opacity = parseInt(e.target.value) / 100;
      opVal.textContent = e.target.value + '%';
      renderMaze();
    };

    const remove = document.createElement('button');
    remove.className = 'layer-remove';
    remove.textContent = '\u00D7';
    remove.onclick = e => { e.stopPropagation(); removeLayer(i); };
    if (layers.length <= 1) remove.disabled = true;

    row.append(name, blend, opacity, opVal, remove);
    list.appendChild(row);
  });
}

function updateMemoryButtons() {
  var hasMem = layers.length > 0 && !!layers[activeLayerIndex].pinMemory;
  document.getElementById('btn-restore').disabled = !hasMem;
  document.getElementById('btn-forget').disabled = !hasMem;
  document.getElementById('pose-group').style.display = hasMem ? 'flex' : 'none';
}

function updateBiasButtons() {
  var dirs = [0, 1, 2, 3];
  dirs.forEach(function(d) {
    document.getElementById('btn-bias-' + d).classList.remove('active');
  });
  document.getElementById('btn-bias-off').classList.remove('active');
  if (!directionBias) {
    document.getElementById('btn-bias-off').classList.add('active');
  } else {
    // Map dx/dy back to button index: 0=up(0,-1), 1=right(1,0), 2=down(0,1), 3=left(-1,0)
    var biasMap = [{dx:0,dy:-1},{dx:1,dy:0},{dx:0,dy:1},{dx:-1,dy:0}];
    for (var i = 0; i < 4; i++) {
      if (biasMap[i].dx === directionBias.dx && biasMap[i].dy === directionBias.dy) {
        document.getElementById('btn-bias-' + i).classList.add('active');
        break;
      }
    }
  }
}

function restorePinsFromMemory() {
  var mem = layers[activeLayerIndex].pinMemory;
  if (!mem) return;
  pins.length = 0;
  mem.forEach(function(p) {
    pins.push({
      x: p.x, y: p.y, color: [...p.color],
      strength: p.strength, initialStrength: p.strength,
      type: p.type, direction: p.direction,
      limit: null, legacyDone: false
    });
  });
  updatePinList();
}

var POSES = {
  idle:   { label: 'Idle',   triangleDir: null, strengthMod: 0, decayMod: 0,    bias: null },
  jump:   { label: 'Jump',   triangleDir: 0,    strengthMod: 2, decayMod: -0.1, bias: { dx:0, dy:-1, strength:0.5 } },
  land:   { label: 'Land',   triangleDir: 2,    strengthMod: 1, decayMod: 0.2,  bias: { dx:0, dy:1, strength:0.3 } },
  run:    { label: 'Run',    triangleDir: 1,    strengthMod: 0, decayMod: 0,    bias: { dx:1, dy:0, strength:0.4 } },
  attack: { label: 'Attack', triangleDir: 1,    strengthMod: 3, decayMod: -0.2, bias: { dx:1, dy:-1, strength:0.6 } }
};

function applyPose(poseKey) {
  var pose = POSES[poseKey];
  if (!pose) return;
  restorePinsFromMemory();
  pins.forEach(function(p) {
    if (pose.triangleDir !== null && p.type === 'triangle') {
      p.direction = pose.triangleDir;
    }
    p.strength = Math.max(1, p.strength + pose.strengthMod);
    p.initialStrength = p.strength;
  });
  var baseDecay = layers[activeLayerIndex].baseDecayRate != null ? layers[activeLayerIndex].baseDecayRate : layers[activeLayerIndex].decayRate;
  decayRate = Math.max(0.1, baseDecay + pose.decayMod);
  document.getElementById('decay-rate').value = Math.round(decayRate * 10);
  document.getElementById('decay-val').textContent = decayRate.toFixed(1);
  directionBias = pose.bias ? { dx: pose.bias.dx, dy: pose.bias.dy, strength: pose.bias.strength } : null;
  updateBiasButtons();
  updatePinList();
  renderMaze();
  setStatus('Pose: ' + pose.label);
}

// --- Core ---

function initMaze() {
  // Preserve pin memory across regen
  var savedMemory = (layers.length > 0) ? layers[activeLayerIndex].pinMemory : null;
  const sz = parseInt(document.getElementById('maze-size').value);
  const algo = document.getElementById('algo').value;
  const maxW = Math.min(window.innerWidth - 40, 680);
  CELL = Math.max(10, Math.floor(maxW / sz));
  canvas.width = sz * CELL + 1;
  canvas.height = sz * CELL + 1;
  maze = makeMaze(sz, sz, algo);
  applyWallDensity(maze, wallDensity);
  // Initialize layer system with one default layer
  layers = [];
  activeLayerIndex = 0;
  const firstLayer = createLayer('Layer 1');
  layers.push(firstLayer);
  // Load first layer into globals
  cellColors = firstLayer.cellColors;
  pins = firstLayer.pins;
  kiwiMap = firstLayer.kiwiMap;
  calcifiedCount = 0;
  totalKiwis = 0;
  totalPulses = 0;
  totalLegacyWalls = 0;
  // Restore pin memory if it existed
  if (savedMemory) {
    layers[0].pinMemory = savedMemory;
    restorePinsFromMemory();
  }
  renderMaze();
  updatePinList();
  updateLayerPanel();
  updateMemoryButtons();
  setStatus(savedMemory ? 'New maze. Pin rig restored from memory.' : 'Maze ready. Place color pins, then pulse.');
}

/**
 * Place legacy walls at the boundary of a dying pin's color territory.
 * Finds open passages between pin-color cells and different-color cells,
 * then closes a selection of them — writing the pin's history into the maze.
 */
function placeLegacyWalls(pin) {
  const {rw, bw, W, H} = maze;
  const idx = (x,y) => y * W + x;
  const wallCount = Math.floor(pin.initialStrength / 2);
  if (wallCount <= 0) return 0;

  const pr = pin.color[0], pg = pin.color[1], pb = pin.color[2];
  const isPinColor = (ci) => {
    if (cellColors[ci*4+3] < 0.001) return false;
    return (Math.abs(cellColors[ci*4] - pr) + Math.abs(cellColors[ci*4+1] - pg) +
            Math.abs(cellColors[ci*4+2] - pb)) < SAME_COLOR_DIST;
  };

  // Collect boundary passages (check right/bottom only to avoid duplicates)
  const candidates = [];
  for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
    const ci = idx(x, y);
    // Right passage
    if (x+1 < W && !rw[ci]) {
      if (isPinColor(ci) !== isPinColor(idx(x+1, y))) {
        candidates.push({type: 'rw', ci});
      }
    }
    // Bottom passage
    if (y+1 < H && !bw[ci]) {
      if (isPinColor(ci) !== isPinColor(idx(x, y+1))) {
        candidates.push({type: 'bw', ci});
      }
    }
  }

  if (candidates.length === 0) return 0;

  // Shuffle (Fisher-Yates)
  for (let i = candidates.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
  }

  // Place walls and drop kiwis at each location
  const placed = Math.min(wallCount, candidates.length);
  for (let i = 0; i < placed; i++) {
    const {type, ci} = candidates[i];
    if (type === 'rw') rw[ci] = 1;
    else bw[ci] = 1;
    kiwiMap[ci] += 1;
    totalKiwis++;
  }

  return placed;
}

/**
 * Meteor drop: clear walls in a circular radius when a pin is placed.
 * Interior walls (both cells inside radius) are removed.
 * Boundary walls (one cell inside, one outside) stay — preserves maze at edges.
 * Radius: max(1, floor(strength / 3)).  str 1-5 → 1, str 6-8 → 2, str 9-10 → 3.
 */
function meteorDrop(pin) {
  const {rw, bw, W, H} = maze;
  const idx = (x,y) => y * W + x;
  const radius = Math.max(1, Math.floor(pin.strength / 3));
  const r2 = (radius + 0.5) * (radius + 0.5); // +0.5 so edge cells are included
  const inDrop = (x, y) => {
    const dx = x - pin.x, dy = y - pin.y;
    return dx*dx + dy*dy <= r2;
  };

  let cleared = 0;
  const yMin = Math.max(0, pin.y - radius), yMax = Math.min(H-1, pin.y + radius);
  const xMin = Math.max(0, pin.x - radius), xMax = Math.min(W-1, pin.x + radius);

  for (let y = yMin; y <= yMax; y++) {
    for (let x = xMin; x <= xMax; x++) {
      if (!inDrop(x, y)) continue;
      const ci = idx(x, y);

      // Clear right wall if right neighbor is also inside the drop
      if (x+1 < W && rw[ci] && inDrop(x+1, y)) { rw[ci] = 0; cleared++; }
      // Clear bottom wall if bottom neighbor is also inside the drop
      if (y+1 < H && bw[ci] && inDrop(x, y+1)) { bw[ci] = 0; cleared++; }
    }
  }
  return cleared;
}

/**
 * Circle erosion: remove walls at the pin's color frontier.
 * Finds walls where a pin-colored cell borders a non-pin-colored cell,
 * then removes floor(strength/3) of them, nearest-to-pin first.
 * Drops a kiwi at each removal.
 */
function circleErode(pin) {
  const {rw, bw, W, H} = maze;
  const idx = (x,y) => y * W + x;
  const wallCount = Math.floor(pin.strength / 3);
  if (wallCount <= 0) return;

  const pr = pin.color[0], pg = pin.color[1], pb = pin.color[2];
  const isPinColor = (ci) => {
    if (cellColors[ci*4+3] < 0.001) return false;
    return (Math.abs(cellColors[ci*4] - pr) + Math.abs(cellColors[ci*4+1] - pg) +
            Math.abs(cellColors[ci*4+2] - pb)) < SAME_COLOR_DIST;
  };

  // Collect frontier walls (pin-color on one side, non-pin on the other)
  const candidates = [];
  for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
    const ci = idx(x, y);
    // Right wall
    if (x+1 < W && rw[ci]) {
      if (isPinColor(ci) !== isPinColor(idx(x+1, y))) {
        const dx = x - pin.x, dy = y - pin.y;
        candidates.push({type: 'rw', ci, dist: dx*dx + dy*dy});
      }
    }
    // Bottom wall
    if (y+1 < H && bw[ci]) {
      if (isPinColor(ci) !== isPinColor(idx(x, y+1))) {
        const dx = x - pin.x, dy = y - pin.y;
        candidates.push({type: 'bw', ci, dist: dx*dx + dy*dy});
      }
    }
  }

  if (candidates.length === 0) return;

  // Sort nearest-to-pin first
  candidates.sort((a, b) => a.dist - b.dist);

  const toRemove = Math.min(wallCount, candidates.length);
  for (let i = 0; i < toRemove; i++) {
    const {type, ci} = candidates[i];
    if (type === 'rw') rw[ci] = 0;
    else bw[ci] = 0;
    kiwiMap[ci] += 1;
    totalKiwis++;
  }
}

/**
 * Count walls around a cell (0-4). Boundary edges count as walls.
 */
function countWalls(x, y) {
  const {rw, bw, W, H} = maze;
  const idx = (cx,cy) => cy * W + cx;
  let count = 0;
  // Right: wall present, or at boundary
  if (x+1 >= W || rw[idx(x,y)]) count++;
  // Left: wall present on left neighbor, or at boundary
  if (x-1 < 0 || rw[idx(x-1,y)]) count++;
  // Bottom: wall present, or at boundary
  if (y+1 >= H || bw[idx(x,y)]) count++;
  // Top: wall present on top neighbor, or at boundary
  if (y-1 < 0 || bw[idx(x,y-1)]) count++;
  return count;
}

/**
 * Square building: for each cell with pin's color that has exactly 1 wall,
 * add 1 random wall from available open passages.
 * Self-limiting — once a cell gains wall #2, it stops qualifying next pulse.
 * Drops a kiwi at each addition.
 */
function squareBuild(pin) {
  const {rw, bw, W, H} = maze;
  const idx = (x,y) => y * W + x;
  const pr = pin.color[0], pg = pin.color[1], pb = pin.color[2];
  const isPinColor = (ci) => {
    if (cellColors[ci*4+3] < 0.001) return false;
    return (Math.abs(cellColors[ci*4] - pr) + Math.abs(cellColors[ci*4+1] - pg) +
            Math.abs(cellColors[ci*4+2] - pb)) < SAME_COLOR_DIST;
  };

  for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
    const ci = idx(x, y);
    if (!isPinColor(ci)) continue;
    if (countWalls(x, y) !== 1) continue;

    // Collect open passages we could close
    const openPassages = [];
    if (x+1 < W && !rw[ci])            openPassages.push({type: 'rw', ci});
    if (x-1 >= 0 && !rw[idx(x-1,y)])   openPassages.push({type: 'rw', ci: idx(x-1,y)});
    if (y+1 < H && !bw[ci])            openPassages.push({type: 'bw', ci});
    if (y-1 >= 0 && !bw[idx(x,y-1)])   openPassages.push({type: 'bw', ci: idx(x,y-1)});

    if (openPassages.length === 0) continue;

    // Pick one at random and close it
    const choice = openPassages[Math.floor(Math.random() * openPassages.length)];
    if (choice.type === 'rw') rw[choice.ci] = 1;
    else bw[choice.ci] = 1;
    kiwiMap[ci] += 1;
    totalKiwis++;
  }
}

/**
 * Triangle beam: fire from pin position in its direction.
 * Steps cell-by-cell. Open passage → inject pin color into accumulator, continue.
 * Wall → pin loses 1 strength, 40% chance to remove wall, beam stops.
 * Returns total strength lost from wall hits.
 */
function triangleBeam(pin, acc) {
  const {rw, bw, W, H} = maze;
  const idx = (x,y) => y * W + x;
  const [dx, dy] = DIR_VECS[pin.direction];
  let cx = pin.x, cy = pin.y;
  let wallHits = 0;

  while (true) {
    const nx = cx + dx, ny = cy + dy;
    if (nx < 0 || nx >= W || ny < 0 || ny >= H) break;

    // Check wall between cx,cy and nx,ny
    let wallPresent = false;
    if (dx === 1)       wallPresent = rw[idx(cx, cy)] === 1;
    else if (dx === -1) wallPresent = rw[idx(nx, ny)] === 1;
    else if (dy === 1)  wallPresent = bw[idx(cx, cy)] === 1;
    else if (dy === -1) wallPresent = bw[idx(nx, ny)] === 1;

    if (wallPresent) {
      // Wall hit: strength loss, chance to break
      wallHits++;
      if (Math.random() < BEAM_WALL_BREAK_CHANCE) {
        if (dx === 1)       rw[idx(cx, cy)] = 0;
        else if (dx === -1) rw[idx(nx, ny)] = 0;
        else if (dy === 1)  bw[idx(cx, cy)] = 0;
        else if (dy === -1) bw[idx(nx, ny)] = 0;
        kiwiMap[idx(cx, cy)] += 1;
        totalKiwis++;
      }
      break; // beam stops on wall hit regardless
    }

    // Open passage: inject pin color into accumulator at target cell
    const ni = idx(nx, ny);
    // Skip calcified cells
    if (cellColors[ni*4+3] < CALCIFY_AT) {
      const beamStr = pin.strength * 0.5; // beam carries half the pin's strength
      acc[ni*4]   += pin.color[0] * beamStr;
      acc[ni*4+1] += pin.color[1] * beamStr;
      acc[ni*4+2] += pin.color[2] * beamStr;
      acc[ni*4+3] += beamStr;
    }

    cx = nx;
    cy = ny;
  }

  return wallHits;
}

/**
 * One diffusion pulse.
 *
 * Cell format: [r, g, b, strength] — color in 0-255, strength in 0-10.
 * Accumulator is pre-multiplied internally: [r*s, g*s, b*s, s].
 * Normalized back to direct color after the pass.
 *
 * After diffusion: pins decay, legacy walls placed, dead pins removed.
 */
function pulseOnce() {
  if (!maze) return;
  const {rw, bw, W, H} = maze;
  const idx = (x,y) => y * W + x;
  const N = W * H;

  // Snapshot for kiwi detection
  const prev = new Float32Array(cellColors);

  // Build triangle cell set (these cells skip normal diffusion)
  const triangleCells = new Set();
  for (const pin of pins) {
    if (pin.type === 'triangle' && pin.strength > 0) {
      triangleCells.add(idx(pin.x, pin.y));
    }
  }

  // Accumulation buffer (pre-multiplied)
  const acc = new Float32Array(N * 4);

  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const ci = idx(x, y);
      const s = cellColors[ci*4+3];

      // Calcified: silent — copy directly, no emission, no acceptance
      if (s >= CALCIFY_AT) {
        acc[ci*4]   = cellColors[ci*4] * s;
        acc[ci*4+1] = cellColors[ci*4+1] * s;
        acc[ci*4+2] = cellColors[ci*4+2] * s;
        acc[ci*4+3] = s;
        continue;
      }

      // Empty: nothing to emit
      if (s < 0.001) continue;

      const r = cellColors[ci*4];
      const g = cellColors[ci*4+1];
      const b = cellColors[ci*4+2];

      // Self-retain (all cells do this)
      acc[ci*4]   += r * s;
      acc[ci*4+1] += g * s;
      acc[ci*4+2] += b * s;
      acc[ci*4+3] += s;

      // Triangle pin cells: self-retain only, skip neighbor push
      if (triangleCells.has(ci)) continue;

      // Reachable neighbors (open passages)
      const neighbors = [];
      if (x+1 < W && !rw[ci])            neighbors.push(idx(x+1, y));
      if (x-1 >= 0 && !rw[idx(x-1, y)])  neighbors.push(idx(x-1, y));
      if (y+1 < H && !bw[ci])            neighbors.push(idx(x, y+1));
      if (y-1 >= 0 && !bw[idx(x, y-1)])  neighbors.push(idx(x, y-1));

      for (const ni of neighbors) {
        const ns = cellColors[ni*4+3];

        // Calcified neighbors don't accept pushes
        if (ns >= CALCIFY_AT) continue;

        // Spread rate depends on neighbor state
        let rate;
        if (ns < 0.001) {
          rate = RATE_OPEN;       // empty cell
        } else {
          const nr = cellColors[ni*4];
          const ng = cellColors[ni*4+1];
          const nb = cellColors[ni*4+2];
          const dist = Math.abs(r - nr) + Math.abs(g - ng) + Math.abs(b - nb);
          rate = dist < SAME_COLOR_DIST ? RATE_SAME : RATE_CONTESTED;
        }

        // Direction bias: boost/dampen based on neighbor direction
        if (directionBias) {
          var ndx = (ni % W) - x, ndy = Math.floor(ni / W) - y;
          var dot = ndx * directionBias.dx + ndy * directionBias.dy;
          if (dot > 0) rate *= 1 + directionBias.strength;
          else if (dot < 0) rate *= 1 - directionBias.strength * 0.5;
        }
        const push = s * rate;
        acc[ni*4]   += r * push;
        acc[ni*4+1] += g * push;
        acc[ni*4+2] += b * push;
        acc[ni*4+3] += push;
      }
    }
  }

  // Re-anchor living pins — override, not accumulate.
  // Uses current (pre-decay) strength. Pin cell can't calcify while pin is alive.
  for (const pin of pins) {
    if (pin.strength <= 0) continue;
    const ci = idx(pin.x, pin.y);
    const s = Math.min(pin.strength * PIN_ANCHOR_MULT, PIN_ANCHOR_CAP);
    acc[ci*4]   = pin.color[0] * s;
    acc[ci*4+1] = pin.color[1] * s;
    acc[ci*4+2] = pin.color[2] * s;
    acc[ci*4+3] = s;
  }

  // Triangle beam injection: fire beams into accumulator before normalize
  const beamHits = new Map(); // pin index → wall hits
  for (let i = 0; i < pins.length; i++) {
    const pin = pins[i];
    if (pin.type === 'triangle' && pin.strength > 0) {
      const hits = triangleBeam(pin, acc);
      if (hits > 0) beamHits.set(i, hits);
    }
  }

  // Normalize: pre-multiplied accumulator → direct [r, g, b, strength]
  calcifiedCount = 0;
  for (let i = 0; i < N; i++) {
    const w = acc[i*4+3];
    if (w < 0.001) {
      cellColors[i*4] = 0; cellColors[i*4+1] = 0; cellColors[i*4+2] = 0; cellColors[i*4+3] = 0;
    } else {
      cellColors[i*4]   = acc[i*4] / w;
      cellColors[i*4+1] = acc[i*4+1] / w;
      cellColors[i*4+2] = acc[i*4+2] / w;
      cellColors[i*4+3] = Math.min(w, CALCIFY_AT);
      if (w >= CALCIFY_AT) calcifiedCount++;
    }
  }

  // Kiwi detection: cell had color before AND color shifted significantly
  for (let i = 0; i < N; i++) {
    if (prev[i*4+3] > 0.5 && cellColors[i*4+3] > 0.5) {
      const dist = Math.abs(cellColors[i*4] - prev[i*4]) +
                   Math.abs(cellColors[i*4+1] - prev[i*4+1]) +
                   Math.abs(cellColors[i*4+2] - prev[i*4+2]);
      if (dist > KIWI_CHANGE_DIST) {
        kiwiMap[i] += 1;
        totalKiwis++;
      }
    }
  }

  // Circle erosion: carve paths at color frontiers
  for (const pin of pins) {
    if (pin.type === 'circle' && pin.strength > 0) {
      circleErode(pin);
    }
  }

  // Square building: fortify territory with walls
  for (const pin of pins) {
    if (pin.type === 'square' && pin.strength > 0) {
      squareBuild(pin);
    }
  }

  // --- Pin decay ---
  if (decayRate > 0) {
    for (let i = pins.length - 1; i >= 0; i--) {
      const pin = pins[i];
      pin.strength -= decayRate;

      // Triangle extra decay from wall hits
      if (beamHits.has(i)) {
        pin.strength -= beamHits.get(i);
      }

      // Legacy wall phase: pin drops below threshold, places walls once
      if (pin.strength < LEGACY_THRESHOLD && !pin.legacyDone) {
        pin.legacyDone = true;
        const placed = placeLegacyWalls(pin);
        totalLegacyWalls += placed;
      }

      // Death: pin has nothing left
      if (pin.strength <= 0) {
        pin.strength = 0;
        pins.splice(i, 1);
      }
    }
  }

  totalPulses++;
}

/**
 * Flatten-press: BFS flood from all colored cells through open passages.
 * Every unclaimed cell inherits the exact color of the neighbor that reached it first.
 * Filled cells are calcified — locked in and silent. One pass, very fast.
 * Respects walls: truly walled-off empty regions stay empty.
 */
function flattenPress() {
  if (!maze) return 0;
  const {rw, bw, W, H} = maze;
  const idx = (x,y) => y * W + x;
  const N = W * H;

  // Collect seed cells (any cell with meaningful color)
  const queue = [];
  const visited = new Uint8Array(N);

  for (let i = 0; i < N; i++) {
    if (cellColors[i*4+3] >= PRESS_SEED_THRESHOLD) {
      queue.push(i);
      visited[i] = 1;
    }
  }

  // BFS: expand through open passages, nearest-neighbor fill
  let head = 0;
  let filled = 0;

  while (head < queue.length) {
    const ci = queue[head++];
    const x = ci % W, y = Math.floor(ci / W);
    const r = cellColors[ci*4], g = cellColors[ci*4+1], b = cellColors[ci*4+2];

    // Check all 4 neighbors via open passages
    const neighbors = [];
    if (x+1 < W && !rw[ci])            neighbors.push(idx(x+1, y));
    if (x-1 >= 0 && !rw[idx(x-1, y)])  neighbors.push(idx(x-1, y));
    if (y+1 < H && !bw[ci])            neighbors.push(idx(x, y+1));
    if (y-1 >= 0 && !bw[idx(x, y-1)])  neighbors.push(idx(x, y-1));

    for (const ni of neighbors) {
      if (visited[ni]) continue;
      visited[ni] = 1;

      if (cellColors[ni*4+3] < PRESS_SEED_THRESHOLD) {
        // Unclaimed cell: inherit exact color, calcify
        cellColors[ni*4]   = r;
        cellColors[ni*4+1] = g;
        cellColors[ni*4+2] = b;
        cellColors[ni*4+3] = CALCIFY_AT;
        filled++;
      }

      queue.push(ni);
    }
  }

  // Recount calcified
  calcifiedCount = 0;
  for (let i = 0; i < N; i++) {
    if (cellColors[i*4+3] >= CALCIFY_AT) calcifiedCount++;
  }

  return filled;
}

/**
 * Auto-scatter: find unclaimed clusters, drop circle pins at their centroids.
 * Color is inherited from the nearest existing colored cell (so auto-pins
 * extend territories rather than introduce new colors).
 * Strength is scaled to cluster size — enough to fill most of the gap.
 * Min cluster size: TARGET_DENSITY / 8 (smaller gaps get flat-filled by press).
 */
function autoScatter() {
  if (!maze) return 0;
  const {rw, bw, W, H} = maze;
  const idx = (x,y) => y * W + x;
  const N = W * H;
  const MIN_CLUSTER = Math.max(5, Math.floor(TARGET_DENSITY / 8));

  // Find unclaimed connected components via BFS
  const visited = new Uint8Array(N);
  const components = [];

  for (let i = 0; i < N; i++) {
    if (visited[i] || cellColors[i*4+3] >= PRESS_SEED_THRESHOLD) {
      visited[i] = 1;
      continue;
    }

    // BFS this unclaimed component
    const queue = [i];
    const cells = [i];
    visited[i] = 1;
    let head = 0;

    while (head < queue.length) {
      const ci = queue[head++];
      const x = ci % W, y = Math.floor(ci / W);
      const neighbors = [];
      if (x+1 < W && !rw[ci])            neighbors.push(idx(x+1, y));
      if (x-1 >= 0 && !rw[idx(x-1, y)])  neighbors.push(idx(x-1, y));
      if (y+1 < H && !bw[ci])            neighbors.push(idx(x, y+1));
      if (y-1 >= 0 && !bw[idx(x, y-1)])  neighbors.push(idx(x, y-1));

      for (const ni of neighbors) {
        if (visited[ni]) continue;
        visited[ni] = 1;
        if (cellColors[ni*4+3] < PRESS_SEED_THRESHOLD) {
          queue.push(ni);
          cells.push(ni);
        }
      }
    }

    if (cells.length >= MIN_CLUSTER) {
      // Compute centroid
      let sumX = 0, sumY = 0;
      for (const ci of cells) {
        sumX += ci % W;
        sumY += Math.floor(ci / W);
      }
      components.push({
        cells,
        cx: Math.round(sumX / cells.length),
        cy: Math.round(sumY / cells.length)
      });
    }
  }

  if (components.length === 0) return 0;

  // Place a circle pin at each cluster centroid
  let placed = 0;
  for (const comp of components) {
    // Snap centroid to nearest cell actually in the component
    let bestDist = Infinity, bestCi = comp.cells[0];
    for (const ci of comp.cells) {
      const x = ci % W, y = Math.floor(ci / W);
      const d = (x - comp.cx) ** 2 + (y - comp.cy) ** 2;
      if (d < bestDist) { bestDist = d; bestCi = ci; }
    }
    const pinX = bestCi % W, pinY = Math.floor(bestCi / W);

    // BFS outward from component — ignoring walls — to find nearest colored cell.
    // Uses spatial proximity (not passage connectivity) so walled-off clusters
    // still inherit the color of their nearest territory.
    const colorQueue = [...comp.cells];
    const colorVisited = new Set(comp.cells);
    let foundColor = null;
    let cHead = 0;

    while (cHead < colorQueue.length && !foundColor) {
      const ci = colorQueue[cHead++];
      const x = ci % W, y = Math.floor(ci / W);
      const neighbors = [];
      if (x+1 < W) neighbors.push(idx(x+1, y));
      if (x-1 >= 0) neighbors.push(idx(x-1, y));
      if (y+1 < H) neighbors.push(idx(x, y+1));
      if (y-1 >= 0) neighbors.push(idx(x, y-1));

      for (const ni of neighbors) {
        if (colorVisited.has(ni)) continue;
        colorVisited.add(ni);
        if (cellColors[ni*4+3] >= PRESS_SEED_THRESHOLD) {
          foundColor = [cellColors[ni*4], cellColors[ni*4+1], cellColors[ni*4+2]];
          break;
        }
        colorQueue.push(ni);
      }
    }

    // Fallback if nothing reachable (truly isolated pocket)
    if (!foundColor) foundColor = [128, 128, 128];

    // Strength scaled to cluster size: sqrt(N) * 0.5, clamped 2–9
    const str = Math.max(2, Math.min(9, Math.ceil(Math.sqrt(comp.cells.length) * 0.5)));

    const pin = {
      x: pinX, y: pinY,
      color: foundColor,
      strength: str, initialStrength: str,
      limit: null, legacyDone: false,
      type: 'circle', direction: 1
    };
    pins.push(pin);
    meteorDrop(pin);
    placed++;
  }

  return placed;
}

// --- The Third: Inter-Layer Observer ---

function thirdAnalyze(sourceLayer) {
  if (!maze) return [];
  const {rw, bw, W, H} = maze;
  const idx = (x,y) => y * W + x;
  const N = W * H;
  const km = sourceLayer.kiwiMap;
  const sc = sourceLayer.cellColors;

  // Find connected clusters of high-kiwi cells via spatial BFS (ignoring walls).
  // Kiwi activity happens at contested boundaries which span across walls,
  // so spatial proximity is the right clustering metric.
  const visited = new Uint8Array(N);
  const clusters = [];

  for (let i = 0; i < N; i++) {
    if (visited[i] || km[i] < THIRD_KIWI_THRESHOLD) {
      visited[i] = 1;
      continue;
    }

    // BFS this hot cluster — spatial neighbors (ignoring walls)
    const queue = [i];
    const cells = [i];
    let totalKiwiCount = km[i];
    visited[i] = 1;
    let head = 0;

    while (head < queue.length) {
      const ci = queue[head++];
      const x = ci % W, y = Math.floor(ci / W);
      const neighbors = [];
      if (x+1 < W) neighbors.push(idx(x+1, y));
      if (x-1 >= 0) neighbors.push(idx(x-1, y));
      if (y+1 < H) neighbors.push(idx(x, y+1));
      if (y-1 >= 0) neighbors.push(idx(x, y-1));

      for (const ni of neighbors) {
        if (visited[ni]) continue;
        visited[ni] = 1;
        if (km[ni] >= THIRD_KIWI_THRESHOLD) {
          queue.push(ni);
          cells.push(ni);
          totalKiwiCount += km[ni];
        }
      }
    }

    if (cells.length >= THIRD_MIN_CLUSTER) {
      // Compute centroid
      let sumX = 0, sumY = 0;
      for (const ci of cells) {
        sumX += ci % W;
        sumY += Math.floor(ci / W);
      }
      clusters.push({
        cells,
        cx: Math.round(sumX / cells.length),
        cy: Math.round(sumY / cells.length),
        totalKiwis: totalKiwiCount,
        density: totalKiwiCount / cells.length
      });
    }
  }

  // Convert clusters to pin suggestions
  const suggestions = [];
  for (const cluster of clusters) {
    // Snap centroid to nearest cell in cluster
    let bestDist = Infinity, bestCi = cluster.cells[0];
    for (const ci of cluster.cells) {
      const x = ci % W, y = Math.floor(ci / W);
      const d = (x - cluster.cx) ** 2 + (y - cluster.cy) ** 2;
      if (d < bestDist) { bestDist = d; bestCi = ci; }
    }
    const pinX = bestCi % W, pinY = Math.floor(bestCi / W);

    // Sample color from source layer at centroid, then shift it
    const si = bestCi * 4;
    let color;
    if (sc[si+3] > 0.01) {
      color = shiftColor(sc[si], sc[si+1], sc[si+2]);
    } else {
      // Centroid cell has no color — sample from nearest colored cell in cluster
      let foundColor = null;
      for (const ci of cluster.cells) {
        if (sc[ci*4+3] > 0.01) {
          foundColor = shiftColor(sc[ci*4], sc[ci*4+1], sc[ci*4+2]);
          break;
        }
      }
      color = foundColor || [200, 200, 200];
    }

    // Strength scales with kiwi density, clamped
    const str = Math.max(THIRD_STRENGTH_MIN,
      Math.min(THIRD_STRENGTH_MAX, Math.round(cluster.density * 1.5)));

    suggestions.push({
      x: pinX, y: pinY,
      color, strength: str,
      type: 'circle', direction: 1,
      accepted: true,  // interactive mode: user can toggle
      clusterSize: cluster.cells.length,
      clusterDensity: cluster.density
    });
  }

  return suggestions;
}

function thirdApply(suggestions) {
  let placed = 0;
  for (const s of suggestions) {
    if (s.accepted === false) continue;
    const pin = {
      x: s.x, y: s.y,
      color: [...s.color],
      strength: s.strength, initialStrength: s.strength,
      limit: null, legacyDone: false,
      type: s.type, direction: s.direction
    };
    pins.push(pin);
    meteorDrop(pin);
    placed++;
  }
  renderMaze();
  updatePinList();
  return placed;
}

function runTheThird() {
  if (!maze || layers.length === 0) return;

  // Read from current active layer
  saveActiveLayer();
  const source = layers[activeLayerIndex];
  const suggestions = thirdAnalyze(source);

  if (suggestions.length === 0) {
    setStatus('The Third: no strong kiwi patterns found.');
    return;
  }

  if (thirdMode === 'pipeline') {
    // Auto mode: create new layer, apply suggestions, done
    addLayer();
    const placed = thirdApply(suggestions);
    setStatus(`The Third: placed ${placed} pins on ${layers[activeLayerIndex].name}.`);
  } else {
    // Interactive mode: show ghost suggestions
    thirdSuggestions = suggestions;
    renderMaze();
    setStatus(`The Third: ${suggestions.length} suggestions. Click ghosts to toggle, then Accept.`);
    document.getElementById('third-accept-row').style.display = 'flex';
  }
}

function thirdAccept() {
  if (thirdSuggestions.length === 0) return;
  const accepted = thirdSuggestions.filter(s => s.accepted !== false);
  if (accepted.length === 0) {
    thirdSuggestions = [];
    renderMaze();
    document.getElementById('third-accept-row').style.display = 'none';
    setStatus('The Third: all suggestions dismissed.');
    return;
  }
  // Create new layer and apply accepted suggestions
  addLayer();
  const placed = thirdApply(accepted);
  thirdSuggestions = [];
  document.getElementById('third-accept-row').style.display = 'none';
  setStatus(`The Third: placed ${placed} pins on ${layers[activeLayerIndex].name}.`);
}

function thirdClear() {
  thirdSuggestions = [];
  renderMaze();
  document.getElementById('third-accept-row').style.display = 'none';
  setStatus('The Third: suggestions cleared.');
}

// --- Presets: Save/Load ---

const PRESET_PREFIX = 'cpm-preset:';

function presetSave(name) {
  if (!name || !maze) return;
  saveActiveLayer();
  const preset = {
    version: 1,
    name,
    maze: {
      algo: document.getElementById('algo').value,
      size: parseInt(document.getElementById('maze-size').value),
      wallDensity
    },
    layers: layers.map(l => ({
      name: l.name,
      blendMode: l.blendMode,
      opacity: l.opacity,
      decayRate: l.decayRate,
      pins: l.pins.map(p => ({
        x: p.x, y: p.y,
        color: [...p.color],
        strength: p.strength,
        initialStrength: p.initialStrength,
        type: p.type,
        direction: p.direction
      }))
    })),
    thirdMode,
    activeLayerIndex
  };
  localStorage.setItem(PRESET_PREFIX + name, JSON.stringify(preset));
  updatePresetList();
  setStatus(`Preset "${name}" saved.`);
}

function presetLoad(name) {
  const raw = localStorage.getItem(PRESET_PREFIX + name);
  if (!raw) { setStatus(`Preset "${name}" not found.`); return; }
  const preset = JSON.parse(raw);

  // Set maze config
  document.getElementById('algo').value = preset.maze.algo;
  document.getElementById('maze-size').value = preset.maze.size;
  wallDensity = preset.maze.wallDensity || 0;
  document.getElementById('wall-density').value = wallDensity;
  document.getElementById('wall-density-val').textContent = wallDensity + '%';

  // Regen maze with preset settings
  initMaze();

  // Clear auto-created first layer, rebuild from preset
  layers = [];
  for (let li = 0; li < preset.layers.length; li++) {
    const pl = preset.layers[li];
    const layer = createLayer(pl.name);
    layer.blendMode = pl.blendMode || (li === 0 ? 'overwrite' : 'alpha');
    layer.opacity = pl.opacity != null ? pl.opacity : 1.0;
    layer.decayRate = pl.decayRate != null ? pl.decayRate : 0.5;
    // Place pins
    for (const pp of pl.pins) {
      const pin = {
        x: pp.x, y: pp.y,
        color: [...pp.color],
        strength: pp.strength,
        initialStrength: pp.initialStrength,
        limit: null, legacyDone: false,
        type: pp.type || 'circle',
        direction: pp.direction != null ? pp.direction : 1
      };
      layer.pins.push(pin);
      // Anchor pin color on this layer's cellColors
      const ci = (pin.y * maze.W + pin.x) * 4;
      const s = Math.min(pin.strength * PIN_ANCHOR_MULT, PIN_ANCHOR_CAP);
      layer.cellColors[ci] = pin.color[0];
      layer.cellColors[ci+1] = pin.color[1];
      layer.cellColors[ci+2] = pin.color[2];
      layer.cellColors[ci+3] = s;
    }
    layers.push(layer);
  }

  // Restore active layer
  activeLayerIndex = Math.min(preset.activeLayerIndex || 0, layers.length - 1);
  loadActiveLayer();

  // Restore Third mode
  thirdMode = preset.thirdMode || 'interactive';
  document.getElementById('third-mode-select').value = thirdMode;

  renderMaze();
  updatePinList();
  updateLayerPanel();
  setStatus(`Preset "${name}" loaded. ${layers.length} layer(s), ready to pulse.`);
}

function presetList() {
  const names = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith(PRESET_PREFIX)) {
      names.push(key.slice(PRESET_PREFIX.length));
    }
  }
  return names.sort();
}

function presetDelete(name) {
  localStorage.removeItem(PRESET_PREFIX + name);
  updatePresetList();
  setStatus(`Preset "${name}" deleted.`);
}

function updatePresetList() {
  const list = document.getElementById('preset-list');
  if (!list) return;
  const names = presetList();
  list.innerHTML = '';
  for (const name of names) {
    const row = document.createElement('div');
    row.className = 'preset-row';
    const label = document.createElement('span');
    label.className = 'preset-name';
    label.textContent = name;
    label.onclick = () => {
      document.getElementById('preset-name-input').value = name;
      presetLoad(name);
    };
    const del = document.createElement('button');
    del.className = 'layer-remove';
    del.textContent = '\u00D7';
    del.onclick = e => { e.stopPropagation(); presetDelete(name); };
    row.append(label, del);
    list.appendChild(row);
  }
}

// --- Template System (.cpm) ---

function parseTemplate(text) {
  const sections = {};
  let currentSection = null;
  const lines = text.split('\n');

  for (const line of lines) {
    const trimmed = line.trim();
    if (trimmed.startsWith('#') && !trimmed.startsWith('##')) {
      currentSection = trimmed.slice(1).trim().toLowerCase();
      sections[currentSection] = [];
    } else if (currentSection && trimmed) {
      sections[currentSection].push(trimmed);
    }
  }

  const template = {
    name: (sections.name || ['Untitled'])[0],
    scale: parseInt((sections.scale || ['3'])[0]) || 3,
    colors: {},
    pins: {},
    grid: []
  };

  // Parse colors: "1 = #f5c842"
  for (const line of (sections.colors || [])) {
    const m = line.match(/^(\S+)\s*=\s*(#[0-9a-fA-F]{6})/);
    if (m) template.colors[m[1]] = hexToRgb(m[2]);
  }

  // Parse pins: "A = circle #f5c842 str:6 [dir:up]"
  const dirMap = { up: 0, right: 1, down: 2, left: 3 };
  for (const line of (sections.pins || [])) {
    const m = line.match(/^(\S+)\s*=\s*(\w+)\s+(#[0-9a-fA-F]{6})\s+str:(\d+)(?:\s+dir:(\w+))?/);
    if (m) {
      template.pins[m[1]] = {
        type: m[2],
        color: hexToRgb(m[3]),
        strength: parseInt(m[4]),
        direction: m[5] ? (dirMap[m[5]] ?? 1) : 1
      };
    }
  }

  // Parse grid: space-separated rows
  for (const line of (sections.grid || [])) {
    template.grid.push(line.split(/\s+/));
  }

  return template;
}

function loadTemplate(template) {
  if (!template || !template.grid.length) {
    setStatus('Template: invalid or empty grid.');
    return;
  }

  const scale = template.scale;
  const gridH = template.grid.length;
  const gridW = Math.max(...template.grid.map(r => r.length));

  // Compute maze dimensions
  const mazeW = gridW * scale;
  const mazeH = gridH * scale;

  // Set canvas sizing
  const maxPx = Math.min(window.innerWidth - 40, 680);
  CELL = Math.max(4, Math.floor(maxPx / Math.max(mazeW, mazeH)));
  canvas.width = mazeW * CELL + 1;
  canvas.height = mazeH * CELL + 1;

  // Generate maze at template dimensions
  const algo = document.getElementById('algo').value;
  maze = makeMaze(mazeW, mazeH, algo);
  applyWallDensity(maze, wallDensity);

  // Build shape mask: true = inside shape
  const mask = new Uint8Array(mazeW * mazeH);
  for (let gy = 0; gy < gridH; gy++) {
    for (let gx = 0; gx < gridW; gx++) {
      const ch = template.grid[gy]?.[gx] || '.';
      if (ch !== '.') {
        // Fill entire scale×scale block
        for (let dy = 0; dy < scale; dy++) {
          for (let dx = 0; dx < scale; dx++) {
            mask[(gy * scale + dy) * mazeW + (gx * scale + dx)] = 1;
          }
        }
      }
    }
  }

  // Post-mask: wall off cells outside the shape
  const {rw, bw} = maze;
  const idx = (x, y) => y * mazeW + x;
  for (let y = 0; y < mazeH; y++) {
    for (let x = 0; x < mazeW; x++) {
      if (!mask[idx(x, y)]) {
        // Close all walls around this cell
        if (x + 1 < mazeW) rw[idx(x, y)] = 1;
        if (x - 1 >= 0) rw[idx(x - 1, y)] = 1;
        if (y + 1 < mazeH) bw[idx(x, y)] = 1;
        if (y - 1 >= 0) bw[idx(x, y - 1)] = 1;
      }
    }
  }

  // Initialize layer system
  layers = [];
  activeLayerIndex = 0;
  const layer = createLayer('Canvas');
  layers.push(layer);
  cellColors = layer.cellColors;
  pins = layer.pins;
  kiwiMap = layer.kiwiMap;
  calcifiedCount = 0;
  totalKiwis = 0;
  totalPulses = 0;
  totalLegacyWalls = 0;

  // Pre-fill color-only cells
  for (let gy = 0; gy < gridH; gy++) {
    for (let gx = 0; gx < gridW; gx++) {
      const ch = template.grid[gy]?.[gx] || '.';
      if (ch === '.') continue;

      const colorDef = template.colors[ch];
      if (colorDef) {
        // Fill entire block with this color at CALCIFY_AT
        for (let dy = 0; dy < scale; dy++) {
          for (let dx = 0; dx < scale; dx++) {
            const ci = ((gy * scale + dy) * mazeW + (gx * scale + dx)) * 4;
            cellColors[ci] = colorDef[0];
            cellColors[ci + 1] = colorDef[1];
            cellColors[ci + 2] = colorDef[2];
            cellColors[ci + 3] = CALCIFY_AT;
          }
        }
        calcifiedCount += scale * scale;
      }
    }
  }

  // Place pins at center of their grid blocks
  for (let gy = 0; gy < gridH; gy++) {
    for (let gx = 0; gx < gridW; gx++) {
      const ch = template.grid[gy]?.[gx] || '.';
      const pinDef = template.pins[ch];
      if (!pinDef) continue;

      const cx = gx * scale + Math.floor(scale / 2);
      const cy = gy * scale + Math.floor(scale / 2);
      const pin = {
        x: cx, y: cy,
        color: [...pinDef.color],
        strength: pinDef.strength,
        initialStrength: pinDef.strength,
        limit: null, legacyDone: false,
        type: pinDef.type,
        direction: pinDef.direction
      };
      pins.push(pin);

      // Anchor pin color (override pre-fill at pin cell)
      const ci = (cy * mazeW + cx) * 4;
      const s = Math.min(pin.strength * PIN_ANCHOR_MULT, PIN_ANCHOR_CAP);
      cellColors[ci] = pin.color[0];
      cellColors[ci + 1] = pin.color[1];
      cellColors[ci + 2] = pin.color[2];
      cellColors[ci + 3] = s;
    }
  }

  renderMaze();
  updatePinList();
  updateLayerPanel();
  setStatus(`Template "${template.name}" loaded: ${mazeW}×${mazeH} (scale ${scale}), ${pins.length} pins. Ready to pulse.`);
}

function renderMaze() {
  if (!maze) return;
  const {rw, bw, W, H} = maze;
  const idx = (x,y) => y * W + x;
  const N = W * H;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Composite all layers bottom-to-top
  saveActiveLayer();
  const comp = new Float32Array(N * 4);

  for (let li = 0; li < layers.length; li++) {
    const layer = layers[li];
    const src = layer.cellColors;
    const opacity = layer.opacity;
    const blend = layer.blendMode;

    for (let i = 0; i < N; i++) {
      const ss = src[i*4+3];
      if (ss < 0.001) continue;

      const sr = src[i*4], sg = src[i*4+1], sb = src[i*4+2];

      if (blend === 'overwrite') {
        // Any color present: stamp at layer opacity
        const a = opacity;
        if (comp[i*4+3] < 0.001) {
          comp[i*4] = sr; comp[i*4+1] = sg; comp[i*4+2] = sb;
        } else {
          comp[i*4]   = comp[i*4] * (1 - a) + sr * a;
          comp[i*4+1] = comp[i*4+1] * (1 - a) + sg * a;
          comp[i*4+2] = comp[i*4+2] * (1 - a) + sb * a;
        }
        comp[i*4+3] = Math.max(comp[i*4+3], a);
      } else {
        // Alpha blend: alpha depends on strength AND layer opacity
        const a = Math.min(1, ss / CALCIFY_AT) * opacity;
        if (comp[i*4+3] < 0.001) {
          comp[i*4] = sr; comp[i*4+1] = sg; comp[i*4+2] = sb;
        } else {
          comp[i*4]   = comp[i*4] * (1 - a) + sr * a;
          comp[i*4+1] = comp[i*4+1] * (1 - a) + sg * a;
          comp[i*4+2] = comp[i*4+2] * (1 - a) + sb * a;
        }
        comp[i*4+3] = Math.max(comp[i*4+3], a);
      }
    }
  }

  // Draw cells from composite
  for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
    const ci = idx(x, y);
    if (comp[ci*4+3] > 0.001) {
      ctx.fillStyle = rgbToHex(comp[ci*4], comp[ci*4+1], comp[ci*4+2]);
    } else {
      ctx.fillStyle = '#0d0d0f';
    }
    ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
  }

  // Kiwi heatmap overlay (warm yellow)
  if (showKiwis && kiwiMap) {
    for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
      const ci = idx(x, y);
      const k = kiwiMap[ci];
      if (k > 0) {
        const alpha = Math.min(0.7, k * 0.1);
        ctx.fillStyle = `rgba(255,220,80,${alpha})`;
        ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
      }
    }
  }

  // Walls
  ctx.strokeStyle = 'rgba(100,100,130,0.6)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.strokeRect(0.5, 0.5, W * CELL - 1, H * CELL - 1);
  for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
    const ci = idx(x, y);
    if (x+1 < W && rw[ci]) { ctx.moveTo((x+1)*CELL, y*CELL); ctx.lineTo((x+1)*CELL, (y+1)*CELL); }
    if (y+1 < H && bw[ci]) { ctx.moveTo(x*CELL, (y+1)*CELL); ctx.lineTo((x+1)*CELL, (y+1)*CELL); }
  }
  ctx.stroke();

  // Pins — type-aware shapes, shrink as strength decays
  for (const pin of pins) {
    const cx = pin.x * CELL + CELL / 2, cy = pin.y * CELL + CELL / 2;
    const maxR = Math.max(4, CELL * 0.32);
    const life = Math.max(0, pin.strength / pin.initialStrength); // 1.0 → 0.0
    const r = Math.max(2, maxR * (0.3 + 0.7 * life));
    const fillCol = rgbToHex(...pin.color);
    const strokeAlpha = (0.3 + 0.5 * life).toFixed(2);

    if (pin.type === 'square') {
      // Square: filled rect with inner dark square
      const half = r;
      ctx.fillStyle = fillCol;
      ctx.fillRect(cx - half, cy - half, half * 2, half * 2);
      ctx.strokeStyle = `rgba(255,255,255,${strokeAlpha})`;
      ctx.lineWidth = 1.5;
      ctx.strokeRect(cx - half, cy - half, half * 2, half * 2);
      const inner = half * 0.35;
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(cx - inner, cy - inner, inner * 2, inner * 2);
    } else if (pin.type === 'triangle') {
      // Triangle: 3-point path pointing in beam direction
      const d = pin.direction;
      const tipX = cx + DIR_VECS[d][0] * r * 1.3;
      const tipY = cy + DIR_VECS[d][1] * r * 1.3;
      // Base perpendicular to direction
      const perpX = DIR_VECS[(d + 1) % 4][0];
      const perpY = DIR_VECS[(d + 1) % 4][1];
      const baseX = cx - DIR_VECS[d][0] * r * 0.6;
      const baseY = cy - DIR_VECS[d][1] * r * 0.6;
      ctx.beginPath();
      ctx.moveTo(tipX, tipY);
      ctx.lineTo(baseX + perpX * r * 0.8, baseY + perpY * r * 0.8);
      ctx.lineTo(baseX - perpX * r * 0.8, baseY - perpY * r * 0.8);
      ctx.closePath();
      ctx.fillStyle = fillCol; ctx.fill();
      ctx.strokeStyle = `rgba(255,255,255,${strokeAlpha})`;
      ctx.lineWidth = 1.5; ctx.stroke();
      // Inner dark dot at center
      ctx.beginPath(); ctx.arc(cx, cy, r * 0.25, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fill();
      // Faint beam trace line
      const {W: mW, H: mH} = maze;
      const beamEndX = pin.direction === 1 ? mW * CELL : pin.direction === 3 ? 0 : cx;
      const beamEndY = pin.direction === 2 ? mH * CELL : pin.direction === 0 ? 0 : cy;
      ctx.beginPath();
      ctx.moveTo(tipX, tipY);
      ctx.lineTo(beamEndX, beamEndY);
      ctx.strokeStyle = `rgba(${pin.color[0]},${pin.color[1]},${pin.color[2]},${(0.1 + 0.15 * life).toFixed(2)})`;
      ctx.lineWidth = 1; ctx.stroke();
    } else {
      // Circle (default): arc with inner dark dot
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = fillCol; ctx.fill();
      ctx.strokeStyle = `rgba(255,255,255,${strokeAlpha})`;
      ctx.lineWidth = 1.5; ctx.stroke();
      ctx.beginPath(); ctx.arc(cx, cy, r * 0.35, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fill();
    }
  }

  // Ghost pins from The Third (interactive mode)
  if (thirdSuggestions.length > 0) {
    for (const s of thirdSuggestions) {
      const cx = s.x * CELL + CELL / 2, cy = s.y * CELL + CELL / 2;
      const r = Math.max(4, CELL * 0.38);
      const accepted = s.accepted !== false;
      const alpha = accepted ? 0.45 : 0.15;

      // Translucent fill
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${Math.round(s.color[0])},${Math.round(s.color[1])},${Math.round(s.color[2])},${alpha})`;
      ctx.fill();

      // Dashed stroke
      ctx.setLineDash(accepted ? [3, 3] : [2, 4]);
      ctx.strokeStyle = accepted ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1.5; ctx.stroke();
      ctx.setLineDash([]);

      // "?" label
      ctx.fillStyle = accepted ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.3)';
      ctx.font = `${Math.max(8, CELL * 0.45)}px monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('?', cx, cy + 1);
    }
  }
}

function getCell(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX, py = (e.clientY - rect.top) * scaleY;
  const x = Math.floor(px / CELL), y = Math.floor(py / CELL);
  if (!maze || x < 0 || x >= maze.W || y < 0 || y >= maze.H) return null;
  return {x, y, px, py};
}

canvas.addEventListener('click', e => {
  const cell = getCell(e); if (!cell) return;

  // Ghost pin toggling (The Third interactive mode)
  if (thirdSuggestions.length > 0) {
    const gi = thirdSuggestions.findIndex(s => s.x === cell.x && s.y === cell.y);
    if (gi !== -1) {
      thirdSuggestions[gi].accepted = !thirdSuggestions[gi].accepted;
      renderMaze();
      const acceptedCount = thirdSuggestions.filter(s => s.accepted !== false).length;
      setStatus(`The Third: ${acceptedCount}/${thirdSuggestions.length} suggestions accepted.`);
      return;
    }
  }

  if (mode === 'eyedropper') {
    var ci = (cell.y * maze.W + cell.x) * 4;
    if (cellColors[ci + 3] > 0) {
      var hex = rgbToHex(cellColors[ci], cellColors[ci+1], cellColors[ci+2]);
      currentColor = hex;
      hexInput.value = hex;
      customColor.value = hex;
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
      mode = 'pin';
      document.getElementById('btn-mode-pin').classList.add('active');
      document.getElementById('btn-mode-eye').classList.remove('active');
      updateModeIndicator();
      canvas.style.cursor = 'crosshair';
      setStatus('Sampled ' + hex);
    }
    return;
  }

  if (mode === 'pin') {
    const ei = pins.findIndex(p => p.x === cell.x && p.y === cell.y);
    if (ei !== -1) pins.splice(ei, 1);
    else {
      const newPin = {
        x: cell.x, y: cell.y,
        color: hexToRgb(currentColor),
        strength: currentStrength,
        initialStrength: currentStrength,
        limit: null,        // reach limit — null = unlimited (enforced in later layers)
        legacyDone: false,  // has this pin placed its legacy walls?
        type: currentPinType,          // 'circle' | 'square' | 'triangle'
        direction: currentDirection    // 0=up, 1=right, 2=down, 3=left (triangle only)
      };
      pins.push(newPin);
      meteorDrop(newPin);
    }
    renderMaze(); updatePinList();
  } else {
    eraseWall(cell);
  }
});

function eraseWall(cell) {
  const {rw, bw, W, H} = maze;
  const idx = (x,y) => y * W + x;
  const {x, y, px, py} = cell;
  const distR = x+1 < W ? Math.abs(px - (x+1)*CELL) : Infinity;
  const distB = y+1 < H ? Math.abs(py - (y+1)*CELL) : Infinity;
  const distL = x > 0   ? Math.abs(px - x*CELL)     : Infinity;
  const distT = y > 0   ? Math.abs(py - y*CELL)     : Infinity;
  const m = Math.min(distR, distB, distL, distT);
  if      (m === distR && rw[idx(x,y)])   { rw[idx(x,y)] = 0;   setStatus('Wall removed (right).'); }
  else if (m === distB && bw[idx(x,y)])   { bw[idx(x,y)] = 0;   setStatus('Wall removed (below).'); }
  else if (m === distL && rw[idx(x-1,y)]) { rw[idx(x-1,y)] = 0; setStatus('Wall removed (left).'); }
  else if (m === distT && bw[idx(x,y-1)]) { bw[idx(x,y-1)] = 0; setStatus('Wall removed (above).'); }
  renderMaze();
}

function pulse(n) {
  if (!maze) return;
  // Auto-capture pin memory on first pulse
  if (!layers[activeLayerIndex].pinMemory && pins.length > 0) {
    layers[activeLayerIndex].pinMemory = pins.map(p => ({
      x: p.x, y: p.y, color: [...p.color],
      strength: p.initialStrength || p.strength,
      type: p.type, direction: p.direction
    }));
    layers[activeLayerIndex].baseDecayRate = decayRate;
    updateLayerPanel();
    updateMemoryButtons();
  }
  for (let i = 0; i < n; i++) pulseOnce();
  renderMaze();
  updatePinList();
  const parts = [`P${totalPulses}`, `Pins: ${pins.length}`, `Calc: ${calcifiedCount}`];
  if (totalLegacyWalls > 0) parts.push(`Legacy: ${totalLegacyWalls}`);
  if (totalKiwis > 0) parts.push(`Kiwis: ${totalKiwis}`);
  setStatus(parts.join(' | '));
  // Enable Crank export after diffusion has run
  const crankBtn = document.getElementById('btn-send-crank');
  if (crankBtn && totalPulses > 0) crankBtn.disabled = false;
}

function updatePinList() {
  const el = document.getElementById('pin-list'); el.innerHTML = '';
  pins.forEach((pin, i) => {
    const tag = document.createElement('div'); tag.className = 'pin-tag';
    // Fading style when pin is near death
    if (pin.strength < LEGACY_THRESHOLD) tag.classList.add('fading');
    const dot = document.createElement('div'); dot.className = 'pin-dot'; dot.style.background = rgbToHex(...pin.color);
    const lbl = document.createElement('span');
    const typeSymbol = pin.type === 'circle' ? '\u25CF' : pin.type === 'square' ? '\u25A0' : '\u25B2';
    lbl.textContent = `${typeSymbol} (${pin.x},${pin.y}) str:${pin.strength === Math.floor(pin.strength) ? pin.strength : pin.strength.toFixed(1)}`;
    const rm = document.createElement('span'); rm.className = 'pin-remove'; rm.textContent = 'x';
    rm.onclick = () => { pins.splice(i, 1); renderMaze(); updatePinList(); };
    tag.append(dot, lbl, rm); el.appendChild(tag);
  });
  // Pin count indicator
  const countEl = document.getElementById('pin-count');
  if (maze) {
    const ideal = Math.ceil((maze.W * maze.H) / TARGET_DENSITY);
    countEl.textContent = `${pins.length} / ${ideal} pins`;
  } else {
    countEl.textContent = '';
  }
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

// --- Event wiring ---
document.getElementById('btn-regen').onclick = initMaze;
document.getElementById('btn-pulse').onclick = () => pulse(1);
document.getElementById('btn-pulse5').onclick = () => pulse(5);
document.getElementById('btn-pulse20').onclick = () => pulse(20);

document.getElementById('btn-scatter').onclick = () => {
  if (!maze) return;
  const scattered = autoScatter();
  if (scattered === 0) {
    setStatus('No unclaimed clusters found. Try pressing instead.');
    return;
  }
  renderMaze();
  updatePinList();

  // Auto-pulse until all pins are dead (max 100 pulses safety)
  let autoPulses = 0;
  while (pins.length > 0 && autoPulses < 100) {
    pulseOnce();
    autoPulses++;
  }
  totalPulses += 0; // pulseOnce already increments

  // Press to fill remaining stragglers
  const filled = flattenPress();
  renderMaze();
  updatePinList();
  const N = maze.W * maze.H;
  const coverage = ((calcifiedCount / N) * 100).toFixed(1);
  setStatus(`Scatter: ${scattered} pins → ${autoPulses} pulses → press filled ${filled} | Coverage: ${coverage}%`);
};

document.getElementById('btn-press').onclick = () => {
  if (!maze) return;
  const filled = flattenPress();
  renderMaze();
  updatePinList();
  const N = maze.W * maze.H;
  const coverage = ((calcifiedCount / N) * 100).toFixed(1);
  setStatus(`Press complete. Filled ${filled} cells | Coverage: ${coverage}% | Calc: ${calcifiedCount}`);
};

document.getElementById('btn-reset-color').onclick = () => {
  if (!maze) return;
  const N = maze.W * maze.H;
  cellColors = new Float32Array(N * 4);
  kiwiMap = new Float32Array(N);
  calcifiedCount = 0;
  totalKiwis = 0;
  totalPulses = 0;
  totalLegacyWalls = 0;
  // Update layer's reference to the new arrays
  if (layers.length > 0) {
    layers[activeLayerIndex].cellColors = cellColors;
    layers[activeLayerIndex].kiwiMap = kiwiMap;
  }
  // Restore pins from memory if available (they may have died during pulsing)
  if (layers.length > 0 && layers[activeLayerIndex].pinMemory) {
    restorePinsFromMemory();
    setStatus('Color cleared. Pin rig restored from memory.');
  } else {
    setStatus('Color cleared on active layer. Pins remain.');
  }
  renderMaze();
  updatePinList();
};

document.getElementById('btn-restore').onclick = () => {
  if (!maze || !layers[activeLayerIndex].pinMemory) return;
  const N = maze.W * maze.H;
  cellColors = new Float32Array(N * 4);
  kiwiMap = new Float32Array(N);
  calcifiedCount = 0; totalKiwis = 0; totalPulses = 0; totalLegacyWalls = 0;
  if (layers.length > 0) {
    layers[activeLayerIndex].cellColors = cellColors;
    layers[activeLayerIndex].kiwiMap = kiwiMap;
  }
  restorePinsFromMemory();
  renderMaze();
  setStatus('Pin rig restored. Ready to pulse.');
};
document.getElementById('btn-forget').onclick = () => {
  if (!layers[activeLayerIndex].pinMemory) return;
  layers[activeLayerIndex].pinMemory = null;
  layers[activeLayerIndex].baseDecayRate = null;
  directionBias = null;
  updateBiasButtons();
  updateMemoryButtons();
  updateLayerPanel();
  setStatus('Pin memory cleared.');
};

document.getElementById('btn-add-layer').onclick = addLayer;

document.getElementById('btn-kiwi').onclick = () => {
  showKiwis = !showKiwis;
  document.getElementById('btn-kiwi').classList.toggle('active', showKiwis);
  renderMaze();
};

document.getElementById('btn-third').onclick = runTheThird;
document.getElementById('btn-third-accept').onclick = thirdAccept;
document.getElementById('btn-third-clear').onclick = thirdClear;
document.getElementById('third-mode-select').onchange = e => {
  thirdMode = e.target.value;
};

// Preset wiring
document.getElementById('btn-preset-save').onclick = () => {
  const name = document.getElementById('preset-name-input').value.trim();
  if (!name) { setStatus('Enter a preset name.'); return; }
  presetSave(name);
};
document.getElementById('btn-preset-load').onclick = () => {
  const name = document.getElementById('preset-name-input').value.trim();
  if (!name) { setStatus('Enter a preset name to load.'); return; }
  presetLoad(name);
};

// Template wiring
document.getElementById('btn-template-load').onclick = () => {
  const text = document.getElementById('template-input').value.trim();
  if (!text) { setStatus('Paste a .cpm template first.'); return; }
  const template = parseTemplate(text);
  if (!template.grid.length) { setStatus('Template: could not parse grid.'); return; }
  loadTemplate(template);
};

// Initialize preset list on load
updatePresetList();

function updateModeIndicator() {
  const layerTag = layers.length > 1 ? `L${activeLayerIndex + 1} · ` : '';
  if (mode === 'erase') {
    document.getElementById('mode-indicator').textContent = layerTag + 'ERASE MODE';
  } else if (mode === 'eyedropper') {
    document.getElementById('mode-indicator').textContent = layerTag + 'EYEDROPPER';
  } else {
    const typeName = currentPinType.toUpperCase();
    document.getElementById('mode-indicator').textContent = layerTag + `${typeName} PIN`;
  }
}

document.getElementById('btn-mode-pin').onclick = () => {
  mode = 'pin';
  document.getElementById('btn-mode-pin').classList.add('active');
  document.getElementById('btn-mode-erase').classList.remove('active');
  document.getElementById('btn-mode-eye').classList.remove('active');
  updateModeIndicator();
  canvas.style.cursor = 'crosshair';
};
document.getElementById('btn-mode-erase').onclick = () => {
  mode = 'erase';
  document.getElementById('btn-mode-erase').classList.add('active');
  document.getElementById('btn-mode-pin').classList.remove('active');
  document.getElementById('btn-mode-eye').classList.remove('active');
  updateModeIndicator();
  canvas.style.cursor = 'cell';
};
document.getElementById('btn-mode-eye').onclick = () => {
  mode = 'eyedropper';
  document.getElementById('btn-mode-eye').classList.add('active');
  document.getElementById('btn-mode-pin').classList.remove('active');
  document.getElementById('btn-mode-erase').classList.remove('active');
  updateModeIndicator();
  canvas.style.cursor = 'copy';
};

// Type selector
['circle', 'square', 'triangle'].forEach(type => {
  document.getElementById('btn-type-' + type).onclick = () => {
    currentPinType = type;
    document.getElementById('btn-type-circle').classList.toggle('active', type === 'circle');
    document.getElementById('btn-type-square').classList.toggle('active', type === 'square');
    document.getElementById('btn-type-triangle').classList.toggle('active', type === 'triangle');
    document.getElementById('direction-group').style.display = type === 'triangle' ? 'flex' : 'none';
    updateModeIndicator();
  };
});

// Direction selector (triangle only)
[0, 1, 2, 3].forEach(dir => {
  document.getElementById('btn-dir-' + dir).onclick = () => {
    currentDirection = dir;
    [0,1,2,3].forEach(d => document.getElementById('btn-dir-' + d).classList.toggle('active', d === dir));
  };
});

// Bias direction selector
var biasMap = [{dx:0,dy:-1},{dx:1,dy:0},{dx:0,dy:1},{dx:-1,dy:0}];
[0, 1, 2, 3].forEach(function(dir) {
  document.getElementById('btn-bias-' + dir).onclick = function() {
    if (directionBias && directionBias.dx === biasMap[dir].dx && directionBias.dy === biasMap[dir].dy) {
      directionBias = null;
    } else {
      directionBias = { dx: biasMap[dir].dx, dy: biasMap[dir].dy, strength: 0.5 };
    }
    updateBiasButtons();
    setStatus(directionBias ? 'Bias: ' + ['up','right','down','left'][dir] : 'Bias off');
  };
});
document.getElementById('btn-bias-off').onclick = function() {
  directionBias = null;
  updateBiasButtons();
  setStatus('Bias off');
};

// Pose selector
document.querySelectorAll('.pose-btn').forEach(function(btn) {
  btn.onclick = function() {
    applyPose(btn.dataset.pose);
    document.querySelectorAll('.pose-btn').forEach(function(b) { b.classList.remove('active'); });
    if (btn.dataset.pose !== 'idle') btn.classList.add('active');
  };
});

var hexInput = document.getElementById('hex-input');
var customColor = document.getElementById('custom-color');

document.querySelectorAll('.color-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    currentColor = btn.dataset.color;
    hexInput.value = currentColor;
    customColor.value = currentColor;
  };
});
customColor.oninput = e => {
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
  currentColor = e.target.value;
  hexInput.value = currentColor;
};
hexInput.addEventListener('input', () => {
  var v = hexInput.value.trim();
  if (/^#[0-9a-fA-F]{6}$/.test(v)) {
    currentColor = v;
    customColor.value = v;
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
  }
});
document.getElementById('pin-strength').oninput = e => {
  currentStrength = parseInt(e.target.value);
  document.getElementById('strength-val').textContent = currentStrength;
};
document.getElementById('decay-rate').oninput = e => {
  decayRate = parseInt(e.target.value) / 10;
  document.getElementById('decay-val').textContent = decayRate.toFixed(1);
};
document.getElementById('wall-density').oninput = e => {
  wallDensity = parseInt(e.target.value);
  document.getElementById('wall-density-val').textContent = wallDensity + '%';
};

initMaze();

// Hub greeting — if opened from the hub (iframe) with no incoming context,
// the maze says hello with one of each pin type in random colors.
(function mazeGreeting() {
  var inHub = window !== window.parent;
  var hasContext = !!localStorage.getItem('baseline-session/crank-seed');
  if (!inHub || hasContext || !maze) return;
  var palette = ['#f5c842','#e85e1a','#c8411e','#3a8fe8','#44cc77','#cc44aa','#9966ff'];
  var types = ['circle','square','triangle'];
  var used = [];
  types.forEach(function(type) {
    var hex;
    do { hex = palette[Math.floor(Math.random() * palette.length)]; } while (used.indexOf(hex) !== -1 && used.length < palette.length);
    used.push(hex);
    var c = hexToRgb(hex);
    var rx = 3 + Math.floor(Math.random() * (maze.W - 6));
    var ry = 3 + Math.floor(Math.random() * (maze.H - 6));
    var dir = Math.floor(Math.random() * 4);
    pins.push({ x: rx, y: ry, color: [c[0], c[1], c[2]], strength: 4, initialStrength: 4, type: type, direction: dir, limit: null, legacyDone: false });
  });
  updatePinList();
  renderMaze();
  setStatus('The maze says hello.');
})();

// Hub integration — collapse selection panel when EFDP launches
try { window.parent.postMessage({ type: 'hub:minimize' }, '*'); } catch(e) {}
</script>
</body>
</html>
