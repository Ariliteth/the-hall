<!DOCTYPE html>
<html lang="en">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d0f;
    color: #e8e4dc;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;

  }
  h1 { font-size: 13px; letter-spacing: 0.2em; color: #7a7068; text-transform: uppercase; margin-top: 4px; }
  #controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: center; max-width: 700px; }
  .ctrl-group { display: flex; gap: 6px; align-items: center; background: #1a1a1e; border: 1px solid #2a2a30; border-radius: 6px; padding: 6px 10px; font-size: 11px; }

  button { background: #1a1a1e; border: 1px solid #3a3a44; color: #e8e4dc; padding: 6px 14px; border-radius: 5px; cursor: pointer; font-family: inherit; font-size: 11px; letter-spacing: 0.1em; transition: background 0.15s, border-color 0.15s; }
