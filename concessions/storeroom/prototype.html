<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Storeroom</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600&family=Special+Elite&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1710;
    --shelf: #2e2718;
    --shelf-edge: #3d3420;
    --card: #2a2416;
    --text: #c8b87a;
    --dim: #5a4e2a;
    --light-on: #fff8d6;
    --light-glow: rgba(255,240,160,0.18);
    --light-off: #2a2418;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Barlow Condensed', sans-serif;
    touch-action: none;
    user-select: none;
  }

  #room {
    width: 100%; height: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 0;
  }

  /* ── CEILING LIGHT ── */
  #light-zone {
    position: relative;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 10px;
    flex-shrink: 0;
  }

  #light-fixture {
    width: 3px;
    height: 28px;
    background: #3a3020;
    margin-bottom: 0;
  }

  #light-bulb {
    width: 180px;
    height: 22px;
    border-radius: 3px;
    background: var(--light-off);
    box-shadow: none;
    transition: background 0.05s, box-shadow 0.05s;
    cursor: pointer;
    position: relative;
  }

  #light-bulb.on {
    background: var(--light-on);
    box-shadow: 0 0 40px 18px rgba(255,240,160,0.22), 0 0 120px 40px rgba(255,240,160,0.07);
  }

  #light-cone {
    width: 0;
    height: 0;
    border-left: 90px solid transparent;
    border-right: 90px solid transparent;
    border-top: 0px solid transparent;
    transition: border-top-width 0.05s, border-top-color 0.05s;
  }

  #light-cone.on {
    border-top: 60px solid rgba(255,240,160,0.06);
  }

  #light-prompt {
    margin-top: 6px;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--dim);
    height: 16px;
    text-transform: uppercase;
    font-family: 'Barlow Condensed', sans-serif;
    transition: opacity 0.3s;
  }

  /* ── SHELF AREA ── */
  #shelves {
    flex: 1;
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    align-items: center;
    padding: 10px 16px 0;
    position: relative;
  }

  .shelf-unit {
    width: 100%;
    position: relative;
  }

  .shelf-surface {
    width: 100%;
    height: 8px;
    background: var(--shelf-edge);
    border-radius: 2px;
    margin-top: 4px;
    box-shadow: 0 3px 0 rgba(0,0,0,0.4);
  }

  .shelf-contents {
    width: 100%;
    height: 52px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    position: relative;
    overflow: visible;
  }

  /* ── BOX (SWIPE) ── */
  #box-zone {
    position: relative;
    width: 100%;
    height: 60px;
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  #sliding-box {
    position: absolute;
    width: 64px;
    height: 48px;
    background: #3a3020;
    border: 1.5px solid #4a4028;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #7a6a40;
    letter-spacing: 0.08em;
    font-family: 'Special Elite', monospace;
    text-transform: uppercase;
    cursor: pointer;
    top: 6px;
  }

  #sliding-box::after {
    content: '';
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    border: 1px solid rgba(122,106,64,0.3);
    border-radius: 1px;
    pointer-events: none;
  }

  #swipe-prompt {
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--dim);
    white-space: nowrap;
    text-transform: uppercase;
    height: 14px;
  }

  /* ── CANISTER (HOLD/TILT) ── */
  #canister-zone {
    position: relative;
    width: 100%;
    height: 70px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: visible;
  }

  #canister {
    width: 32px;
    height: 54px;
    background: linear-gradient(160deg, #4a4030, #2e2618);
    border: 1.5px solid #5a5030;
    border-radius: 4px 4px 3px 3px;
    position: relative;
    transform-origin: bottom center;
    cursor: pointer;
    flex-shrink: 0;
  }

  #canister::before {
    content: '';
    position: absolute;
    top: 6px; left: 50%; transform: translateX(-50%);
    width: 20px; height: 3px;
    background: rgba(200,184,122,0.15);
    border-radius: 1px;
  }

  #canister-lid {
    position: absolute;
    top: -6px; left: -3px; right: -3px;
    height: 9px;
    background: #5a5030;
    border-radius: 3px 3px 0 0;
    border: 1px solid #6a6040;
  }

  #hold-prompt {
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--dim);
    white-space: nowrap;
    text-transform: uppercase;
    height: 14px;
  }

  /* ── SHELF DROOP (failure state) ── */
  .shelf-droop {
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  /* ── BALLOONS ── */
  .balloon {
    position: fixed;
    bottom: -60px;
    font-size: 26px;
    animation: balloon-rise 3.2s ease-out forwards;
    pointer-events: none;
    z-index: 100;
  }

  .balloon-text {
    position: fixed;
    bottom: 40px;
    font-family: 'Special Elite', monospace;
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--text);
    animation: balloon-rise 2.8s ease-out forwards;
    pointer-events: none;
    z-index: 100;
    text-transform: lowercase;
  }

  @keyframes balloon-rise {
    0%   { transform: translateX(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateX(var(--drift)) translateY(-110vh) rotate(var(--spin)); opacity: 0; }
  }

  /* ── CONFETTI ── */
  .confetto {
    position: fixed;
    bottom: 0;
    width: 6px;
    height: 10px;
    border-radius: 1px;
    animation: confetti-pop 2.4s ease-out forwards;
    pointer-events: none;
    z-index: 99;
    transform-origin: center;
  }

  @keyframes confetti-pop {
    0%   { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateX(var(--cx)) translateY(var(--cy)) rotate(var(--cr)); opacity: 0; }
  }

  /* ── FLOOR ── */
  #floor {
    width: 100%;
    height: 14px;
    background: linear-gradient(180deg, #1e1c10, #161510);
    border-top: 2px solid #2e2c18;
    flex-shrink: 0;
  }

  /* ── STATUS ── */
  #status-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: transparent;
    z-index: 50;
  }

  #accuracy-fill {
    height: 100%;
    background: linear-gradient(90deg, #c8b87a, #8a7840);
    transition: width 0.5s ease;
    width: 100%;
  }

  /* ── GIMME DOTS ── */
  #gimme-dots {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 101;
  }

  .gimme-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text);
    opacity: 0.5;
  }

  /* ── PATTERN DISPLAY for light ── */
  #pattern-display {
    display: flex;
    gap: 5px;
    margin-top: 4px;
    height: 10px;
    align-items: center;
  }

  .pat-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--dim);
  }

  .pat-dot.active {
    background: var(--text);
  }
</style>
</head>
<body>

<div id="status-bar"><div id="accuracy-fill"></div></div>

<div id="room">

  <!-- LIGHT -->
  <div id="light-zone">
    <div id="light-fixture"></div>
    <div id="light-bulb" class="on"></div>
    <div id="light-cone" class="on"></div>
    <div id="pattern-display"></div>
    <div id="light-prompt"></div>
  </div>

  <!-- SHELVES -->
  <div id="shelves">

    <!-- shelf 1: swipe box -->
    <div class="shelf-unit shelf-droop" id="shelf-1">
      <div class="shelf-contents">
        <div id="box-zone">
          <div id="sliding-box">MISC</div>
          <div id="swipe-prompt"></div>
        </div>
      </div>
      <div class="shelf-surface"></div>
    </div>

    <!-- shelf 2: canister hold/tilt -->
    <div class="shelf-unit shelf-droop" id="shelf-2">
      <div class="shelf-contents">
        <div id="canister-zone">
          <div id="canister">
            <div id="canister-lid"></div>
          </div>
          <div id="hold-prompt"></div>
        </div>
      </div>
      <div class="shelf-surface"></div>
    </div>

  </div>

  <div id="floor"></div>
</div>

<div id="gimme-dots"></div>

<script>
// ─────────────────────────────────────────────
//  STOREROOM
// ─────────────────────────────────────────────

const BALLOON_WORDS = ['okay.', 'nice.', 'oh well.', 'there it is.', 'sure.', 'mm.', 'yeah.', 'hey!'];
const BALLOON_EMOJIS = ['🎈','🎈','🎉','✨','🎈'];

// ── Performance tracking ──
let accuracyHistory = []; // 0..1 per event
let consistencyHistory = [];
let gimmeCount = 0;
let strictMode = false;

function recordAccuracy(score) {
  accuracyHistory.push(score);
  if (accuracyHistory.length > 12) accuracyHistory.shift();

  const avg = accuracyHistory.reduce((a,b)=>a+b,0) / accuracyHistory.length;
  document.getElementById('accuracy-fill').style.width = (avg * 100) + '%';

  // Consistency = inverse std dev
  if (accuracyHistory.length >= 4) {
    const mean = avg;
    const variance = accuracyHistory.reduce((s,v)=>s+Math.pow(v-mean,2),0)/accuracyHistory.length;
    const stdDev = Math.sqrt(variance);
    const consistent = stdDev < 0.15;

    if (gimmeCount > 0) {
      gimmeCount--;
      updateGimmeDots();
      return; // gimme — no consequence
    }

    if (score < 0.4 || (strictMode && score < 0.7)) {
      triggerFailure();
      gimmeCount = 2 + Math.floor(Math.random()*4);
      updateGimmeDots();
      strictMode = false;
    } else if (avg > 0.82 && consistent && !strictMode) {
      strictMode = true; // tighten
    }
  }
}

function updateGimmeDots() {
  const d = document.getElementById('gimme-dots');
  d.innerHTML = '';
  for(let i=0;i<gimmeCount;i++){
    const dot = document.createElement('div');
    dot.className = 'gimme-dot';
    d.appendChild(dot);
  }
}

function triggerFailure() {
  // Shelf droop
  document.querySelectorAll('.shelf-droop').forEach(s=>{
    s.style.transform = 'translateY(8px) rotate(-0.4deg)';
    setTimeout(()=>s.style.transform='',900);
  });

  // Balloons + confetti
  const count = 3 + Math.floor(Math.random()*3);
  for(let i=0;i<count;i++) {
    setTimeout(()=>launchBalloon(), i*180);
  }
  for(let i=0;i<18;i++) {
    setTimeout(()=>launchConfetto(), i*60 + 100);
  }
}

function launchBalloon() {
  const b = document.createElement('div');
  const useText = Math.random() < 0.35;
  if(useText) {
    b.className = 'balloon-text';
    b.textContent = BALLOON_WORDS[Math.floor(Math.random()*BALLOON_WORDS.length)];
    b.style.left = (15 + Math.random()*70)+'%';
  } else {
    b.className = 'balloon';
    b.textContent = BALLOON_EMOJIS[Math.floor(Math.random()*BALLOON_EMOJIS.length)];
    b.style.left = (10 + Math.random()*80)+'%';
  }
  const drift = (Math.random()-0.5)*80;
  const spin = (Math.random()-0.5)*30;
  b.style.setProperty('--drift', drift+'px');
  b.style.setProperty('--spin', spin+'deg');
  document.body.appendChild(b);
  setTimeout(()=>b.remove(), 3400);
}

function launchConfetto() {
  const c = document.createElement('div');
  c.className = 'confetto';
  c.style.left = (5 + Math.random()*90)+'%';
  const colors = ['#c8b87a','#8a9a6a','#a87a5a','#6a8aaa','#aa8aaa'];
  c.style.background = colors[Math.floor(Math.random()*colors.length)];
  const cx = (Math.random()-0.5)*200;
  const cy = -(80 + Math.random()*180);
  const cr = (Math.random()-0.5)*360;
  c.style.setProperty('--cx', cx+'px');
  c.style.setProperty('--cy', cy+'px');
  c.style.setProperty('--cr', cr+'deg');
  document.body.appendChild(c);
  setTimeout(()=>c.remove(), 2600);
}

// ─────────────────────────────────────────────
//  LIGHT  (tap pattern)
// ─────────────────────────────────────────────

const lightBulb = document.getElementById('light-bulb');
const lightCone = document.getElementById('light-cone');
const lightPrompt = document.getElementById('light-prompt');
const patternDisplay = document.getElementById('pattern-display');

let lightOn = true;
let lightPattern = []; // array of {on: bool, duration: ms}
let lightPatternIndex = 0;
let lightPatternTimer = null;
let lightWaiting = false; // needs tap input
let playerTapBuffer = [];
let playerTapStart = null;
let lightInputWindow = null;

// Blink pattern: sequence of intervals (on-time, off-time) in ms
// e.g. [300,200,300,500] = on 300, off 200, on 300, off 500
let blinkSequence = [];
let blinkActive = false;

function generateBlinkSequence() {
  const n = 2 + Math.floor(Math.random()*3);
  const seq = [];
  for(let i=0;i<n;i++){
    seq.push(200 + Math.floor(Math.random()*400)); // on
    seq.push(150 + Math.floor(Math.random()*300)); // off
  }
  seq.push(800 + Math.floor(Math.random()*600)); // final pause before repeat
  return seq;
}

function setLight(on) {
  lightOn = on;
  lightBulb.classList.toggle('on', on);
  lightCone.classList.toggle('on', on);
}

function runBlinkCycle() {
  if(lightWaiting) return;
  blinkActive = true;
  let i = 0;

  function step() {
    if(lightWaiting) { blinkActive = false; return; }
    setLight(i%2===0);
    const dur = blinkSequence[i];
    i++;
    if(i >= blinkSequence.length) {
      // chance to stop and ask for tap
      if(Math.random() < 0.38) {
        setLight(false);
        enterWaitMode();
        return;
      }
      i = 0;
      // occasionally change pattern
      if(Math.random() < 0.25) blinkSequence = generateBlinkSequence();
    }
    lightPatternTimer = setTimeout(step, dur);
  }
  step();
}

function enterWaitMode() {
  lightWaiting = true;
  blinkActive = false;
  lightPrompt.textContent = '— tap —';
  renderPatternDots();
  // give player time window
}

function renderPatternDots() {
  // Show the on-pulses as dots
  patternDisplay.innerHTML = '';
  // count on-pulses (even indices)
  const pulseCount = Math.ceil(blinkSequence.length / 2) - 0; // on periods
  for(let i=0;i<pulseCount;i++){
    const dot = document.createElement('div');
    dot.className = 'pat-dot';
    dot.id = 'pd-'+i;
    patternDisplay.appendChild(dot);
  }
}

// Player taps to recreate pattern
let playerTaps = [];
let lastTapTime = null;
let tapTimeout = null;

lightBulb.addEventListener('pointerdown', (e)=>{
  e.preventDefault();
  if(!lightWaiting) return;
  const now = performance.now();
  playerTaps.push(now);
  // flash a dot
  const dots = patternDisplay.querySelectorAll('.pat-dot');
  const idx = playerTaps.length - 1;
  if(dots[idx]) { dots[idx].classList.add('active'); }

  clearTimeout(tapTimeout);
  tapTimeout = setTimeout(()=>evaluateLightTaps(), 1200);
});

function evaluateLightTaps() {
  if(!lightWaiting) return;
  // Extract intervals from playerTaps
  const playerIntervals = [];
  for(let i=1;i<playerTaps.length;i++){
    playerIntervals.push(playerTaps[i]-playerTaps[i-1]);
  }

  // Compare to blinkSequence on-pulse durations and gaps
  // Expected: pattern = [on,off,on,off,...,pause]
  // Player taps: count should match pulse count
  // Timing of gaps between taps should match off-times (roughly)
  const expectedPulses = Math.ceil(blinkSequence.length / 2);
  const expectedGaps = [];
  for(let i=1;i<blinkSequence.length-1;i+=2){ expectedGaps.push(blinkSequence[i]); }

  let score = 0;

  // Count accuracy
  const countDiff = Math.abs(playerTaps.length - expectedPulses);
  const countScore = Math.max(0, 1 - countDiff * 0.4);

  // Gap timing accuracy
  let gapScore = 1;
  if(playerIntervals.length > 0 && expectedGaps.length > 0) {
    const n = Math.min(playerIntervals.length, expectedGaps.length);
    let gapErr = 0;
    for(let i=0;i<n;i++){
      const ratio = Math.abs(playerIntervals[i] - expectedGaps[i]) / (expectedGaps[i] + 1);
      gapErr += Math.min(ratio, 1);
    }
    gapScore = Math.max(0, 1 - gapErr/n);
  }

  score = countScore * 0.5 + gapScore * 0.5;

  recordAccuracy(score);
  lightWaiting = false;
  playerTaps = [];
  lightPrompt.textContent = '';
  patternDisplay.innerHTML = '';

  // Possibly change pattern
  if(Math.random() < 0.3) blinkSequence = generateBlinkSequence();
  setLight(true);
  setTimeout(()=>runBlinkCycle(), 600 + Math.random()*800);
}

// ─────────────────────────────────────────────
//  BOX  (swipe)
// ─────────────────────────────────────────────

const boxEl = document.getElementById('sliding-box');
const boxZone = document.getElementById('box-zone');
const swipePrompt = document.getElementById('swipe-prompt');

let boxX = 0;
let boxDir = 1; // 1=right, -1=left
let boxSpeed = 0.4; // px per ms
let boxAnimFrame = null;
let boxMoving = false;
let boxWaiting = false;
let boxLastSpeed = 0;
let boxLastDir = 1;
let boxWaitStart = null;

const BOX_ZONE_WIDTH = () => boxZone.clientWidth;
const BOX_W = 64;

function startBox() {
  boxMoving = true;
  boxWaiting = false;
  boxSpeed = 0.25 + Math.random()*0.55;
  boxDir = Math.random() < 0.5 ? 1 : -1;
  boxX = boxDir === 1 ? 0 : BOX_ZONE_WIDTH() - BOX_W;
  let lastT = null;
  let elapsed = 0;
  const totalTime = 2500 + Math.random()*3000;
  const speedChanges = Math.floor(Math.random()*3);
  let speedChangeAt = [];
  for(let i=0;i<speedChanges;i++){
    speedChangeAt.push(totalTime*(0.2+0.6*Math.random()));
  }

  function frame(t) {
    if(!boxMoving) return;
    if(lastT) {
      const dt = t - lastT;
      elapsed += dt;
      boxX += boxDir * boxSpeed * dt;
      const zw = BOX_ZONE_WIDTH() - BOX_W;
      if(boxX > zw) { boxX = zw; boxDir *= -1; }
      if(boxX < 0) { boxX = 0; boxDir *= -1; }
      boxEl.style.left = boxX + 'px';

      // Speed changes
      speedChangeAt.forEach((sc,i)=>{
        if(elapsed >= sc) {
          speedChangeAt[i] = Infinity;
          boxSpeed = 0.15 + Math.random()*0.7;
        }
      });
    }
    lastT = t;

    if(elapsed >= totalTime) {
      // Stop, ask for swipe
      boxLastSpeed = boxSpeed;
      boxLastDir = boxDir;
      boxMoving = false;
      boxWaiting = true;
      boxWaitStart = performance.now();
      swipePrompt.textContent = boxLastDir > 0 ? '→ swipe →' : '← swipe ←';
      return;
    }
    boxAnimFrame = requestAnimationFrame(frame);
  }
  boxAnimFrame = requestAnimationFrame(frame);
}

// Swipe detection on box zone
let swipeStartX = null, swipeStartT = null;

boxZone.addEventListener('pointerdown', e=>{
  swipeStartX = e.clientX;
  swipeStartT = performance.now();
});

boxZone.addEventListener('pointerup', e=>{
  if(!boxWaiting || swipeStartX === null) { swipeStartX=null; return; }
  const dx = e.clientX - swipeStartX;
  const dt = performance.now() - swipeStartT;
  const velocity = dx / dt; // px/ms, signed

  // Expected: boxLastDir, ~boxLastSpeed (px/ms)
  const expectedV = boxLastDir * boxLastSpeed;
  const vErr = Math.abs(velocity - expectedV) / (Math.abs(expectedV)+0.01);
  const score = Math.max(0, 1 - vErr * 0.8);

  recordAccuracy(score);
  boxWaiting = false;
  swipePrompt.textContent = '';
  swipeStartX = null;

  setTimeout(()=>startBox(), 700 + Math.random()*1200);
});

// ─────────────────────────────────────────────
//  CANISTER  (tap-hold for tilt duration)
// ─────────────────────────────────────────────

const canister = document.getElementById('canister');
const holdPrompt = document.getElementById('hold-prompt');

let canisterTilting = false;
let canisterWaiting = false;
let tiltDir = 1; // 1=right, -1=left
let straightDuration = 0; // how long it stays straight (ms) — this is what player holds for
let tiltDuration = 0; // how far it goes before "too much"
let tiltAngle = 0;
let tiltAnimFrame = null;
let tiltStart = null;
let straightStart = null;
let tiltPhase = 'straight'; // straight | tilting | waiting

function startCanister() {
  canisterWaiting = false;
  canisterTilting = false;
  tiltDir = Math.random() < 0.5 ? 1 : -1;
  straightDuration = 900 + Math.random()*1800;
  tiltDuration = 600 + Math.random()*800;
  tiltPhase = 'straight';
  tiltAngle = 0;
  canister.style.transform = '';
  straightStart = performance.now();

  function frame(t) {
    if(canisterWaiting) return;

    if(tiltPhase === 'straight') {
      const elapsed = t - straightStart;
      if(elapsed >= straightDuration) {
        tiltPhase = 'tilting';
        tiltStart = t;
      }
    } else if(tiltPhase === 'tilting') {
      const elapsed = t - tiltStart;
      tiltAngle = Math.min(elapsed / tiltDuration, 1) * 28 * tiltDir;
      canister.style.transform = `rotate(${tiltAngle}deg)`;

      if(elapsed >= tiltDuration) {
        // Tipped too far — need hold
        canisterWaiting = true;
        canisterTilting = false;
        holdPrompt.textContent = 'hold';
        return;
      }
    }

    tiltAnimFrame = requestAnimationFrame(frame);
  }
  tiltAnimFrame = requestAnimationFrame(frame);
}

// Hold detection
let holdStart = null;
let holdActive = false;

canister.addEventListener('pointerdown', e=>{
  if(!canisterWaiting) return;
  e.preventDefault();
  holdStart = performance.now();
  holdActive = true;
  holdPrompt.textContent = '·····';
});

canister.addEventListener('pointerup', e=>{
  if(!holdActive || !canisterWaiting) { holdActive=false; return; }
  e.preventDefault();
  const heldFor = performance.now() - holdStart;
  holdActive = false;
  holdPrompt.textContent = '';

  // Expected: straightDuration
  const ratio = Math.abs(heldFor - straightDuration) / straightDuration;
  const score = Math.max(0, 1 - ratio * 1.2);

  recordAccuracy(score);
  canisterWaiting = false;
  canister.style.transform = '';

  setTimeout(()=>startCanister(), 800 + Math.random()*1000);
});

canister.addEventListener('pointercancel', ()=>{ holdActive=false; });

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────

blinkSequence = generateBlinkSequence();
setTimeout(()=>runBlinkCycle(), 800);
setTimeout(()=>startBox(), 400);
setTimeout(()=>startCanister(), 1200);

</script>
